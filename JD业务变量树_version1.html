<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <link rel="icon" href="data:,">
  <title>JD 业务变量树｜version1</title>
  <style>
:root {
  color-scheme: light;
  --background: #f5f7fa;
  --foreground: #16212d;
  --surface: #ffffff;
  --surface-soft: #f8fafc;
  --muted: #687689;
  --border: #d9e1ea;
  --border-strong: #b9c6d3;
  --primary: #276653;
  --primary-soft: #e5f1ec;
  --group-human: #4f7fae;
  --group-human-soft: #e9f0f7;
  --group-perception: #4e9651;
  --group-perception-soft: #eaf4e9;
  --group-motion: #e8882e;
  --group-motion-soft: #fbefe3;
  --accent: #356d9b;
  --accent-soft: #e8f1f8;
  --proposed: #9c6a2d;
  --proposed-soft: #f8efdf;
  --danger: #a34852;
  --danger-soft: #f8e8ea;
  --team: #6d5a90;
  --team-soft: #eeeaf5;
  --shadow: 0 12px 30px rgba(29, 43, 62, 0.08);
  font-family: Inter, "SF Pro Text", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
}

body[data-ability-group="human"] {
  --primary: var(--group-human);
  --primary-soft: var(--group-human-soft);
}

body[data-ability-group="perception"] {
  --primary: var(--group-perception);
  --primary-soft: var(--group-perception-soft);
}

body[data-ability-group="motion"] {
  --primary: var(--group-motion);
  --primary-soft: var(--group-motion-soft);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-width: 320px;
  background: var(--background);
  color: var(--foreground);
}

button,
input,
select,
textarea {
  font: inherit;
}

button:focus-visible,
input:focus-visible,
select:focus-visible,
textarea:focus-visible,
a:focus-visible {
  outline: 3px solid color-mix(in srgb, var(--primary) 28%, transparent);
  outline-offset: 2px;
}

code,
pre {
  font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
}

.app-header {
  min-height: 82px;
  padding: 14px clamp(18px, 3vw, 44px);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.brand {
  display: flex;
  align-items: baseline;
  gap: 10px;
  min-width: 0;
  white-space: nowrap;
}

.brand-kicker,
.eyebrow {
  color: var(--primary);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
}

.brand strong {
  font-size: 18px;
}

.brand > span:last-child {
  color: var(--muted);
  font-size: 11px;
}

.download-link {
  flex: none;
  padding: 9px 13px;
  border: 1px solid var(--primary);
  border-radius: 8px;
  background: var(--primary);
  color: #ffffff;
  font-size: 11px;
  font-weight: 700;
  text-decoration: none;
}

.download-link:hover {
  filter: brightness(0.94);
}

.header-actions {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 7px;
  flex-wrap: wrap;
}

.review-action {
  padding: 8px 11px;
  border: 1px solid var(--border-strong);
  border-radius: 8px;
  background: var(--surface);
  color: var(--foreground);
  font-size: 10px;
  cursor: pointer;
}

.review-action:hover {
  border-color: var(--primary);
  background: var(--primary-soft);
}

#totalCommentCount {
  display: inline-flex;
  min-width: 17px;
  height: 17px;
  align-items: center;
  justify-content: center;
  margin-left: 3px;
  padding: 0 4px;
  border-radius: 999px;
  background: var(--primary-soft);
  color: var(--primary);
  font-size: 8px;
}

main {
  width: min(1800px, 100%);
  margin: 0 auto;
  padding: 18px clamp(12px, 2.2vw, 32px) 32px;
}

.ability-tabs {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 8px;
  margin-bottom: 12px;
}

.ability-tab {
  min-height: 50px;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  color: var(--foreground);
  text-align: left;
  cursor: pointer;
}

.ability-tab strong,
.ability-tab span {
  display: block;
}

.ability-tab strong {
  margin-bottom: 3px;
  color: var(--primary);
  font-size: 13px;
}

.ability-tab.group-human strong {
  color: var(--group-human);
}

.ability-tab.group-perception strong {
  color: var(--group-perception);
}

.ability-tab.group-motion strong {
  color: var(--group-motion);
}

.ability-tab span {
  color: var(--muted);
  font-size: 10px;
}

.ability-tab[aria-selected="true"] {
  border-color: var(--primary);
  background: var(--primary-soft);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.ability-tab.group-human[aria-selected="true"] {
  border-color: var(--group-human);
  background: var(--group-human-soft);
  box-shadow: inset 0 0 0 1px var(--group-human);
}

.ability-tab.group-perception[aria-selected="true"] {
  border-color: var(--group-perception);
  background: var(--group-perception-soft);
  box-shadow: inset 0 0 0 1px var(--group-perception);
}

.ability-tab.group-motion[aria-selected="true"] {
  border-color: var(--group-motion);
  background: var(--group-motion-soft);
  box-shadow: inset 0 0 0 1px var(--group-motion);
}

.map-panel {
  overflow: hidden;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: var(--surface);
  box-shadow: var(--shadow);
}

.map-head {
  min-height: 66px;
  padding: 13px 18px;
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 14px;
  border-bottom: 1px solid var(--border);
}

.map-head h1 {
  margin: 3px 0 0;
  font-size: 18px;
}

.map-count {
  color: var(--muted);
  font-size: 10px;
}

.map-viewport {
  min-height: calc(100vh - 230px);
  max-height: calc(100vh - 190px);
  overflow: auto;
  padding: 24px 34px 34px;
  overscroll-behavior: contain;
}

.mindmap {
  width: max-content;
  min-width: 100%;
}

.mind-branch {
  position: relative;
  display: flex;
  align-items: center;
}

.mind-children {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-left: 42px;
  padding-left: 24px;
}

.mind-children::before {
  content: "";
  position: absolute;
  top: var(--spine-top, 24px);
  height: var(--spine-height, calc(100% - 48px));
  left: 0;
  border-left: 1px solid var(--border-strong);
}

.mind-child {
  position: relative;
}

.mind-child::before {
  content: "";
  position: absolute;
  top: 50%;
  left: -24px;
  width: 24px;
  border-top: 1px solid var(--border-strong);
}

.mind-branch.has-children > .mind-node::after {
  content: "";
  position: absolute;
  top: 50%;
  right: -42px;
  width: 42px;
  border-top: 1px solid var(--border-strong);
}

.mind-node {
  position: relative;
  display: grid;
  grid-template-columns: minmax(82px, auto) minmax(110px, 1fr);
  align-items: center;
  width: 248px;
  min-height: 44px;
  padding: 8px 10px;
  gap: 8px;
  border: 1px solid var(--border-strong);
  border-radius: 8px;
  background: var(--surface);
  color: var(--foreground);
  text-align: left;
  cursor: pointer;
  box-shadow: 0 3px 10px rgba(26, 42, 59, 0.05);
}

.mind-node:hover,
.mind-node.is-highlighted {
  border-color: var(--primary);
  background: var(--primary-soft);
}

.mind-node code {
  color: var(--primary);
  font-size: 10px;
  overflow-wrap: anywhere;
}

.mind-node span {
  font-size: 11px;
  font-weight: 620;
  line-height: 1.35;
}

.comment-count {
  position: absolute;
  top: -7px;
  right: -7px;
  display: inline-flex;
  min-width: 19px;
  height: 19px;
  align-items: center;
  justify-content: center;
  padding: 0 5px;
  border: 2px solid var(--surface);
  border-radius: 999px;
  background: var(--team);
  color: var(--surface);
  font-size: 8px;
  font-weight: 700;
}

.mind-node.root {
  width: 212px;
  grid-template-columns: 44px minmax(0, 1fr);
  border-color: var(--primary);
  background: var(--primary);
  color: #ffffff;
}

.mind-node.root code {
  color: #ffffff;
  font-size: 14px;
  font-weight: 700;
}

.mind-node.canonical {
  border-color: var(--primary);
  background: var(--primary-soft);
}

.mind-node.group {
  border-style: dashed;
  background: var(--surface-soft);
}

.mind-node.variable {
  width: 264px;
}

.detail-dialog {
  width: min(940px, calc(100vw - 32px));
  max-height: min(820px, calc(100vh - 32px));
  padding: 0;
  overflow: hidden;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: var(--surface);
  color: var(--foreground);
  box-shadow: 0 24px 70px rgba(16, 27, 39, 0.28);
}

.detail-dialog::backdrop {
  background: rgba(15, 24, 34, 0.48);
  backdrop-filter: blur(2px);
}

.dialog-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 18px;
  padding: 18px 20px 15px;
  border-bottom: 1px solid var(--border);
}

.detail-id {
  display: block;
  margin-bottom: 4px;
  color: var(--primary);
  font-family: "SFMono-Regular", Consolas, monospace;
  font-size: 10px;
  overflow-wrap: anywhere;
}

.dialog-head h2 {
  margin: 0;
  font-size: 21px;
}

.close-button {
  width: 34px;
  height: 34px;
  padding: 0;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface-soft);
  color: var(--muted);
  font-size: 22px;
  line-height: 1;
  cursor: pointer;
}

.dialog-body {
  max-height: calc(100vh - 130px);
  overflow: auto;
  padding: 18px 20px 24px;
}

.detail-status,
.detail-tags,
.value-list,
.source-links {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  flex-wrap: wrap;
}

.detail-status {
  margin-bottom: 12px;
}

.badge,
.tag {
  display: inline-flex;
  align-items: center;
  width: fit-content;
  padding: 4px 8px;
  border-radius: 999px;
  background: var(--surface-soft);
  color: var(--foreground);
  font-size: 9px;
  white-space: nowrap;
}

.badge.existing {
  background: var(--primary-soft);
  color: var(--primary);
}

.badge.research {
  background: var(--accent-soft);
  color: var(--accent);
}

.badge.inferred {
  background: var(--proposed-soft);
  color: var(--proposed);
}

.badge.team {
  background: var(--team-soft);
  color: var(--team);
}

.badge.tbd {
  background: var(--danger-soft);
  color: var(--danger);
}

.detail-definition {
  margin: 0;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.7;
}

.detail-section {
  margin-top: 17px;
  padding-top: 15px;
  border-top: 1px solid var(--border);
}

.detail-section h3 {
  margin: 0 0 10px;
  font-size: 12px;
}

.detail-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 1px;
  overflow: hidden;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--border);
}

.detail-field {
  min-width: 0;
  padding: 9px;
  background: var(--surface);
}

.detail-field dt {
  margin-bottom: 5px;
  color: var(--muted);
  font-size: 9px;
}

.detail-field dd {
  margin: 0;
  font-size: 10px;
  line-height: 1.55;
  overflow-wrap: anywhere;
}

.value-list {
  align-items: stretch;
}

.value-item {
  display: grid;
  flex: 1 1 190px;
  max-width: 280px;
  gap: 3px;
  padding: 9px;
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 7px;
  background: var(--surface-soft);
}

.value-item.inferred {
  border-left-color: var(--proposed);
}

.value-item.tbd {
  border-left-color: var(--danger);
}

.value-item strong {
  font-size: 10px;
}

.value-item code,
.value-item small {
  color: var(--muted);
  font-size: 8px;
  line-height: 1.45;
  overflow-wrap: anywhere;
}

pre {
  max-height: 260px;
  margin: 0;
  padding: 10px;
  overflow: auto;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface-soft);
  color: var(--foreground);
  font-size: 9px;
  line-height: 1.55;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
}

.source-link {
  display: grid;
  flex: 1 1 250px;
  gap: 3px;
  padding: 9px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface-soft);
  text-decoration: none;
}

.source-link strong {
  color: var(--primary);
  font-size: 10px;
}

.source-link span {
  color: var(--muted);
  font-size: 8px;
  line-height: 1.45;
}

.notes {
  padding: 10px;
  border: 1px dashed var(--proposed);
  border-radius: 8px;
  color: var(--muted);
  font-size: 10px;
  line-height: 1.6;
}

.review-section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.review-section-head h3 {
  margin-bottom: 0;
}

.review-section-head > span {
  color: var(--muted);
  font-size: 9px;
}

.review-form {
  display: grid;
  grid-template-columns: minmax(150px, 240px) minmax(0, 1fr);
  gap: 9px;
  padding: 11px;
  border: 1px solid var(--border);
  border-radius: 9px;
  background: var(--surface-soft);
}

.review-form label {
  display: grid;
  gap: 5px;
  color: var(--muted);
  font-size: 9px;
}

.review-form input,
.review-form select,
.review-form textarea {
  width: 100%;
  padding: 8px 9px;
  border: 1px solid var(--border-strong);
  border-radius: 7px;
  background: var(--surface);
  color: var(--foreground);
  font-size: 10px;
}

.review-form textarea {
  resize: vertical;
  line-height: 1.55;
}

.review-message,
.review-submit-row {
  grid-column: 1 / -1;
}

.review-submit-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

#commentFormError {
  color: var(--danger);
  font-size: 9px;
}

.review-submit {
  padding: 8px 13px;
  border: 1px solid var(--primary);
  border-radius: 7px;
  background: var(--primary);
  color: var(--surface);
  font-size: 10px;
  font-weight: 700;
  cursor: pointer;
}

.review-comment-list {
  display: grid;
  gap: 8px;
  margin-top: 10px;
}

.empty-comments {
  margin: 0;
  padding: 10px;
  border: 1px dashed var(--border-strong);
  border-radius: 8px;
  color: var(--muted);
  font-size: 9px;
  text-align: center;
}

.review-comment {
  padding: 10px;
  border: 1px solid var(--border);
  border-left: 3px solid var(--team);
  border-radius: 8px;
  background: var(--surface-soft);
}

.review-comment.is-resolved {
  border-left-color: var(--primary);
  opacity: 0.72;
}

.review-comment-head,
.review-comment-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.review-comment-head strong {
  font-size: 10px;
}

.review-state {
  color: var(--muted);
  font-size: 8px;
}

.review-state {
  flex: none;
  padding: 3px 6px;
  border-radius: 999px;
  background: var(--surface);
}

.review-comment p {
  margin: 8px 0;
  font-size: 10px;
  line-height: 1.6;
  white-space: pre-wrap;
}

.review-comment-actions {
  justify-content: flex-end;
}

.review-comment-actions button {
  padding: 4px 7px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--muted);
  font-size: 8px;
  cursor: pointer;
}

.loading,
.load-error {
  padding: 80px 20px;
  color: var(--muted);
  font-size: 12px;
  text-align: center;
}

@media (max-width: 900px) {
  .app-header {
    align-items: flex-start;
    flex-direction: column;
  }

  .header-actions {
    justify-content: flex-start;
  }

  .ability-tabs {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .detail-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 640px) {
  .brand {
    align-items: flex-start;
    flex-direction: column;
    gap: 3px;
  }

  .ability-tabs {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .map-viewport {
    padding: 18px;
  }

  .detail-grid {
    grid-template-columns: 1fr;
  }

  .review-form {
    grid-template-columns: 1fr;
  }

  .review-form > * {
    grid-column: 1;
  }
}

@media (prefers-color-scheme: dark) {
  :root {
    color-scheme: dark;
    --background: #111820;
    --foreground: #eef3f8;
    --surface: #18222c;
    --surface-soft: #1e2a35;
    --muted: #a6b4c2;
    --border: #2e3d4b;
    --border-strong: #4a5c6e;
    --primary: #82c8b0;
    --primary-soft: #213d34;
    --group-human: #8ab6df;
    --group-human-soft: #233748;
    --group-perception: #91ca8d;
    --group-perception-soft: #263d2a;
    --group-motion: #efae70;
    --group-motion-soft: #443322;
    --accent: #84b9e4;
    --accent-soft: #22394c;
    --proposed: #e1b474;
    --proposed-soft: #42341f;
    --danger: #e4949d;
    --danger-soft: #47282c;
    --team: #baa7dc;
    --team-soft: #352e45;
    --shadow: 0 12px 30px rgba(0, 0, 0, 0.24);
  }
}

</style>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand-kicker">UAV BENCHMARK</span>
      <strong>JD 业务变量树</strong>
      <span>A1 · A2 · A3 · A4 · A5 · A6 · A7a · A7b · A8 · A9 · A10</span>
    </div>
    <div class="header-actions">
      <button class="review-action" id="importCommentsButton" type="button">导入建议</button>
      <button class="review-action" id="exportCommentsButton" type="button">
        导出建议 <span id="totalCommentCount">0</span>
      </button>
      <input id="commentImportInput" type="file" accept="application/json,.json" hidden>
    </div>
  </header>

  <main>
    <nav class="ability-tabs" id="abilityTabs" aria-label="能力树切换"></nav>

    <section class="map-panel">
      <header class="map-head">
        <div>
          <span class="eyebrow">MIND MAP</span>
          <h1 id="mapTitle">加载中</h1>
        </div>
        <span class="map-count" id="mapCount"></span>
      </header>
      <div class="map-viewport" id="mapViewport">
        <div class="mindmap" id="mindmap" aria-label="JD 思维导图"></div>
      </div>
    </section>
  </main>

  <dialog class="detail-dialog" id="detailDialog" aria-labelledby="detailTitle">
    <div class="dialog-head">
      <div>
        <span class="detail-id" id="detailId"></span>
        <h2 id="detailTitle"></h2>
      </div>
      <button class="close-button" id="closeDialogButton" type="button" aria-label="关闭详情">×</button>
    </div>

  <script>
(function () {
  "use strict";

  const DATA_URL = "knowledge/jd_variable_tree_version1.json";
  const COMMENT_STORAGE_KEY = "uav-benchmark-jd-comments-version1";
  const abilities = {
    A1: "意图 / 交互入口",
    A2: "任务规范 / 约束模型",
    A3: "意图推理 / 任务解释",

    A7a: "自定位",
    A7b: "相对定位 / 相对几何",

    A9: "导航与航迹执行",
    A10: "飞行控制 / 执行机构",
  };
  const abilityVisualGroup = {
    A1: "human",
    A2: "human",
    A3: "human",
    A4: "human",
    A5: "human",
    A6: "perception",
    A7a: "perception",
    A7b: "perception",
    A8: "perception",
    A9: "motion",
    A10: "motion",
  };
  const scenarioLabels = {
    cross_scenario: "跨业务场景",
    highway_inspection: "高速巡检",
    campus_inspection: "园区巡检",
    white_wall_narrow_gap: "白墙窄缝穿梭",
  };
  const configurationLabels = {
    world: "世界侧",
    user: "用户侧",
    shared: "双侧共享",
    TBD: "TBD",
  };
  const projectionLabels = {
    world_config: "世界侧 Config",
    user_config: "用户侧 Config",
    sut_input: "SUT 输入",
    harness: "Harness",
    TBD: "TBD",
  };
  const observationLabels = {
    sut_input: "SUT 输入",
    sut_trace: "SUT Trace",
    fixture: "Fixture",
    grader: "Grader",
    hidden_gt: "Hidden GT",
    TBD: "TBD",
  };
  const visibilityLabels = {
    sut_visible: "SUT 可见",
    fixture_only: "Fixture 专用",
    grader_visible: "Grader 可见",
    grader_only: "Grader 专用",
    hidden_gt: "Hidden GT",
  };
  const difficultyLabels = {
    increasing: "递增",
    decreasing: "递减",
    neutral: "中性",
    context_dependent: "依上下文",
    non_monotonic: "非单调",
    TBD: "TBD",
  };
  const statusLabels = {
    authoritative_existing: ["已有定义", "existing"],
    source_supported: ["研究补充", "research"],
    inferred_candidate: ["推断候选", "inferred"],
    team_material_only: ["团队资料", "team"],
    TBD: ["待确认 / TBD", "tbd"],
  };
  const derivationLabels = {
    given: ["资料原文 / 已给定", "existing"],
    derived: ["合理归纳", "research"],
    proposed: ["待确认建议", "inferred"],
    TBD: ["TBD", "tbd"],
  };
  const reviewTopicLabels = {
    naming: "命名",
    definition: "定义",
    value_domain: "候选取值",
    hierarchy: "层级 / 归属",
    source: "来源依据",
    other: "其他",
  };

  const state = {
    catalog: null,
    nodes: [],
    nodeById: new Map(),
    sourceById: new Map(),
    childrenByParent: new Map(),
    selectedAbility: "A1",
    highlightedNodeId: null,
    activeNodeId: null,
    comments: [],
    storageAvailable: true,
  };

  const elements = {
    abilityTabs: document.getElementById("abilityTabs"),
    mapTitle: document.getElementById("mapTitle"),
    mapCount: document.getElementById("mapCount"),
    mapViewport: document.getElementById("mapViewport"),
    mindmap: document.getElementById("mindmap"),
    dialog: document.getElementById("detailDialog"),
    closeDialogButton: document.getElementById("closeDialogButton"),
    detailId: document.getElementById("detailId"),
    detailTitle: document.getElementById("detailTitle"),
    dialogBody: document.getElementById("dialogBody"),
    importCommentsButton: document.getElementById("importCommentsButton"),
    exportCommentsButton: document.getElementById("exportCommentsButton"),
    commentImportInput: document.getElementById("commentImportInput"),
    totalCommentCount: document.getElementById("totalCommentCount"),
  };

  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function shortId(nodeId) {
    const abilityRoot = nodeId.match(
      /^PROPOSED-jd-tree-(A1|A2|A3|A4|A5|A6|A7a|A7b|A8|A9|A10)$/,
    );
    if (abilityRoot) return abilityRoot[1];
    return nodeId.replace(/^PROPOSED-/, "");
  }

  function loadReviewState() {
    try {
      state.comments = JSON.parse(
        window.localStorage.getItem(COMMENT_STORAGE_KEY) || "[]",
      );
      if (!Array.isArray(state.comments)) state.comments = [];
    } catch (error) {
      state.storageAvailable = false;
      state.comments = [];
      console.warn("修改建议无法写入本地存储，将仅保留在当前页面会话中。", error);
    }
  }

  function saveReviewState() {
    if (!state.storageAvailable) return;
    try {
      window.localStorage.setItem(
        COMMENT_STORAGE_KEY,
        JSON.stringify(state.comments),
      );
    } catch (error) {
      state.storageAvailable = false;
      console.warn("修改建议无法写入本地存储，将仅保留在当前页面会话中。", error);
    }
  }

  function commentsForNode(nodeId) {
    return state.comments
      .filter((comment) => comment.node_id === nodeId)
      .sort((a, b) => String(b.created_at).localeCompare(String(a.created_at)));
  }

  function updateReviewCount() {
    elements.totalCommentCount.textContent = String(state.comments.length);
  }

  function statusOf(item) {
    return (
      statusLabels[item.evidence_status || item.status] || [
        item.evidence_status || item.status || "未标注",
        "tbd",
      ]
    );
  }

  function badge(label, className = "") {
    return `<span class="badge ${className}">${escapeHtml(label)}</span>`;
  }

  function tags(values, labels = {}) {
    if (!values || values.length === 0) return '<span class="tag">—</span>';
    return values
      .map((value) => `<span class="tag">${escapeHtml(labels[value] || value)}</span>`)
      .join("");
  }

  function buildIndexes() {
    state.nodes = state.catalog.nodes;
    state.nodeById = new Map(
      state.nodes.map((node) => [node.node_id, node]),
    );
    state.sourceById = new Map(
      state.catalog.sources.map((source) => [source.source_id, source]),
    );
    state.childrenByParent = new Map();
    for (const node of state.nodes) {
      if (!state.childrenByParent.has(node.parent_id)) {
        state.childrenByParent.set(node.parent_id, []);
      }
      state.childrenByParent.get(node.parent_id).push(node);
    }
    migrateLegacyComments();
  }

  function migrateLegacyComments() {
    const aliasToNodeId = new Map();
    for (const node of state.nodes) {
      for (const alias of node.legacy_aliases || []) {
        if (!aliasToNodeId.has(alias)) aliasToNodeId.set(alias, node.node_id);
      }
    }
    let changed = false;
    for (const comment of state.comments) {
      if (!state.nodeById.has(comment.node_id) && aliasToNodeId.has(comment.node_id)) {
        comment.legacy_node_id = comment.node_id;
        comment.node_id = aliasToNodeId.get(comment.node_id);
        comment.ability = state.nodeById.get(comment.node_id)?.owner_a || null;
        comment.updated_at = new Date().toISOString();
        changed = true;
      }
    }
    if (changed) saveReviewState();
  }

  function renderTabs() {
    elements.abilityTabs.innerHTML = Object.entries(abilities)
      .map(([ability, name]) => {
        const count = state.nodes.filter(
          (node) => node.owner_a === ability && node.node_kind === "variable",
        ).length;
        return `<button class="ability-tab group-${abilityVisualGroup[ability]}" type="button" role="tab"
          data-ability="${ability}"
          aria-selected="${ability === state.selectedAbility}">
          <strong>${ability} · ${escapeHtml(name)}</strong>
          <span>${count} 个变量叶子</span>
        </button>`;
      })
      .join("");
  }

  function nodeClass(node) {
    if (node.node_kind === "capability_root") return "root";
    if (node.review_status === "reviewed") return "canonical";
    if (node.node_kind === "group") return "group";
    return "variable";
  }

  function renderBranch(node) {
    const children = state.childrenByParent.get(node.node_id) || [];
    const hasChildren = children.length > 0;
    const highlighted = state.highlightedNodeId === node.node_id;
    const commentCount = commentsForNode(node.node_id).length;
    return `<div class="mind-branch${hasChildren ? " has-children" : ""}">
      <button class="mind-node ${nodeClass(node)}${highlighted ? " is-highlighted" : ""}"
        type="button" data-node-id="${escapeHtml(node.node_id)}"
        aria-label="${escapeHtml(`${shortId(node.node_id)} ${node.name}，打开详情`)}">
        <code>${escapeHtml(shortId(node.node_id))}</code>
        <span>${escapeHtml(node.name)}</span>
        ${
          commentCount
            ? `<b class="comment-count" aria-label="${commentCount} 条修改建议">${commentCount}</b>`
            : ""
        }
      </button>
      ${
        hasChildren
          ? `<div class="mind-children">${children
              .map(
                (child) =>
                  `<div class="mind-child">${renderBranch(child)}</div>`,
              )
              .join("")}</div>`
          : ""
      }
    </div>`;
  }

  function renderMap() {
    const root = state.nodeById.get(
      `PROPOSED-jd-tree-${state.selectedAbility}`,
    );
    const count = state.nodes.filter(
      (node) => node.owner_a === state.selectedAbility,
    ).length;
    elements.mapTitle.textContent = `${state.selectedAbility} · ${abilities[state.selectedAbility]}`;
    elements.mapCount.textContent = `${count} 个节点，点击任一标签查看详情`;
    elements.mindmap.innerHTML = root
      ? renderBranch(root)
      : '<div class="load-error">未找到能力树。</div>';
    document.body.dataset.abilityGroup =
      abilityVisualGroup[state.selectedAbility] || "human";
    requestAnimationFrame(() => {
      layoutConnectorSpines();
      centerMapRoot();
    });
  }

  function layoutConnectorSpines() {
    const childGroups = elements.mindmap.querySelectorAll(".mind-children");
    for (const childGroup of childGroups) {
      const directChildren = Array.from(childGroup.children).filter((child) =>
        child.classList.contains("mind-child"),
      );
      if (directChildren.length < 2) {
        childGroup.style.setProperty("--spine-height", "0px");
        continue;
      }

      const firstNode = directChildren[0].querySelector(
        ":scope > .mind-branch > .mind-node",
      );
      const lastNode = directChildren.at(-1).querySelector(
        ":scope > .mind-branch > .mind-node",
      );
      if (!firstNode || !lastNode) continue;

      const groupRect = childGroup.getBoundingClientRect();
      const firstRect = firstNode.getBoundingClientRect();
      const lastRect = lastNode.getBoundingClientRect();
      const spineTop =
        firstRect.top - groupRect.top + firstRect.height / 2;
      const spineBottom =
        lastRect.top - groupRect.top + lastRect.height / 2;

      childGroup.style.setProperty("--spine-top", `${spineTop}px`);
      childGroup.style.setProperty(
        "--spine-height",
        `${Math.max(0, spineBottom - spineTop)}px`,
      );
    }
  }

  function centerMapRoot() {
    const rootNode = elements.mindmap.querySelector(".mind-node.root");
    if (!rootNode) return;
    const viewportPaddingLeft =
      Number.parseFloat(
        window.getComputedStyle(elements.mapViewport).paddingLeft,
      ) || 0;
    const horizontalInset = Math.max(
      0,
      (elements.mapViewport.clientWidth - rootNode.offsetWidth) / 2 -
        viewportPaddingLeft,
    );
    elements.mindmap.style.paddingLeft = `${horizontalInset}px`;
    requestAnimationFrame(() => {
      const viewportRect = elements.mapViewport.getBoundingClientRect();
      const rootRect = rootNode.getBoundingClientRect();
      const rootCenter =
        rootRect.top -
        viewportRect.top +
        elements.mapViewport.scrollTop +
        rootRect.height / 2;
      elements.mapViewport.scrollTop = Math.max(
        0,
        rootCenter - elements.mapViewport.clientHeight / 2,
      );
      elements.mapViewport.scrollLeft = 0;
    });
  }

  function selectAbility(ability) {
    state.selectedAbility = ability;
    renderTabs();
    renderMap();
  }

  function detailField(label, value) {
    return `<div class="detail-field"><dt>${escapeHtml(label)}</dt><dd>${value}</dd></div>`;
  }

  function renderDomain(node) {
    const domain = node.value_domain;
    if (domain === null || domain === undefined) {
      return '<span class="tag">该节点是结构分组，无取值域</span>';
    }
    if (!Array.isArray(domain)) {
      return `<pre>${escapeHtml(JSON.stringify(domain, null, 2))}</pre>`;
    }
    if (domain.length === 0) return '<span class="tag">候选取值待补充</span>';
    return `<div class="value-list">${domain
      .map((item) => {
        if (item === null || typeof item !== "object") {
          return `<div class="value-item"><strong>${escapeHtml(item)}</strong></div>`;
        }
        const [, statusClass] = statusOf(item);
        return `<div class="value-item ${statusClass}">
          <strong>${escapeHtml(item.label_zh || item.value)}</strong>
          <code>${escapeHtml(item.value)}</code>
          <small>${escapeHtml(
            [
              statusLabels[item.status]?.[0] || item.status,
              (item.applicable_scenarios || [])
                .map((scenario) => scenarioLabels[scenario] || scenario)
                .join("、"),
              (item.source_refs || []).join("、"),
            ]
              .filter(Boolean)
              .join(" · "),
          )}</small>
        </div>`;
      })
      .join("")}</div>`;
  }

  function renderSources(node) {
    if (!node.source || node.source.length === 0) {
      return '<span class="tag">暂无来源</span>';
    }
    return `<div class="source-links">${node.source
      .map((sourceId) => {
        const source = state.sourceById.get(sourceId);
        const content = `<strong>${escapeHtml(sourceId)} · ${escapeHtml(
          source?.title || sourceId,
        )}</strong><span>${escapeHtml(
          [source?.issuer, source?.locator].filter(Boolean).join(" · "),
        )}</span>`;
        return source?.url
          ? `<a class="source-link" href="${escapeHtml(source.url)}" target="_blank" rel="noreferrer">${content}</a>`
          : `<div class="source-link">${content}</div>`;
      })
      .join("")}</div>`;
  }

  function renderConditions(node) {
    const conditions = {
      activation_condition: node.activation_condition,
      depends_on: node.depends_on,
      mutual_exclusion_group: node.mutual_exclusion_group,
      constraints: node.constraints,
    };
    const hasValue = Object.values(conditions).some(
      (value) =>
        value !== null &&
        value !== undefined &&
        (!Array.isArray(value) || value.length > 0),
    );
    return hasValue
      ? `<section class="detail-section"><h3>启用条件与依赖</h3><pre>${escapeHtml(
          JSON.stringify(conditions, null, 2),
        )}</pre></section>`
      : "";
  }

  function formatCommentTime(value) {
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return String(value || "");
    return date.toLocaleString("zh-CN", { hour12: false });
  }

  function renderCommentSection(node) {
    const comments = commentsForNode(node.node_id);
    const topicOptions = Object.entries(reviewTopicLabels)
      .map(
        ([value, label]) =>
          `<option value="${value}">${escapeHtml(label)}</option>`,
      )
      .join("");
    const commentItems = comments.length
      ? comments
          .map(
            (comment) => `<article class="review-comment${
              comment.status === "resolved" ? " is-resolved" : ""
            }">
              <div class="review-comment-head">
                <strong>${escapeHtml(
                  reviewTopicLabels[comment.topic] || comment.topic || "其他",
                )} · ${escapeHtml(formatCommentTime(comment.created_at))}</strong>
                <span class="review-state">${
                  comment.status === "resolved" ? "已处理" : "待处理"
                }</span>
              </div>
              <p>${escapeHtml(comment.body)}</p>
              <div class="review-comment-actions">
                <button type="button" data-comment-action="toggle"
                  data-comment-id="${escapeHtml(comment.comment_id)}">${
                    comment.status === "resolved" ? "重新打开" : "标记已处理"
                  }</button>
                <button type="button" data-comment-action="delete"
                  data-comment-id="${escapeHtml(comment.comment_id)}">删除</button>
              </div>
            </article>`,
          )
          .join("")
      : '<p class="empty-comments">这个节点还没有修改建议。</p>';

    return `<section class="detail-section review-section">
      <div class="review-section-head">
        <h3>修改建议</h3>
        <span>${comments.length} 条</span>
      </div>
      <div class="review-form">
        <label>
          <span>评论类型</span>
          <select id="commentTopic">${topicOptions}</select>
        </label>
        <label class="review-message">
          <span>评论内容</span>
          <textarea id="commentMessage" rows="3" maxlength="2000"
            placeholder="填写修改建议"></textarea>
        </label>
        <div class="review-submit-row">
          <span id="commentFormError" role="alert"></span>
          <button class="review-submit" type="button"
            data-comment-action="add" data-node-id="${escapeHtml(
              node.node_id,
            )}">添加建议</button>
        </div>
      </div>
      <div class="review-comment-list">${commentItems}</div>
    </section>`;
  }

  function openNode(nodeId) {
    const node = state.nodeById.get(nodeId);
    if (!node) return;
    state.activeNodeId = nodeId;
    state.highlightedNodeId = nodeId;
    if (node.owner_a !== state.selectedAbility) {
      state.selectedAbility = node.owner_a;
      renderTabs();
    }
    renderMap();

    const [statusLabel, statusClass] = statusOf(node);
    const [derivationLabel, derivationClass] =
      derivationLabels[node.derivation_status] || [
        node.derivation_status || "未标注",
        "tbd",
      ];
    elements.detailId.textContent = node.node_id;
    elements.detailTitle.textContent = node.name;
    const related = [
      ...(node.related_global_jd || []),
      ...(node.related_jd || []),
    ];
    elements.dialogBody.innerHTML = `
      <div class="detail-status">
        ${badge(statusLabel, statusClass)}
        ${badge(derivationLabel, derivationClass)}
        ${badge(node.review_status)}
        ${badge(node.owner_a)}
        ${badge(node.node_kind)}
      </div>
      <p class="detail-definition">${escapeHtml(node.definition)}</p>

      <section class="detail-section">
        <h3>节点属性</h3>
        <dl class="detail-grid">
          ${detailField("显示编号", `<code>${escapeHtml(shortId(node.node_id))}</code>`)}
          ${detailField("正式槽位", `<code>${escapeHtml(node.canonical_slot || "—")}</code>`)}
          ${detailField("旧编号 / 别名", tags(node.legacy_aliases))}
          ${detailField("父节点", `<code>${escapeHtml(node.parent_id || "—")}</code>`)}
          ${detailField("值类型", escapeHtml(node.value_type))}
          ${detailField("配置归属", escapeHtml(configurationLabels[node.configuration_side] || node.configuration_side))}
          ${detailField("配置投影", tags(node.projection_targets, projectionLabels))}
          ${detailField("可见性", tags(node.visibility, visibilityLabels))}
          ${detailField("观察通道", tags(node.observation_channel, observationLabels))}
          ${detailField("难度方向", escapeHtml(difficultyLabels[node.difficulty_direction] || node.difficulty_direction))}
          ${detailField("适用场景", tags(node.applicable_scenarios, scenarioLabels))}
          ${detailField("A×L 使用关系", tags(node.used_by_axl))}
          ${detailField("相关 JD", tags(related))}
          ${detailField("多重性", escapeHtml(node.multiplicity))}
          ${detailField("证据状态", escapeHtml(node.evidence_status))}
          ${detailField("推导状态", escapeHtml(node.derivation_status))}
        </dl>
      </section>

      <section class="detail-section">
        <h3>候选取值 / 取值范围</h3>
        ${renderDomain(node)}
      </section>

      ${renderConditions(node)}

      <section class="detail-section">
        <h3>定义依据</h3>
        ${renderSources(node)}
      </section>

      ${
        node.notes
          ? `<section class="detail-section"><h3>审阅备注</h3><div class="notes">${escapeHtml(node.notes)}</div></section>`
          : ""
      }

      ${renderCommentSection(node)}
    `;
    if (!elements.dialog.open) elements.dialog.showModal();
  }

  function addComment(nodeId) {
    const topicInput = document.getElementById("commentTopic");
    const messageInput = document.getElementById("commentMessage");
    const errorElement = document.getElementById("commentFormError");
    const body = messageInput?.value.trim() || "";
    if (!body) {
      if (errorElement) errorElement.textContent = "请填写建议内容。";
      return;
    }

    const now = new Date().toISOString();
    state.comments.push({
      comment_id:
        window.crypto?.randomUUID?.() ||
        `comment-${Date.now()}-${Math.random().toString(16).slice(2)}`,
      node_id: nodeId,
      ability: state.nodeById.get(nodeId)?.owner_a || null,
      topic: topicInput?.value || "other",
      body,
      status: "open",
      created_at: now,
      updated_at: now,
    });
    saveReviewState();
    updateReviewCount();
    renderMap();
    openNode(nodeId);
  }

  function updateComment(commentId, action) {
    const index = state.comments.findIndex(
      (comment) => comment.comment_id === commentId,
    );
    if (index < 0) return;
    if (action === "delete") {
      if (!window.confirm("确定删除这条评论吗？")) return;
      state.comments.splice(index, 1);
    } else if (action === "toggle") {
      state.comments[index].status =
        state.comments[index].status === "resolved" ? "open" : "resolved";
      state.comments[index].updated_at = new Date().toISOString();
    }
    saveReviewState();
    updateReviewCount();
    renderMap();
    if (state.activeNodeId) openNode(state.activeNodeId);
  }

  function exportComments() {
    const payload = {
      schema: "uav-benchmark-jd-review-comments",
      schema_version: "1.0",
      catalog_id: state.catalog.catalog_id,
      catalog_version: state.catalog.catalog_version,
      exported_at: new Date().toISOString(),
      comments: state.comments,
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], {
      type: "application/json",
    });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    const date = new Date().toISOString().slice(0, 10).replaceAll("-", "");
    link.href = url;
    link.download = `JD业务变量树_修改建议_${date}.json`;
    document.body.append(link);
    link.click();
    link.remove();
    URL.revokeObjectURL(url);
  }

  async function importComments(file) {
    const payload = JSON.parse(await file.text());
    if (
      payload.schema !== "uav-benchmark-jd-review-comments" ||
      !Array.isArray(payload.comments)
    ) {
      throw new Error("不是有效的 JD 变量树修改建议文件。");
    }
    const commentsById = new Map(
      state.comments.map((comment) => [comment.comment_id, comment]),
    );
    let importedCount = 0;
    for (const comment of payload.comments) {
      if (
        !comment ||
        typeof comment.comment_id !== "string" ||
        typeof comment.node_id !== "string" ||
        typeof comment.body !== "string"
      ) {
        continue;
      }
      if (!state.nodeById.has(comment.node_id)) continue;
      const existing = commentsById.get(comment.comment_id);
      if (
        !existing ||
        String(comment.updated_at || "") >
          String(existing.updated_at || "")
      ) {
        commentsById.set(comment.comment_id, comment);
        importedCount += 1;
      }
    }
    state.comments = Array.from(commentsById.values());
    saveReviewState();
    updateReviewCount();
    renderMap();
    if (state.activeNodeId && elements.dialog.open) {
      openNode(state.activeNodeId);
    }
    window.alert(`已导入或更新 ${importedCount} 条修改建议。`);
  }

  function bindEvents() {
    elements.abilityTabs.addEventListener("click", (event) => {
      const button = event.target.closest("[data-ability]");
      if (button) {
        state.highlightedNodeId = null;
        selectAbility(button.dataset.ability);
      }
    });

    elements.mindmap.addEventListener("click", (event) => {
      const button = event.target.closest("[data-node-id]");
      if (button) openNode(button.dataset.nodeId);
    });

    elements.closeDialogButton.addEventListener("click", () =>
      elements.dialog.close(),
    );
    elements.dialog.addEventListener("click", (event) => {
      if (event.target === elements.dialog) elements.dialog.close();
    });
    elements.dialogBody.addEventListener("click", (event) => {
      const button = event.target.closest("[data-comment-action]");
      if (!button) return;
      const action = button.dataset.commentAction;
      if (action === "add") {
        addComment(button.dataset.nodeId);
      } else {
        updateComment(button.dataset.commentId, action);
      }
    });
    elements.importCommentsButton.addEventListener("click", () =>
      elements.commentImportInput.click(),
    );
    elements.exportCommentsButton.addEventListener("click", exportComments);
    elements.commentImportInput.addEventListener("change", async () => {
      const [file] = elements.commentImportInput.files || [];
      if (!file) return;
      try {
        await importComments(file);
      } catch (error) {
        window.alert(error.message);
      } finally {
        elements.commentImportInput.value = "";
      }
    });
    window.addEventListener("resize", () => {
      layoutConnectorSpines();
      centerMapRoot();
    });
  }

  async function init() {
    try {
      if (window.__JD_VARIABLE_TREE_CATALOG__) {
        state.catalog = window.__JD_VARIABLE_TREE_CATALOG__;
      } else {
        const response = await fetch(DATA_URL, { cache: "no-store" });
        if (!response.ok) throw new Error(`数据加载失败：${response.status}`);
        state.catalog = await response.json();
      }
      loadReviewState();
      buildIndexes();
      updateReviewCount();
      renderTabs();
      renderMap();
      bindEvents();
    } catch (error) {
      elements.mindmap.innerHTML = `<div class="load-error">${escapeHtml(
        error.message,
      )}<br>请通过 127.0.0.1:8766 打开本页。</div>`;
      console.error(error);
    }
  }

  init();
})();

  </script>
</body>
</html>
