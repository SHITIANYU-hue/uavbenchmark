<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <link rel="icon" href="data:,">
  <title>UAV Benchmark Pipeline Console</title>
  <style>
    :root {
      --bg: #f3f6f8;
      --panel: #ffffff;
      --panel-soft: #f8fafb;
      --line: #dbe3e8;
      --line-strong: #c5d1d8;
      --text: #162837;
      --muted: #657786;
      --teal: #087d79;
      --teal-soft: #e3f3f1;
      --blue: #315fa3;
      --blue-soft: #eaf0f8;
      --green: #52771a;
      --green-soft: #edf4df;
      --amber: #9a5b08;
      --amber-soft: #fff3df;
      --red: #ae3e49;
      --red-soft: #fae9eb;
      --shadow: 0 14px 38px rgba(29, 54, 70, .09);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-width: 320px; min-height: 100%; }
    body {
      color: var(--text);
      background:
        radial-gradient(circle at 85% 0%, rgba(8,125,121,.08), transparent 28rem),
        var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }
    button, textarea, input { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .48; }
    :focus-visible { outline: 3px solid rgba(8,125,121,.28); outline-offset: 2px; }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 64px;
      padding: 0 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(16px);
    }
    .brand { display: flex; align-items: center; gap: 11px; min-width: 0; }
    .brand-mark {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      color: var(--teal);
      border: 1px solid rgba(8,125,121,.24);
      border-radius: 11px;
      background: var(--teal-soft);
      font-size: 11px;
      font-weight: 850;
      letter-spacing: .08em;
    }
    .brand b { display: block; font-size: 14px; }
    .brand span { display: block; color: var(--muted); font-size: 10px; }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    .case-select {
      min-height: 38px;
      max-width: 245px;
      padding: 7px 30px 7px 10px;
      color: var(--text);
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      background: #ffffff;
      font-size: 11px;
      font-weight: 720;
    }
    .mode-badge {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 5px 10px;
      color: var(--amber);
      border: 1px solid #ecd3a8;
      border-radius: 999px;
      background: var(--amber-soft);
      font-size: 10px;
      font-weight: 850;
      letter-spacing: .08em;
    }
    .btn {
      min-height: 38px;
      padding: 8px 13px;
      color: var(--text);
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      background: #ffffff;
      font-size: 12px;
      font-weight: 750;
    }
    .btn:hover:not(:disabled) { border-color: rgba(8,125,121,.48); background: var(--teal-soft); }
    .btn.primary { color: #ffffff; border-color: var(--teal); background: var(--teal); }
    .btn.primary:hover:not(:disabled) { background: #066d69; }
    .btn.danger { color: var(--red); border-color: #ebc3c8; background: var(--red-soft); }
    .btn.small { min-height: 31px; padding: 5px 9px; font-size: 10px; }

    .stage-shell {
      position: sticky;
      top: 64px;
      z-index: 20;
      padding: 12px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(243,246,248,.95);
      backdrop-filter: blur(12px);
    }
    .stage-rail {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 7px;
      max-width: 1500px;
      margin: 0 auto;
      overflow-x: auto;
    }
    .stage-node {
      position: relative;
      min-width: 92px;
      min-height: 58px;
      padding: 8px 9px;
      text-align: left;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 11px;
      background: rgba(255,255,255,.78);
    }
    .stage-node span { display: block; font-size: 9px; font-weight: 850; letter-spacing: .08em; }
    .stage-node b { display: block; margin-top: 3px; color: inherit; font-size: 10px; }
    .stage-node.current { color: var(--teal); border-color: rgba(8,125,121,.42); background: var(--teal-soft); }
    .stage-node.done { color: var(--green); border-color: #d4e3b6; background: var(--green-soft); }
    .stage-node.locked { color: #9aa7af; background: #f1f4f5; }
    .stage-node::after {
      content: "";
      position: absolute;
      right: -8px;
      top: 50%;
      z-index: 2;
      width: 8px;
      height: 1px;
      background: var(--line-strong);
    }
    .stage-node:last-child::after { display: none; }

    .console {
      display: grid;
      grid-template-columns: 250px minmax(520px, 1fr) 290px;
      gap: 16px;
      width: min(calc(100% - 32px), 1500px);
      margin: 18px auto 30px;
      align-items: start;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .side-panel { position: sticky; top: 150px; overflow: hidden; }
    .side-head { padding: 17px 18px 12px; border-bottom: 1px solid var(--line); }
    .side-head .eyebrow, .workspace-head .eyebrow {
      color: var(--teal);
      font-size: 9px;
      font-weight: 850;
      letter-spacing: .13em;
      text-transform: uppercase;
    }
    .side-head h2 { margin: 5px 0 0; font-size: 16px; }
    .side-body { padding: 15px 18px 18px; }
    .context-block + .context-block { margin-top: 17px; padding-top: 15px; border-top: 1px solid var(--line); }
    .context-label { color: var(--muted); font-size: 9px; font-weight: 800; letter-spacing: .09em; text-transform: uppercase; }
    .context-value { margin-top: 5px; font-size: 12px; font-weight: 720; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .mini-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
    .mini-tag {
      padding: 3px 6px;
      color: #425b6c;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-soft);
      font-size: 9px;
    }
    .mini-tag.scored { color: var(--teal); border-color: #b9dcd9; background: var(--teal-soft); }
    .mini-tag.dep { color: var(--blue); border-color: #c8d5e7; background: var(--blue-soft); }
    .pending-count { color: var(--amber); font-size: 23px; font-weight: 850; }
    .progress-track { height: 7px; overflow: hidden; margin-top: 8px; border-radius: 999px; background: #edf1f3; }
    .progress-fill { height: 100%; border-radius: inherit; background: var(--teal); transition: width .25s ease; }

    .workspace { min-height: 650px; overflow: hidden; }
    .workspace-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      padding: 22px 24px 18px;
      border-bottom: 1px solid var(--line);
    }
    .workspace-head h1 { margin: 5px 0 0; font-size: clamp(22px, 3vw, 32px); line-height: 1.18; letter-spacing: -.035em; }
    .stage-state { color: var(--muted); font-size: 10px; font-weight: 800; }
    .workspace-body { padding: 22px 24px 25px; }
    .intro { margin: 0 0 18px; color: var(--muted); font-size: 12px; }
    .field-label { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 7px; color: #42596a; font-size: 11px; font-weight: 750; }
    .field-label span { color: var(--muted); font-size: 9px; font-weight: 600; }
    .task-input {
      width: 100%;
      min-height: 330px;
      resize: vertical;
      padding: 15px;
      color: var(--text);
      border: 1px solid var(--line-strong);
      border-radius: 13px;
      background: var(--panel-soft);
      font-size: 12px;
      line-height: 1.75;
    }
    .action-row { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 10px; margin-top: 16px; }
    .action-note { color: var(--muted); font-size: 10px; }

    .choice-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .choice-card {
      position: relative;
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: var(--panel-soft);
    }
    .choice-card.selected { border-color: rgba(8,125,121,.42); background: var(--teal-soft); }
    .choice-card.dependency.selected { border-color: #b8cbe2; background: var(--blue-soft); }
    .choice-card input { position: absolute; top: 14px; right: 14px; accent-color: var(--teal); }
    .choice-code { color: var(--teal); font-size: 18px; font-weight: 850; letter-spacing: -.025em; }
    .choice-card.dependency .choice-code { color: var(--blue); }
    .choice-card b { display: block; margin-top: 4px; font-size: 12px; }
    .choice-card p { margin: 7px 0 0; color: var(--muted); font-size: 10px; }
    .group-label { margin: 18px 0 9px; color: var(--muted); font-size: 9px; font-weight: 850; letter-spacing: .1em; text-transform: uppercase; }

    .coverage-review-grid { display: grid; gap: 9px; }
    .coverage-review-row { padding: 12px; border: 1px solid var(--line); border-radius: 11px; background: var(--panel-soft); }
    .coverage-review-head { display: grid; grid-template-columns: minmax(90px, .7fr) minmax(150px, 1.1fr) minmax(130px, 1fr); gap: 9px; align-items: end; }
    .coverage-review-cell { color: var(--teal); font-size: 15px; font-weight: 850; }
    .review-control label { display: block; margin-bottom: 4px; color: var(--muted); font-size: 8px; font-weight: 780; }
    .review-control select, .review-control input, .manual-editor input, .manual-editor select, .manual-editor textarea {
      width: 100%; padding: 8px 9px; color: var(--text); border: 1px solid var(--line-strong); border-radius: 8px; background: #fff; font-size: 10px;
    }
    .coverage-responsibilities { margin: 9px 0 0; padding-left: 18px; color: var(--muted); font-size: 9px; }
    .dependency-list { display: grid; gap: 7px; }
    .dependency-row { display: flex; justify-content: space-between; gap: 12px; align-items: center; padding: 10px; border: 1px solid var(--line); border-radius: 10px; background: var(--blue-soft); }
    .dependency-row b { display: block; font-size: 10px; }
    .dependency-row p { margin: 3px 0 0; color: var(--muted); font-size: 9px; }
    .manual-editor { margin-top: 9px; overflow: hidden; border: 1px solid var(--line); border-radius: 11px; background: var(--panel-soft); }
    .manual-editor summary { padding: 10px 12px; cursor: pointer; color: var(--blue); font-size: 10px; font-weight: 800; }
    .manual-editor-body { padding: 0 12px 12px; }
    .manual-editor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .manual-editor-grid label { color: var(--muted); font-size: 8px; font-weight: 780; }
    .manual-editor-grid label.wide { grid-column: 1 / -1; }
    .manual-editor textarea { min-height: 68px; resize: vertical; }

    .data-table { width: 100%; border-collapse: collapse; font-size: 10px; }
    .data-table th, .data-table td { padding: 10px 8px; text-align: left; vertical-align: top; border-bottom: 1px solid var(--line); }
    .data-table th { color: var(--muted); font-size: 9px; letter-spacing: .07em; text-transform: uppercase; }
    .status-pill {
      display: inline-flex;
      padding: 3px 7px;
      border-radius: 999px;
      font-size: 8px;
      font-weight: 850;
      letter-spacing: .05em;
      white-space: nowrap;
    }
    .status-pill.given, .status-pill.valid, .status-pill.observed { color: var(--green); background: var(--green-soft); }
    .status-pill.proposed, .status-pill.current { color: var(--teal); background: var(--teal-soft); }
    .status-pill.tbd, .status-pill.indeterminate { color: var(--amber); background: var(--amber-soft); }
    .status-pill.risk, .status-pill.failed { color: var(--red); background: var(--red-soft); }
    .status-pill.dep { color: var(--blue); background: var(--blue-soft); }

    .validation-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 14px 0; }
    .validation-card { padding: 11px; border: 1px solid #d7e4c0; border-radius: 10px; background: var(--green-soft); }
    .validation-card b { display: block; color: var(--green); font-size: 9px; }
    .validation-card span { display: block; margin-top: 3px; color: #4c625a; font-size: 8px; }
    .code-preview {
      max-height: 340px;
      overflow: auto;
      margin: 0;
      padding: 15px;
      color: #304b5d;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f1f5f7;
      font: 10px/1.65 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      white-space: pre-wrap;
    }
    .template-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 0 10px; }
    .template-tab { padding: 7px 10px; color: var(--muted); border: 1px solid var(--line); border-radius: 8px; background: #ffffff; font-size: 9px; font-weight: 760; }
    .template-tab.active { color: var(--teal); border-color: #b7d9d6; background: var(--teal-soft); }
    .natural-template {
      max-height: 430px;
      overflow: auto;
      padding: 18px;
      color: #294354;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfcfd;
      font-size: 11px;
      line-height: 1.85;
      white-space: pre-wrap;
    }
    .natural-template mark { color: #075d5a; background: var(--teal-soft); border-radius: 4px; }
    .scenario-summary { padding: 16px; border: 1px solid #b7d9d6; border-radius: 12px; background: var(--teal-soft); color: #294354; line-height: 1.75; }
    .boundary-list { display: grid; gap: 7px; margin: 12px 0 18px; padding: 0; list-style: none; }
    .boundary-list li { padding: 9px 11px; border: 1px solid var(--line); border-radius: 9px; background: #fff; color: #40596a; font-size: 10px; }
    .level-review { display: flex; gap: 8px; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line); }
    .level-review label { color: var(--muted); font-size: 9px; font-weight: 800; }
    .level-review select { min-width: 86px; height: 34px; padding: 0 9px; color: var(--teal); border: 1px solid #9bc9c5; border-radius: 8px; background: #fff; font-weight: 850; }
    .agent-proposal { margin-left: auto; color: var(--muted); font-size: 9px; }

    .instance-tools { display: grid; grid-template-columns: 130px 140px 1fr; gap: 9px; align-items: end; margin-bottom: 14px; }
    .control label { display: block; margin-bottom: 5px; color: var(--muted); font-size: 9px; font-weight: 750; }
    .control input, .control select {
      width: 100%;
      height: 38px;
      padding: 0 10px;
      color: var(--text);
      border: 1px solid var(--line-strong);
      border-radius: 9px;
      background: #ffffff;
    }
    .instance-list { display: grid; gap: 8px; }
    .instance-card {
      display: grid;
      grid-template-columns: 135px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 13px;
      text-align: left;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #ffffff;
    }
    .instance-card.selected { border-color: rgba(8,125,121,.46); background: var(--teal-soft); }
    .instance-id { color: var(--teal); font-size: 10px; font-weight: 800; }
    .binding-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .binding-tags span { padding: 3px 6px; border: 1px solid var(--line); border-radius: 6px; background: rgba(255,255,255,.66); font-size: 8px; }

    .sut-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .sut-card {
      min-height: 180px;
      padding: 15px;
      text-align: left;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 13px;
      background: var(--panel-soft);
    }
    .sut-card.selected { border-color: rgba(8,125,121,.45); background: var(--teal-soft); }
    .sut-card .sut-type { color: var(--teal); font-size: 8px; font-weight: 850; letter-spacing: .08em; }
    .sut-card b { display: block; margin: 10px 0 7px; font-size: 12px; }
    .sut-card p { margin: 0; color: var(--muted); font-size: 10px; }
    .sut-card .expected { margin-top: 13px; padding-top: 10px; border-top: 1px solid var(--line); color: #40596a; font-size: 9px; }

    .run-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
    .summary-card { padding: 11px; border: 1px solid var(--line); border-radius: 10px; background: var(--panel-soft); }
    .summary-card span { display: block; color: var(--muted); font-size: 8px; text-transform: uppercase; }
    .summary-card b { display: block; margin-top: 4px; font-size: 10px; }
    .run-progress { height: 8px; overflow: hidden; margin: 12px 0 17px; border-radius: 999px; background: #e8edef; }
    .run-progress div { height: 100%; width: 0; border-radius: inherit; background: var(--teal); transition: width .35s ease; }
    .phase-list { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; }
    .phase {
      min-height: 126px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: #ffffff;
    }
    .phase.active { border-color: #e7c890; background: var(--amber-soft); }
    .phase.done { border-color: #d5e3bb; background: var(--green-soft); }
    .phase-index { color: var(--muted); font-size: 8px; font-weight: 850; }
    .phase b { display: block; margin: 7px 0 5px; font-size: 10px; }
    .phase p { margin: 0; color: var(--muted); font-size: 8px; }
    .actor { display: inline-flex; margin-top: 8px; padding: 2px 5px; border-radius: 5px; color: var(--blue); background: var(--blue-soft); font-size: 7px; font-weight: 800; }
    .run-log { max-height: 155px; overflow: auto; margin-top: 13px; padding: 11px; border: 1px solid var(--line); border-radius: 10px; background: #172733; color: #d7e6ed; font: 9px/1.7 ui-monospace, monospace; }

    .filter-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 13px; }
    .filter-button { padding: 6px 9px; color: var(--muted); border: 1px solid var(--line); border-radius: 8px; background: #ffffff; font-size: 9px; font-weight: 750; }
    .filter-button.active { color: var(--teal); border-color: #b7d9d6; background: var(--teal-soft); }
    .evidence-list { display: grid; gap: 7px; }
    .evidence-event {
      display: grid;
      grid-template-columns: 64px 82px 1fr;
      gap: 10px;
      align-items: start;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #ffffff;
    }
    .evidence-event.gt { border-left: 3px solid var(--amber); background: #fffbf4; }
    .evidence-event.trace { border-left: 3px solid var(--teal); }
    .event-time { color: var(--muted); font: 9px ui-monospace, monospace; }
    .event-lane { font-size: 8px; font-weight: 850; letter-spacing: .06em; }
    .evidence-event.gt .event-lane { color: var(--amber); }
    .evidence-event.trace .event-lane { color: var(--teal); }
    .event-body b { display: block; font-size: 10px; }
    .event-body span { display: block; margin-top: 3px; color: var(--muted); font-size: 8px; }

    .grader-banner { display: grid; grid-template-columns: 1fr auto; gap: 15px; align-items: center; padding: 15px; border: 1px solid var(--line); border-radius: 12px; background: var(--panel-soft); }
    .grader-banner h3 { margin: 0; font-size: 15px; }
    .grader-banner p { margin: 5px 0 0; color: var(--muted); font-size: 9px; }
    .grader-table { width: 100%; margin-top: 14px; border-collapse: collapse; font-size: 10px; }
    .grader-table th, .grader-table td { padding: 11px 8px; text-align: left; border-bottom: 1px solid var(--line); }
    .grader-table th { color: var(--muted); font-size: 8px; text-transform: uppercase; }
    .gate-card { margin-top: 15px; padding: 14px; border: 1px solid #d7e4c0; border-radius: 12px; background: var(--green-soft); }
    .gate-card.failed { border-color: #ecc5ca; background: var(--red-soft); }
    .gate-card .gate-label { color: var(--green); font-size: 8px; font-weight: 850; letter-spacing: .08em; }
    .gate-card.failed .gate-label { color: var(--red); }
    .gate-card b { display: block; margin-top: 6px; font-size: 12px; }
    .gate-card p { margin: 5px 0 0; color: #4c625a; font-size: 9px; }

    .review-list { display: grid; gap: 8px; }
    .review-item { padding: 10px; border: 1px solid var(--line); border-radius: 10px; background: var(--panel-soft); }
    .review-item .review-type { font-size: 8px; font-weight: 850; letter-spacing: .07em; }
    .review-item.valid .review-type { color: var(--green); }
    .review-item.pending .review-type { color: var(--amber); }
    .review-item.info .review-type { color: var(--blue); }
    .review-item b { display: block; margin-top: 4px; font-size: 10px; }
    .review-item p { margin: 4px 0 0; color: var(--muted); font-size: 8px; }
    .review-item-foot { display: flex; justify-content: space-between; gap: 10px; align-items: end; margin-top: 7px; }
    .review-item-foot .artifact-link { margin-top: 0; }
    .artifact-link { display: block; margin-top: 5px; color: var(--teal); font: 8px ui-monospace, monospace; overflow-wrap: anywhere; }
    .disclaimer {
      margin-top: 14px;
      padding: 10px;
      color: #6e4c1f;
      border: 1px solid #ecd3a8;
      border-radius: 9px;
      background: var(--amber-soft);
      font-size: 8px;
    }

    .review-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(18, 35, 46, .48);
      backdrop-filter: blur(4px);
    }
    .review-workspace {
      width: min(980px, 100%);
      max-height: min(88vh, 860px);
      overflow: hidden;
      border: 1px solid var(--line-strong);
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 24px 70px rgba(18, 35, 46, .24);
    }
    .review-workspace-head {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: start;
      padding: 20px 22px 16px;
      border-bottom: 1px solid var(--line);
    }
    .review-workspace-head h2 { margin: 3px 0 0; font-size: 20px; }
    .review-workspace-head p { margin: 6px 0 0; color: var(--muted); font-size: 10px; }
    .review-tabs { display: flex; gap: 6px; padding: 12px 22px 0; }
    .review-tab { padding: 8px 11px; color: var(--muted); border: 1px solid var(--line); border-radius: 9px; background: #fff; font-size: 9px; font-weight: 800; }
    .review-tab.active { color: var(--teal); border-color: #add5d1; background: var(--teal-soft); }
    .review-workspace-body { max-height: calc(88vh - 205px); overflow: auto; padding: 16px 22px 22px; }
    .review-workspace-foot { display: flex; justify-content: space-between; gap: 12px; align-items: center; padding: 14px 22px; border-top: 1px solid var(--line); background: var(--panel-soft); }
    .review-workspace-foot .action-note { max-width: 58%; }
    .review-section-title { margin: 0 0 10px; font-size: 12px; }
    .review-help { margin: -4px 0 14px; color: var(--muted); font-size: 9px; }
    .review-form-list { display: grid; gap: 10px; }
    .review-form-card { padding: 13px; border: 1px solid var(--line); border-radius: 12px; background: var(--panel-soft); }
    .review-form-card.pending { border-color: #ebcea1; background: var(--amber-soft); }
    .review-form-card-head { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 9px; }
    .review-form-card-head b { font-size: 11px; }
    .review-form-card-head span { color: var(--muted); font: 8px ui-monospace, monospace; }
    .review-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .review-field label { display: block; margin-bottom: 5px; color: var(--muted); font-size: 8px; font-weight: 800; }
    .review-field input, .review-field select, .review-field textarea {
      width: 100%;
      padding: 9px 10px;
      color: var(--text);
      border: 1px solid var(--line-strong);
      border-radius: 9px;
      background: #fff;
      font: inherit;
    }
    .review-field textarea { min-height: 76px; resize: vertical; }
    .review-template-editor { min-height: 430px !important; line-height: 1.75; }
    .review-empty { padding: 24px; text-align: center; color: var(--muted); border: 1px dashed var(--line-strong); border-radius: 12px; }
    .review-dependency-list { display: grid; gap: 7px; margin-bottom: 14px; }
    .review-dependency { display: flex; justify-content: space-between; gap: 12px; padding: 10px; border: 1px solid var(--line); border-radius: 10px; }
    .review-dependency b { display: block; font-size: 10px; }
    .review-dependency span { color: var(--muted); font-size: 8px; }
    .revision-badge { display: inline-flex; padding: 4px 7px; color: var(--blue); background: var(--blue-soft); border-radius: 6px; font-size: 8px; font-weight: 800; }

    @media (max-width: 1120px) {
      .console { grid-template-columns: 220px minmax(480px, 1fr); }
      .review-panel { position: static; grid-column: 1 / -1; }
      .review-panel .side-body { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    }
    @media (max-width: 820px) {
      .app-header { padding: 0 12px; }
      .header-actions .print-label, .brand span { display: none; }
      .stage-shell { padding: 10px 12px; }
      .stage-rail { display: flex; }
      .stage-node { flex: 0 0 102px; }
      .console { grid-template-columns: 1fr; width: min(calc(100% - 20px), 720px); }
      .side-panel { position: static; }
      .context-panel .side-body { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .context-block + .context-block { margin: 0; padding: 0; border: 0; }
      .choice-grid, .sut-grid { grid-template-columns: 1fr; }
      .coverage-review-head, .manual-editor-grid { grid-template-columns: 1fr; }
      .manual-editor-grid label.wide { grid-column: auto; }
      .phase-list { grid-template-columns: 1fr; }
      .review-panel .side-body { grid-template-columns: 1fr; }
      .review-overlay { padding: 8px; }
      .review-fields { grid-template-columns: 1fr; }
      .review-workspace-foot { align-items: stretch; flex-direction: column; }
      .review-workspace-foot .action-note { max-width: none; }
    }
    @media (max-width: 540px) {
      .mode-badge { display: none; }
      .case-select { max-width: 150px; }
      .workspace-head { align-items: start; flex-direction: column; }
      .workspace-body { padding: 18px 16px; }
      .context-panel .side-body, .validation-grid, .run-summary { grid-template-columns: 1fr; }
      .instance-tools { grid-template-columns: 1fr 1fr; }
      .instance-tools .btn { grid-column: 1 / -1; }
      .instance-card { grid-template-columns: 1fr; }
      .evidence-event { grid-template-columns: 54px 1fr; }
      .event-body { grid-column: 1 / -1; }
    }
    @media print {
      .app-header, .stage-shell, .context-panel, .workspace .action-row, .filter-row { display: none !important; }
      body { background: #ffffff; }
      .console { display: block; width: 100%; margin: 0; }
      .workspace, .review-panel { box-shadow: none; border: 0; }
      .review-panel { margin-top: 20px; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <div class="brand-mark">UAV</div>
      <div><b>Benchmark Pipeline Console</b><span id="headerCaseTitle">通用任务模版生成 · 场景示例可选</span></div>
    </div>
    <div class="header-actions">
      <span class="mode-badge">Step1 任务域 → Step2 提取 → 任务域模版 → 特定任务模版</span>
      <button class="btn" id="resetButton" type="button">重新开始</button>
      <button class="btn" type="button" onclick="window.print()"><span class="print-label">打印摘要</span></button>
    </div>
  </header>

  <div class="stage-shell">
    <nav class="stage-rail" id="stageRail" aria-label="Pipeline 阶段"></nav>
  </div>

  <main class="console">
    <aside class="panel side-panel context-panel">
      <div class="side-head"><div class="eyebrow">Run Context</div><h2>本次运行</h2></div>
      <div class="side-body" id="contextPanel"></div>
    </aside>

    <section class="panel workspace">
      <div class="workspace-head">
        <div><div class="eyebrow" id="workspaceEyebrow"></div><h1 id="workspaceTitle"></h1></div>
        <div class="stage-state" id="workspaceState"></div>
      </div>
      <div class="workspace-body" id="workspaceBody"></div>
    </section>

    <aside class="panel side-panel review-panel">
      <div class="side-head"><div class="eyebrow">Evidence & Review</div><h2>证据与审核</h2></div>
      <div class="side-body" id="reviewPanel"></div>
    </aside>
  </main>

  <div id="reviewWorkspaceHost"></div>

  <script>
    "use strict";

    const STAGES = [
      ["STEP 1", "任务域选择",      "场景 + 简短描述"],
      ["STEP 2", "扩充与提取",      "Agent 文案+A×L+JD域"],
      ["STEP 3", "任务域模版", "域编辑器(每行选模式)"],
      ["STEP 4", "特定任务模版",   "Seed→具体 JD 值"],
    ];

    const SCENARIO_TASK_EXAMPLES = {
      highway_inspection: "例如：让无人机巡查指定高速路段，持续识别和记录违法停车车辆。同一辆车短时遮挡后再次出现时不要重复上报；遇到定位异常先安全保持并通知调度人员。",
      oil_gas_inspection: "例如：让无人机沿油气管道巡检并持续记录发现的异常。电量不足以安全完成任务时，由它自己决定缩短巡检、返航还是去安全点。",
      bridge_inspection: "例如：让无人机检查桥底和指定结构件，把发现的病害标在桥梁三维模型上并持续更新。",
      campus_inspection: "例如：让无人机巡查园区道路和设施，发现异常后持续更新告警。需要近距离查看时通知机器狗去复核。",
      other_inspection: "例如：让无人机沿指定河段持续查找异常漂浮物，发现后记录位置和图片并发出告警。",
    };

    const STORAGE_KEY = "uav_pipeline_v6";
    const SCENARIO_NONE = "";
    const SCENARIO_FALLBACK_ID = "other_inspection";

    function initialState() {
      return {
        currentStage: 0, maxUnlocked: 0, completed: new Set(),
        serverStatus: "checking", healthInfo: null, catalogSummary: null,
        scenarioRegistry: null, selectedScenarioId: SCENARIO_NONE, fixedScenario: null,
        taskPrompt: "", llmProvider: "deepseek", modelTier: "flash",
        narrativeStatus: "idle", narrativeRunId: null, narrativeDraft: "", narrativeOriginal: "", narrativeError: null,
        agentStatus: "idle", agentRunId: null, agentResult: null, agentError: null, reviewError: null,
        domainEdits: {},
        instanceMode: "single", instanceSeed: 0, instanceBatchSeeds: "0-4",
        instanceResult: null, instanceResults: null, instanceError: null, instanceLoading: false,
        saveNotice: null,
      };
    }

    function effectiveScenarioId() {
      return state.selectedScenarioId || SCENARIO_FALLBACK_ID;
    }

    function scenarioExampleText(scenarioId) {
      return SCENARIO_TASK_EXAMPLES[scenarioId || ""] || "例如：用几句话说明让无人机做什么、关注什么异常、希望得到什么结果。";
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved) return initialState();
        const s = Object.assign(initialState(), saved);
        s.completed = new Set(saved.completed || []);
        return s;
      } catch { return initialState(); }
    }

    function persistState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(Object.assign({}, state, {completed: Array.from(state.completed)})));
    }

    let state = loadState();
    let pollTimer = null;

    function escapeHtml(v) { return String(v).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c])); }
    function pill(text, cls) { return '<span class="status-pill ' + (cls || "proposed") + '">' + escapeHtml(text) + "</span>"; }
    function uid(p) { return p + Math.random().toString(36).substring(2, 10); }

    function completeStage(i) { state.completed.add(i); state.maxUnlocked = Math.max(state.maxUnlocked, Math.min(i + 1, STAGES.length - 1)); state.currentStage = Math.min(i + 1, STAGES.length - 1); render(); }
    function goToStage(i) { if (i <= state.maxUnlocked) { state.currentStage = i; render(); } }

    function renderStageRail() {
      document.getElementById("stageRail").innerHTML = STAGES.map((s, i) => {
        const cls = i === state.currentStage ? "current" : state.completed.has(i) ? "done" : i <= state.maxUnlocked ? "" : "locked";
        return '<button class="stage-node ' + cls + '" type="button" onclick="goToStage(' + i + ')"' + (i > state.maxUnlocked ? " disabled" : "") + "><span>" + s[0] + "</span><b>" + s[1] + "</b></button>";
      }).join("");
    }

    function setHeader(i, st) {
      document.getElementById("workspaceEyebrow").textContent = STAGES[i][0] + " · " + STAGES[i][2];
      document.getElementById("workspaceTitle").textContent = STAGES[i][1];
      document.getElementById("workspaceState").textContent = st || "";
    }

    async function savePipeline() {
      try {
        const r = await fetch("/api/pipeline/save", {method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            selectedScenarioId: state.selectedScenarioId, taskPrompt: state.taskPrompt, llmProvider: state.llmProvider, modelTier: state.modelTier,
            narrativeRunId: state.narrativeRunId, narrativeDraft: state.narrativeDraft,
            agentRunId: state.agentRunId, agentResult: state.agentResult, domainEdits: state.domainEdits,
            instanceMode: state.instanceMode, instanceSeed: state.instanceSeed, instanceBatchSeeds: state.instanceBatchSeeds,
            instanceResult: state.instanceResult, instanceResults: state.instanceResults,
            currentStage: state.currentStage, maxUnlocked: state.maxUnlocked,
            completedSteps: Array.from(state.completed), savedAt: new Date().toISOString(),
          })});
        state.saveNotice = r.ok ? "已保存 ✓" : "保存失败";
      } catch(e) { state.saveNotice = "保存失败: " + e; }
      render();
    }

    async function loadPipeline() {
      try {
        const r = await fetch("/api/pipeline/load", {cache: "no-store"});
        if (!r.ok) { state.saveNotice = "没有已保存的进度"; render(); return; }
        const d = await r.json();
        const runtime = {
          serverStatus: state.serverStatus, healthInfo: state.healthInfo, catalogSummary: state.catalogSummary,
          scenarioRegistry: state.scenarioRegistry, llmProvider: state.llmProvider, modelTier: state.modelTier,
        };
        state = Object.assign(initialState(), runtime);
        state.selectedScenarioId = d.selectedScenarioId || SCENARIO_NONE;
        applyScenarioSelection(state.selectedScenarioId);
        if (d.taskPrompt !== undefined) state.taskPrompt = d.taskPrompt;
        if (d.llmProvider) state.llmProvider = d.llmProvider;
        if (d.modelTier) state.modelTier = d.modelTier;
        if (d.narrativeDraft) {
          state.narrativeRunId = d.narrativeRunId || null;
          state.narrativeDraft = d.narrativeDraft; state.narrativeOriginal = d.narrativeDraft; state.narrativeStatus = "done";
        }
        if (d.agentResult) { state.agentRunId = d.agentRunId || null; state.agentResult = d.agentResult; state.agentStatus = "done"; }
        if (d.domainEdits) state.domainEdits = d.domainEdits;
        if (d.instanceMode) state.instanceMode = d.instanceMode;
        if (d.instanceSeed !== undefined) state.instanceSeed = d.instanceSeed;
        if (d.instanceBatchSeeds) state.instanceBatchSeeds = d.instanceBatchSeeds;
        if (d.instanceResult) state.instanceResult = d.instanceResult;
        if (d.instanceResults) state.instanceResults = d.instanceResults;
        const completedSteps = Array.isArray(d.completedSteps) ? d.completedSteps : [];
        state.completed = new Set(completedSteps);
        const computedUnlocked = completedSteps.length ? Math.min(Math.max(...completedSteps) + 1, STAGES.length - 1) : 0;
        state.maxUnlocked = Number.isInteger(d.maxUnlocked) ? Math.min(Math.max(d.maxUnlocked, computedUnlocked), STAGES.length - 1) : computedUnlocked;
        state.currentStage = Number.isInteger(d.currentStage) ? Math.min(Math.max(d.currentStage, 0), state.maxUnlocked) : state.maxUnlocked;
        state.saveNotice = "已加载检查点 ✓";
      } catch(e) { state.saveNotice = "加载失败: " + e; }
      render();
    }

    function saveBar() {
      return '<div class="action-row" style="margin-bottom:16px"><span class="action-note">' + escapeHtml(state.saveNotice || "浏览器自动暂存；保存可建立手动检查点") + '</span>'
        + '<div><button class="btn" type="button" onclick="loadPipeline()">加载</button> '
        + '<button class="btn primary" type="button" onclick="savePipeline()">保存</button></div></div>';
    }

    // ── STEP 1 ────────────────────────────────────────────────────────── //

    function applyScenarioSelection(scenarioId, { fillExample } = {}) {
      state.selectedScenarioId = scenarioId || SCENARIO_NONE;
      if (!scenarioId) {
        state.fixedScenario = null;
      } else {
        const found = ((state.scenarioRegistry && state.scenarioRegistry.scenarios) || [])
          .find(s => s.scenario_id === scenarioId);
        state.fixedScenario = found || null;
      }
      if (fillExample && scenarioId) {
        state.taskPrompt = scenarioExampleText(scenarioId).replace(/^例如：/, "");
      }
    }

    function renderStep1() {
      const locked = state.completed.has(0);
      const sc = state.fixedScenario;
      const ready = !!(state.scenarioRegistry && state.scenarioRegistry.scenarios);
      setHeader(0, locked ? "已确认" : "等待确认");
      if (!ready) {
        document.getElementById("workspaceBody").innerHTML = '<div class="choice-card">读取场景示例中...</div>';
        return;
      }
      const opts = ['<option value="' + SCENARIO_NONE + '"' + (!state.selectedScenarioId ? " selected" : "") + ">不加载示例（仅用下方描述）</option>"]
        .concat(((state.scenarioRegistry && state.scenarioRegistry.scenarios) || []).map(s =>
          '<option value="' + s.scenario_id + '"' + (s.scenario_id === state.selectedScenarioId ? " selected" : "") + ">" +
          escapeHtml(s.title) + "</option>"
        )).join("");
      const modules = (sc && sc.available_task_modules) || [];
      const boundaries = (sc && sc.fixed_boundary) || [];
      let h = saveBar()
        + '<p class="intro">以简短任务描述为主。场景示例可选加载，只提供业务语境参考；本步不展示 JD / A×L，变量提取在 Step 2。</p>'
        + '<div class="field-label"><label>任务描述（主输入，1–3 句）</label>'
        + (sc && !locked ? '<button class="btn small" type="button" id="fillExampleBtn">填入示例</button>' : '<span>必填</span>') + '</div>'
        + '<textarea class="task-input" id="taskPrompt" style="min-height:160px" placeholder="' +
          escapeHtml(scenarioExampleText(state.selectedScenarioId)) + '"' + (locked ? " disabled" : "") + ">" +
          escapeHtml(state.taskPrompt) + "</textarea>"
        + '<div class="field-label" style="margin-top:18px"><label>可选：加载场景示例</label><span>optional · 非 JD</span></div>'
        + '<div class="control" style="margin-bottom:10px"><select id="scenarioSelect"' + (locked ? " disabled" : "") + ">" + opts + "</select></div>";
      if (sc) {
        h += '<div class="action-row" style="margin:0 0 12px"><span class="action-note">业务示例 · ' +
          escapeHtml(sc.title) + "</span></div>";
        if (sc.summary) {
          h += '<div class="choice-card" style="margin-bottom:12px"><b>场景摘要</b><p>' + escapeHtml(sc.summary) + "</p></div>";
        }
        if (boundaries.length) {
          h += '<div class="field-label"><label>固定业务边界（参考）</label></div><ul class="boundary-list">';
          boundaries.forEach(item => { h += "<li>" + escapeHtml(item) + "</li>"; });
          h += "</ul>";
        }
        if (modules.length) {
          h += '<div class="field-label"><label>可选任务模块（参考，非评分结论）</label></div>';
          h += '<table class="data-table"><thead><tr><th>模块</th><th>业务要求</th></tr></thead><tbody>';
          modules.forEach(m => {
            h += "<tr><td>" + escapeHtml(m.name || "") + "</td><td>" + escapeHtml(m.requirement || "") + "</td></tr>";
          });
          h += "</tbody></table>";
        }
      } else {
        h += '<div class="choice-card" style="margin-top:4px"><b>未加载场景示例</b><p>可直接写任务描述进入 Step 2；Agent 会从描述中提取 A×L 与 JD。</p></div>';
      }
      h += '<div class="action-row"><span class="action-note">确认后进入 Step 2</span><button class="btn primary" type="button" onclick="confirmStep1()"' +
        (locked || state.taskPrompt.trim().length < 5 ? " disabled" : "") + ">确认 →</button></div>";
      document.getElementById("workspaceBody").innerHTML = h;
      const sel = document.getElementById("scenarioSelect");
      if (sel) sel.addEventListener("change", () => {
        applyScenarioSelection(sel.value, { fillExample: false });
        render();
      });
      const fillBtn = document.getElementById("fillExampleBtn");
      if (fillBtn) fillBtn.addEventListener("click", () => {
        applyScenarioSelection(state.selectedScenarioId, { fillExample: true });
        render();
      });
      const ta = document.getElementById("taskPrompt");
      if (ta) ta.addEventListener("input", () => {
        state.taskPrompt = ta.value;
        const btn = document.querySelector("#workspaceBody .btn.primary");
        if (btn) btn.disabled = locked || state.taskPrompt.trim().length < 5;
      });
    }
    function confirmStep1() { if (state.taskPrompt.trim().length >= 5) completeStage(0); }

    // ── STEP 2 ────────────────────────────────────────────────────────── //

    async function runNarrative() {
      state.narrativeStatus = "running"; state.narrativeError = null; state.narrativeRunId = uid("agent-"); render();
      try {
        const r = await fetch("/api/config-agent/expand", {method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify({task_description: state.taskPrompt, scenario_id: effectiveScenarioId(), provider: state.llmProvider, model_tier: state.modelTier, run_id: state.narrativeRunId})});
        const d = await r.json();
        if (!r.ok) throw new Error(d.message || d.error);
        state.narrativeStatus = "done"; state.narrativeDraft = d.result.draft.expanded_narrative; state.narrativeOriginal = state.narrativeDraft;
      } catch(e) { state.narrativeStatus = "idle"; state.narrativeError = String(e.message || e); }
      render();
    }

    async function runClassification() {
      state.agentStatus = "running"; state.agentError = null; state.agentRunId = uid("agent-"); render();
      try {
        const r = await fetch("/api/config-agent/analyze", {method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify({task_description: state.narrativeDraft, scenario_id: effectiveScenarioId(), provider: state.llmProvider, model_tier: state.modelTier, run_id: state.agentRunId, source_task_description: state.taskPrompt, narrative_parent_run_id: state.narrativeRunId})});
        const d = await r.json();
        if (!r.ok) throw new Error(d.message || d.error);
        state.agentStatus = "done"; state.agentResult = d.result; state.reviewError = null;
      } catch(e) { state.agentStatus = "idle"; state.agentError = String(e.message || e); }
      render();
    }

    function coverageParts(cell) {
      const match = String(cell || "").match(/^(A\d+[a-z]?)×L([1-4])$/i);
      return match ? {ability: match[1], level: "L" + match[2]} : {ability: String(cell || ""), level: "L1"};
    }

    function catalogCell(cell) {
      return ((state.catalogSummary && state.catalogSummary.gal_cells) || []).find(item => item.cell === cell) || null;
    }

    function syncRequiredJds() {
      const c = state.agentResult && state.agentResult.candidate;
      if (!c || !state.catalogSummary) return;
      const required = new Set(["jd-0.2", "jd-0.7"]);
      (c.coverage_candidates || []).forEach(item => {
        const found = catalogCell(item.cell);
        (found && found.required_jd_ids || []).forEach(slot => required.add(slot));
      });
      const existing = new Set((c.jd_candidates || []).map(item => item.slot_id));
      const names = Object.fromEntries((state.catalogSummary.jd_fields || []).map(item => [item.id, item.name]));
      required.forEach(slotId => {
        if (existing.has(slotId)) return;
        c.jd_candidates.push({
          slot_id: slotId, name: names[slotId] || slotId, value: null, binding_mode: "TBD",
          allowed_values: [], minimum: null, maximum: null, status: "TBD", evidence_quote: "",
          provenance: "auto_fixed", source_note: "人工调整能力等级后由受审 A×L 目录补入；取值域待复核。"
        });
      });
    }

    function changeCoverageLevel(index, level) {
      const c = state.agentResult.candidate;
      const item = c.coverage_candidates[index];
      const parts = coverageParts(item.cell);
      const nextCell = parts.ability + "×" + level;
      const found = catalogCell(nextCell);
      if (!found) { state.reviewError = "受审目录中不存在 " + nextCell; render(); return; }
      item.cell = nextCell;
      item.responsibilities = Array.from(found.cumulative_responsibilities || []);
      item.provenance = "human_edited";
      item.source_note = item.source_note || "";
      state.reviewError = null;
      syncRequiredJds();
      render();
    }

    function setCoverageSource(index, value) {
      state.agentResult.candidate.coverage_candidates[index].source_note = value.trim() || null;
      persistState();
    }

    function removeDependency(index) {
      state.agentResult.candidate.runtime_dependencies.splice(index, 1);
      state.reviewError = null;
      render();
    }

    function addDependency() {
      const id = document.getElementById("newDependencyId").value.trim();
      const provider = document.getElementById("newDependencyProvider").value;
      const responsibilities = document.getElementById("newDependencyResponsibilities").value
        .split(/[；;\n]/).map(item => item.trim()).filter(Boolean);
      const source = document.getElementById("newDependencySource").value.trim();
      if (!/^[A-Za-z0-9][A-Za-z0-9._:-]*$/.test(id) || !responsibilities.length || !source) {
        state.reviewError = "人工补充依赖需要有效 ID、至少一项责任和确认依据。";
        render();
        return;
      }
      const deps = state.agentResult.candidate.runtime_dependencies || (state.agentResult.candidate.runtime_dependencies = []);
      if (deps.some(item => item.dependency_id === id)) {
        state.reviewError = "Dependency ID 已存在：" + id;
        render();
        return;
      }
      deps.push({dependency_id: id, provider: provider, responsibilities: responsibilities, evidence_quote: "", scored: false,
        status: "proposed", provenance: "human_added", source_note: source});
      state.reviewError = null;
      render();
    }

    async function confirmStep2Review() {
      const c = state.agentResult && state.agentResult.candidate;
      if (!c) return;
      const missingCoverageSource = (c.coverage_candidates || []).some(item => item.provenance === "human_edited" && !item.source_note);
      const missingDependencySource = (c.runtime_dependencies || []).some(item => ["human_added", "human_edited"].includes(item.provenance) && !item.source_note);
      if (missingCoverageSource || missingDependencySource) {
        state.reviewError = "人工改级或补充依赖后，需要填写确认依据。";
        render();
        return;
      }
      syncRequiredJds();
      state.agentStatus = "reviewing"; state.reviewError = null; render();
      try {
        const parentRunId = state.agentResult.run_id || state.agentRunId;
        const r = await fetch("/api/config-agent/revise", {method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({
          parent_run_id: parentRunId, revision_number: 1, scenario_id: effectiveScenarioId(),
          task_description: state.narrativeDraft, candidate: c,
          change_summary: ["人工复核 A×L 等级", "人工复核 Runtime Dependency"]
        })});
        const d = await r.json();
        if (!r.ok) throw new Error(d.message || d.error);
        state.agentResult.candidate = d.candidate;
        state.agentResult.validation_status = d.validation_status;
        state.agentResult.validation_issues = d.validation_issues;
        state.saveNotice = "人工复核已保存";
        state.agentStatus = "done";
        completeStage(1);
      } catch(e) {
        state.agentStatus = "done";
        state.reviewError = String(e.message || e);
        render();
      }
    }

    function renderStep2() {
      setHeader(1, state.completed.has(1) ? "已完成" : state.agentStatus === "done" ? "待确认" : state.narrativeStatus === "done" ? "文案待确认" : "等待运行");
      const hasN = state.narrativeStatus === "done", hasA = state.agentStatus === "done";
      let h = saveBar() + '<p class="intro">两段 Agent 处理：① 扩充文案（可编辑）→ ② 分类 A×L + 提取 JD 变量域。</p>';
      h += '<div class="field-label" style="margin-top:10px"><label>① 文案扩充</label></div>';
      if (state.narrativeStatus === "running") h += '<div class="choice-card selected"><b>调用中...</b></div>';
      else if (hasN) {
        h += '<textarea class="task-input" id="narEdit" style="min-height:180px">' + escapeHtml(state.narrativeDraft) + '</textarea>';
        h += '<div class="action-row"><span class="action-note">可直接修改</span><button class="btn primary" onclick="confirmNar()">确认文案 →</button></div>';
      } else {
        h += '<button class="btn primary" onclick="runNarrative()"' + (!providerReady() ? " disabled" : "") + ">运行文案扩充</button>";
        if (state.narrativeError) h += '<div class="choice-card dependency selected" style="margin-top:8px"><b>错误</b><p>' + escapeHtml(state.narrativeError) + "</p></div>";
      }
      if (state.agentStatus === "running") { h += '<div class="field-label" style="margin-top:16px"><label>② 分类与提取</label></div><div class="choice-card selected"><b>调用中...</b></div>'; }
      if (hasA) {
        const c = state.agentResult.candidate;
        h += '<div class="field-label" style="margin-top:16px"><label>② A×L 覆盖与人工改级</label><span>完整 68 单元目录</span></div>';
        h += '<div class="coverage-review-grid">' + (c.coverage_candidates || []).map((x, index) => {
          const parts = coverageParts(x.cell);
          const sourceField = x.provenance === "human_edited"
            ? '<div class="review-control"><label>改级确认依据</label><input value="' + escapeHtml(x.source_note || "") + '" oninput="setCoverageSource(' + index + ', this.value)" placeholder="会议纪要或业务负责人确认"></div>'
            : '<div class="review-control"><label>来源</label><div class="action-note">Agent 候选，可人工调整</div></div>';
          return '<div class="coverage-review-row"><div class="coverage-review-head"><div><div class="review-control"><label>能力单元</label></div><div class="coverage-review-cell">' + escapeHtml(x.cell) + '</div></div>'
            + '<div class="review-control"><label>人工等级</label><select onchange="changeCoverageLevel(' + index + ', this.value)">' + ["L1","L2","L3","L4"].map(level => '<option value="' + level + '"' + (level === parts.level ? ' selected' : '') + '>' + level + '</option>').join("") + '</select></div>'
            + sourceField + '</div><ol class="coverage-responsibilities">' + (x.responsibilities || []).map(item => '<li>' + escapeHtml(item) + '</li>').join("") + '</ol></div>';
        }).join("") + '</div>';

        h += '<div class="field-label" style="margin-top:18px"><label>Runtime Dependencies</label><span>外部提供 · 不评分</span></div>';
        h += '<div class="dependency-list">' + ((c.runtime_dependencies || []).length ? c.runtime_dependencies.map((dep, index) =>
          '<div class="dependency-row"><div><b>' + escapeHtml(dep.dependency_id) + ' · ' + escapeHtml(dep.provider) + '</b><p>' + escapeHtml((dep.responsibilities || []).join("；")) + '</p></div><button class="btn small" type="button" onclick="removeDependency(' + index + ')">移除</button></div>'
        ).join("") : '<div class="review-empty">本次未提取外部依赖，可人工补充。</div>') + '</div>';
        h += '<details class="manual-editor"><summary>人工补充 Runtime Dependency</summary><div class="manual-editor-body"><div class="manual-editor-grid">'
          + '<label>Dependency ID<input id="newDependencyId" placeholder="external_decision_port"></label>'
          + '<label>提供者<select id="newDependencyProvider"><option value="human_or_external_decision">外部决定接口</option><option value="executor">外部执行器</option><option value="external_system">外部系统</option></select></label>'
          + '<label class="wide">责任（分号分隔）<textarea id="newDependencyResponsibilities" placeholder="接收结构化异常事件；返回继续、返航或终止"></textarea></label>'
          + '<label class="wide">人工确认依据<textarea id="newDependencySource" placeholder="会议纪要、任务原文或业务负责人确认"></textarea></label>'
          + '</div><div class="action-row"><span class="action-note">新增项固定 scored=false。</span><button class="btn" type="button" onclick="addDependency()">添加外部依赖</button></div></div></details>';

        h += '<div class="field-label" style="margin-top:18px"><label>③ JD 变量域（' + (c.jd_candidates || []).length + ' 个）</label></div>';
        h += '<p class="intro" style="margin-top:4px">JD 域应由 Agent 从确认文案分析得出；TBD 仅表示暂时推不出来，可在 Step 3 人工补全。</p>';
        h += '<table class="data-table"><thead><tr><th>Slot</th><th>Name</th><th>Domain（Agent 分析结果）</th><th>Mode</th></tr></thead><tbody>'
          + (c.jd_candidates || []).map(j => {
              const bm = j.binding_mode || "fixed";
              let v = "—";
              if (bm === "enum") v = (j.allowed_values || []).map(escapeHtml).join(", ") || "—";
              else if (bm === "range") v = (j.minimum != null && j.maximum != null) ? ("[" + j.minimum + "~" + j.maximum + "]") : "—";
              else if (j.value) v = escapeHtml(String(j.value));
              else if (bm === "TBD") v = escapeHtml(j.source_note || "Agent 未推出域 · Step 3 可补");
              return "<tr><td class='mono'>" + escapeHtml(j.slot_id) + "</td><td>" + escapeHtml(j.name) + "</td><td>" + v + "</td><td>" + pill(bm) + "</td></tr>";
            }).join("") + '</tbody></table>';
        if (state.reviewError) h += '<div class="disclaimer">' + escapeHtml(state.reviewError) + '</div>';
        h += '<div class="action-row" style="margin-top:14px"><span class="action-note">确认后保存人工修订，并进入 Step 3。</span><button class="btn primary" onclick="confirmStep2Review()"' + (state.agentStatus === "reviewing" ? ' disabled' : '') + '>' + (state.agentStatus === "reviewing" ? '正在保存…' : '确认人工复核 →') + '</button></div>';
      }
      if (state.agentError) h += '<div class="choice-card dependency selected" style="margin-top:8px"><b>分类错误</b><p>' + escapeHtml(state.agentError) + "</p></div>";
      document.getElementById("workspaceBody").innerHTML = h;
      const ne = document.getElementById("narEdit");
      if (ne) ne.addEventListener("input", () => { state.narrativeDraft = ne.value; });
    }
    function confirmNar() { state.narrativeStatus = "done"; runClassification(); }

    // ── STEP 3 ────────────────────────────────────────────────────────── //

    function getEdits() {
      const c = state.agentResult ? state.agentResult.candidate : null;
      if (!c) return [];
      return (c.jd_candidates || []).map(j => {
        const e = state.domainEdits[j.slot_id] || {};
        return {slot_id: j.slot_id, name: j.name, binding_mode: e.binding_mode || j.binding_mode || "fixed",
          value: e.value !== undefined ? e.value : j.value, allowed_values: e.allowed_values || j.allowed_values || [],
          minimum: e.minimum !== undefined ? e.minimum : j.minimum, maximum: e.maximum !== undefined ? e.maximum : j.maximum};
      });
    }
    function setEdit(id, f, v) { if (!state.domainEdits[id]) state.domainEdits[id] = {}; state.domainEdits[id][f] = f === "allowed_values" ? v.split(/[,，]/).map(s => s.trim()).filter(Boolean) : v; }

    function renderStep3() {
      setHeader(2, state.completed.has(2) ? "已确认" : "编辑取值域");
      const edits = getEdits();
      let h = saveBar() + '<p class="intro">域编辑器：为每个 JD 变量选模式。fixed=固定；enum=离散选项；range=数值区间；TBD=未知。域越丰富，Step 4 特定任务模版的具体 JD 取值越多样。</p>';
      const c = state.agentResult ? state.agentResult.candidate : null;
      if (c && c.coverage_candidates) {
        h += '<div class="field-label" style="margin-top:8px"><label>A×L（' + c.coverage_candidates.length + ' 个）</label></div>';
        h += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">' + c.coverage_candidates.map(x => '<span class="status-pill proposed" style="padding:5px 10px">' + escapeHtml(x.cell) + '</span>').join("") + '</div>';
      }
      h += '<table class="data-table"><thead><tr><th>Slot</th><th>Name</th><th>Mode</th><th>Domain</th></tr></thead><tbody>';
      for (const e of edits) {
        const bm = e.binding_mode;
        const sid = escapeHtml(e.slot_id);
        const styleSelect = "padding:4px 8px;border:1px solid var(--line-strong);border-radius:6px;font-size:10px";
        const styleInput = "width:100%;padding:4px 8px;border:1px solid var(--line-strong);border-radius:6px;font-size:10px";
        const styleNum = "width:55px;padding:4px;border:1px solid var(--line-strong);border-radius:6px;font-size:10px";
        h += "<tr><td class='mono'>" + sid + "</td><td>" + escapeHtml(e.name) + "</td>";
        h += "<td><select data-slot=\"" + sid + "\" data-field=\"binding_mode\" class=\"domain-edit\" style=\"" + styleSelect + "\">";
        h += ["fixed", "enum", "range", "TBD"].map(m =>
          "<option value=\"" + m + "\"" + (m === bm ? " selected" : "") + ">" + m + "</option>"
        ).join("") + "</select></td>";
        if (bm === "fixed") {
          h += "<td><input type=\"text\" data-slot=\"" + sid + "\" data-field=\"value\" class=\"domain-edit\" value=\"" +
            escapeHtml(e.value || "") + "\" style=\"" + styleInput + "\"></td>";
        } else if (bm === "enum") {
          h += "<td><input type=\"text\" data-slot=\"" + sid + "\" data-field=\"allowed_values\" class=\"domain-edit\" value=\"" +
            escapeHtml((e.allowed_values || []).join(", ")) + "\" placeholder=\"A, B, C\" style=\"" + styleInput + "\"></td>";
        } else if (bm === "range") {
          h += "<td><input type=\"number\" data-slot=\"" + sid + "\" data-field=\"minimum\" class=\"domain-edit\" value=\"" +
            (e.minimum != null ? e.minimum : "") + "\" style=\"" + styleNum + "\"> ~ <input type=\"number\" data-slot=\"" +
            sid + "\" data-field=\"maximum\" class=\"domain-edit\" value=\"" +
            (e.maximum != null ? e.maximum : "") + "\" style=\"" + styleNum + "\"></td>";
        } else {
          const note = (state.agentResult.candidate.jd_candidates || []).find(j => j.slot_id === e.slot_id);
          h += "<td>" + escapeHtml((note && note.source_note) || "待 Agent/人工补全域") + "</td>";
        }
        h += "</tr>";
      }
      h += '</tbody></table>';
      const variable = edits.filter(e => e.binding_mode === "enum" || e.binding_mode === "range").length;
      h += '<div class="action-row" style="margin-top:14px"><span class="action-note">' + variable + ' 个可变域</span><button class="btn primary" onclick="completeStage(2)">确认任务域模版 →</button></div>';
      document.getElementById("workspaceBody").innerHTML = h;
      document.querySelectorAll(".domain-edit").forEach(el => {
        const apply = () => {
          const slot = el.getAttribute("data-slot");
          const field = el.getAttribute("data-field");
          let val = el.value;
          if (field === "minimum" || field === "maximum") val = val === "" ? null : parseFloat(val);
          setEdit(slot, field, val);
          if (field === "binding_mode") render();
        };
        el.addEventListener("change", apply);
        if (el.tagName === "INPUT") el.addEventListener("blur", apply);
      });
    }

    // ── STEP 4: 任务域模版 + Seed → 特定任务模版（具体 JD 值）──────────── //

    function buildDomainTemplate() {
      const c = state.agentResult ? state.agentResult.candidate : null;
      if (!c) return null;
      return {
        template_id: (c.task_title || "domain_tpl"),
        template_version: "0.1.0",
        title: c.task_title || "domain_tpl",
        scenario_summary: c.scenario_summary || "",
        coverage: c.coverage_candidates || [],
        runtime_dependencies: c.runtime_dependencies || [],
        jd_slots: getEdits().map(e => {
          const b = {mode: e.binding_mode, status: "verified"};
          if (e.binding_mode === "fixed") b.value = e.value;
          else if (e.binding_mode === "enum") { b.allowed_values = e.allowed_values; b.value = e.value; }
          else if (e.binding_mode === "range") { b.minimum = e.minimum; b.maximum = e.maximum; }
          else { b.mode = "TBD"; b.status = "TBD"; }
          return {slot_id: e.slot_id, description: e.name, visibility: "sut_visible", binding: b};
        }),
      };
    }

    async function genTaskTemplate() {
      const domain = buildDomainTemplate();
      if (!domain) { state.instanceError = "缺少任务域模版（请先完成 Step 2–3）"; render(); return; }
      state.instanceLoading = true; state.instanceError = null; state.instanceResult = null; state.instanceResults = null; render();
      try {
        const ep = state.instanceMode === "traverse" ? "/api/task-template/traverse"
          : state.instanceMode === "batch" ? "/api/task-template/batch"
          : "/api/task-template/generate";
        const body = state.instanceMode === "single"
          ? {domain_template: domain, seed: parseInt(state.instanceSeed) || 0}
          : state.instanceMode === "batch"
            ? {domain_template: domain, seeds: state.instanceBatchSeeds}
            : {domain_template: domain, steps_per_range: 3};
        const r = await fetch(ep, {method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(body)});
        const d = await r.json(); if (!r.ok) throw new Error(d.message || d.error || JSON.stringify(d));
        if (state.instanceMode === "single") state.instanceResult = d.task_template || d.instance;
        else state.instanceResults = d.task_templates || d.instances || [];
      } catch(e) { state.instanceError = String(e.message || e); }
      state.instanceLoading = false; render();
    }

    function renderStep4() {
      const hasOne = !!state.instanceResult;
      const hasMany = !!(state.instanceResults && state.instanceResults.length);
      setHeader(3, hasOne || hasMany ? "已生成" : "等待 Seed");
      const domain = buildDomainTemplate();
      let h = saveBar() + '<p class="intro">任务域模版 + Seed → 特定任务模版：为每个 JD 槽位取出具体值。同一 Seed 始终产生相同结果。</p>';
      if (domain) {
        h += '<table class="data-table"><thead><tr><th>Slot</th><th>Mode</th><th>Domain</th></tr></thead><tbody>'
          + domain.jd_slots.map(s => {
              let v = "—";
              if (s.binding.mode === "fixed") v = escapeHtml(String(s.binding.value));
              else if (s.binding.mode === "enum") v = escapeHtml((s.binding.allowed_values || []).join(" | "));
              else if (s.binding.mode === "range") v = "[" + s.binding.minimum + "~" + s.binding.maximum + "]";
              return "<tr><td class='mono'>" + escapeHtml(s.slot_id) + "</td><td>" + pill(s.binding.mode) + "</td><td>" + v + "</td></tr>";
            }).join("")
          + '</tbody></table>';
      }
      h += '<div class="field-label" style="margin-top:16px"><label>模式</label></div><div class="control" style="margin-bottom:8px"><select id="im">'
        + [["single","单个 Seed"],["batch","批量范围"],["traverse","全遍历"]].map(m => "<option value='" + m[0] + "'" + (m[0] === state.instanceMode ? " selected" : "") + ">" + m[1] + "</option>").join("") + "</select></div>";
      if (state.instanceMode === "single") h += '<input type="number" min="0" value="' + state.instanceSeed + '" id="is" style="padding:4px 8px;width:100px;border:1px solid var(--line-strong);border-radius:6px">';
      else if (state.instanceMode === "batch") h += '<input type="text" value="' + escapeHtml(state.instanceBatchSeeds) + '" id="ib" style="padding:4px 8px;width:200px;border:1px solid var(--line-strong);border-radius:6px">';
      h += '<div class="action-row" style="margin-top:10px"><button class="btn primary" onclick="genTaskTemplate()"' + (state.instanceLoading ? " disabled" : "") + ">" + (state.instanceLoading ? "生成中..." : "生成特定任务模版") + "</button></div>";
      if (state.instanceError) h += '<div class="choice-card dependency selected" style="margin-top:10px"><b>错误</b><p>' + escapeHtml(state.instanceError) + "</p></div>";
      else if (state.instanceResult) h += '<div class="choice-card selected" style="margin-top:10px"><b>特定任务模版 · SEED ' + state.instanceResult.seed + '</b><p class="mono" style="font-size:11px">' + escapeHtml(state.instanceResult.instance_id) + '</p><table class="data-table"><thead><tr><th>JD Slot</th><th>具体值</th><th>Status</th></tr></thead><tbody>' + (state.instanceResult.slot_bindings || []).map(s => "<tr><td class='mono'>" + escapeHtml(s.slot_id) + "</td><td>" + escapeHtml(JSON.stringify(s.value)) + "</td><td>" + pill(s.status) + "</td></tr>").join("") + '</tbody></table></div>';
      else if (state.instanceResults) h += '<div class="choice-card selected" style="margin-top:10px"><b>' + state.instanceResults.length + ' 个特定任务模版</b><table class="data-table"><thead><tr><th>模版</th><th>Seed</th><th>已赋值 JD</th></tr></thead><tbody>' + state.instanceResults.map(i => "<tr><td class='mono'>" + escapeHtml(i.instance_id) + "</td><td>" + i.seed + "</td><td>" + (i.slot_bindings || []).filter(s => s.status !== "TBD").length + "/" + (i.slot_bindings || []).length + "</td></tr>").join("") + '</tbody></table></div>';
      document.getElementById("workspaceBody").innerHTML = h;
      const im = document.getElementById("im"); if (im) im.addEventListener("change", () => { state.instanceMode = im.value; render(); });
      const is = document.getElementById("is"); if (is) is.addEventListener("change", () => { state.instanceSeed = parseInt(is.value) || 0; });
      const ib = document.getElementById("ib"); if (ib) ib.addEventListener("change", () => { state.instanceBatchSeeds = ib.value; });
    }

    // ── Sidebars ──────────────────────────────────────────────────────── //

    function llmPhasePill(status) {
      if (status === "running") return pill("running", "proposed");
      if (status === "done") return pill("done", "given");
      if (status === "error") return pill("error", "risk");
      return pill(status || "idle", "tbd");
    }

    function connectionMeta() {
      const info = selectedProviderInfo();
      if (info && info.ready) return { label: "connected", cls: "given", detail: info.label + " API Key 已就绪" };
      if (state.serverStatus === "missing_api_key" || info) return { label: "no_api_key", cls: "tbd", detail: "本地服务在线，但 " + (info ? info.label : state.llmProvider) + " 尚未配置 Key" };
      if (state.serverStatus === "offline") return { label: "offline", cls: "risk", detail: "无法连接本地 Agent 服务" };
      return { label: "checking", cls: "proposed", detail: "正在检查连接…" };
    }

    function providerOptions() {
      const providers = (state.healthInfo && state.healthInfo.providers) || {};
      return ["deepseek", "gemini"].map(id => ({id: id, label: (providers[id] && providers[id].label) || (id === "gemini" ? "Gemini" : "DeepSeek"), ready: !!(providers[id] && providers[id].ready)}));
    }

    function selectedProviderInfo() {
      return state.healthInfo && state.healthInfo.providers && state.healthInfo.providers[state.llmProvider];
    }

    function providerReady() {
      const info = selectedProviderInfo();
      return state.serverStatus === "ready" && !!(info && info.ready);
    }

    function modelOptions() {
      const hi = selectedProviderInfo() || {};
      const models = hi.models || {};
      return [
        { tier: "flash", label: "Flash", id: models.flash || "未配置" },
        { tier: "lite", label: "Lite", id: models.lite || "未配置" },
        { tier: "pro", label: "Pro", id: models.pro || "未配置" },
      ];
    }

    function selectedModelId() {
      const hit = modelOptions().find(m => m.tier === state.modelTier);
      return (hit && hit.id) || "未配置";
    }

    function renderContext() {
      const narStatus = state.narrativeError ? "error" : state.narrativeStatus;
      const clsStatus = state.agentError ? "error" : state.agentStatus;
      const busy = narStatus === "running" || clsStatus === "running";
      const conn = connectionMeta();
      const valStatus = state.agentResult ? state.agentResult.validation_status : null;
      const jdCount = state.agentResult && state.agentResult.candidate
        ? (state.agentResult.candidate.jd_candidates || []).length : 0;
      const tbdCount = state.agentResult && state.agentResult.candidate
        ? (state.agentResult.candidate.jd_candidates || []).filter(j => (j.binding_mode || "") === "TBD").length : 0;
      const lastModel = state.agentResult && state.agentResult.model;
      const lastProvider = state.agentResult && state.agentResult.provider;

      let h = '<div class="context-block"><div class="context-label">Server</div><div class="context-value">' + pill(state.serverStatus, state.serverStatus === "ready" ? "given" : "tbd") + '</div></div>';
      if (state.catalogSummary) h += '<div class="context-block"><div class="context-label">Catalog</div><div class="context-value">' + state.catalogSummary.counts.abilities + "A · " + state.catalogSummary.counts.gal_cells + " A×L · " + state.catalogSummary.counts.jd_fields + " JD</div></div>";

      h += '<div class="context-block"><div class="context-label">LLM Analysis</div><div class="context-value" style="display:grid;gap:8px">';
      h += '<div>Connection ' + pill(conn.label, conn.cls) +
        '<div class="action-note" style="margin-top:4px">' + escapeHtml(conn.detail) + "</div></div>";
      h += '<div><div class="field-label" style="margin:0 0 5px"><label>Provider</label><span>按本机 Key 可用</span></div>';
      h += '<select id="providerSelect" class="case-select" style="width:100%;max-width:none;min-height:34px;font-size:11px"' + (busy ? " disabled" : "") + '>';
      providerOptions().forEach(p => {
        h += '<option value="' + p.id + '"' + (p.id === state.llmProvider ? " selected" : "") + '>' + escapeHtml(p.label + (p.ready ? " · ready" : " · no key")) + '</option>';
      });
      h += '</select></div>';
      h += '<div><div class="field-label" style="margin:0 0 5px"><label>模型</label><span>' +
        escapeHtml(selectedModelId()) + "</span></div>";
      h += '<select id="modelTierSelect" class="case-select" style="width:100%;max-width:none;min-height:34px;font-size:11px"' +
        (busy || !providerReady() ? " disabled" : "") + ">";
      modelOptions().forEach(m => {
        h += '<option value="' + m.tier + '"' + (m.tier === state.modelTier ? " selected" : "") + ">" +
          escapeHtml(m.label + " · " + m.id) + "</option>";
      });
      h += "</select>";
      if (lastModel) h += '<div class="action-note" style="margin-top:4px">上次实际调用 · <span class="mono">' + escapeHtml((lastProvider || state.llmProvider) + " / " + lastModel) + "</span></div>";
      h += "</div>";
      h += '<div>① 文案扩充 ' + llmPhasePill(narStatus) +
        (state.narrativeRunId ? ' <span class="mono" style="font-size:9px;color:var(--muted)">' + escapeHtml(state.narrativeRunId) + "</span>" : "") + "</div>";
      h += '<div>② 分类提取 ' + llmPhasePill(clsStatus) +
        (state.agentRunId ? ' <span class="mono" style="font-size:9px;color:var(--muted)">' + escapeHtml(state.agentRunId) + "</span>" : "") + "</div>";
      if (valStatus) {
        h += '<div>校验 ' + pill(valStatus, valStatus === "pass" ? "given" : "tbd") +
          (jdCount ? (' · JD ' + jdCount + (tbdCount ? ' · TBD ' + tbdCount : "")) : "") + "</div>";
      }
      if (state.narrativeError) h += '<div style="color:var(--red);font-size:10px">' + escapeHtml(state.narrativeError) + "</div>";
      else if (state.agentError) h += '<div style="color:var(--red);font-size:10px">' + escapeHtml(state.agentError) + "</div>";
      h += "</div></div>";

      if (state.agentResult && state.agentResult.candidate) {
        h += '<div class="context-block"><div class="context-label">Coverage</div><div class="mini-tags">' +
          (state.agentResult.candidate.coverage_candidates || []).map(c =>
            '<span class="mini-tag scored">' + escapeHtml(c.cell) + "</span>"
          ).join("") + "</div></div>";
      }
      h += '<div class="context-block"><div class="context-label">Progress</div><div class="progress-track"><div class="progress-fill" style="width:' + (state.completed.size / STAGES.length * 100) + '%"></div></div><div class="action-note">' + state.completed.size + '/' + STAGES.length + '</div></div>';
      document.getElementById("contextPanel").innerHTML = h;
      const ps = document.getElementById("providerSelect");
      if (ps) ps.addEventListener("change", () => { state.llmProvider = ps.value; render(); });
      const ms = document.getElementById("modelTierSelect");
      if (ms) ms.addEventListener("change", () => { state.modelTier = ms.value; render(); });
    }

    function renderReview() {
      const items = [];
      if (state.narrativeError) items.push({t:"pending",l:"文案错误",d:state.narrativeError});
      if (state.agentError) items.push({t:"pending",l:"分类错误",d:state.agentError});
      if (state.agentResult && state.agentResult.validation_issues) state.agentResult.validation_issues.forEach(v => items.push({t:"pending",l:v.code,d:v.message}));
      document.getElementById("reviewPanel").innerHTML = items.length ? '<div class="review-list">' + items.slice(0,10).map(i => '<div class="review-item ' + i.t + '"><div class="review-type ' + i.t + '">' + escapeHtml(i.l) + '</div><b>' + escapeHtml(i.l) + '</b><p>' + escapeHtml(i.d) + '</p></div>').join("") + '</div>' : '<div class="review-item info"><div class="review-type info">INFO</div><b>无待处理项</b></div>';
    }

    function render() { renderStageRail(); renderContext(); renderReview(); [renderStep1, renderStep2, renderStep3, renderStep4][state.currentStage](); persistState(); }

    document.getElementById("resetButton").addEventListener("click", () => {
      if (!window.confirm("开始一个新任务？当前页面进度会清空，但手动保存的检查点仍可通过“加载”恢复。")) return;
      if (pollTimer) clearTimeout(pollTimer);
      const runtime = {
        serverStatus: state.serverStatus, healthInfo: state.healthInfo, catalogSummary: state.catalogSummary,
        scenarioRegistry: state.scenarioRegistry, llmProvider: state.llmProvider, modelTier: state.modelTier,
      };
      localStorage.removeItem(STORAGE_KEY);
      state = Object.assign(initialState(), runtime);
      applyScenarioSelection(SCENARIO_NONE);
      state.saveNotice = "已开始新任务；手动检查点仍可加载";
      render();
    });

    async function init() {
      try {
        const h = await (await fetch("/api/health", {cache:"no-store"})).json();
        state.healthInfo = h;
        state.serverStatus = h.agent_ready ? "ready" : "missing_api_key";
        if (!h.providers || !h.providers[state.llmProvider] || (!h.providers[state.llmProvider].ready && h.default_provider)) state.llmProvider = h.default_provider || "deepseek";
        state.catalogSummary = await (await fetch("/api/catalog", {cache:"no-store"})).json();
        const reg = await (await fetch("/api/scenarios", {cache:"no-store"})).json(); state.scenarioRegistry = reg;
        applyScenarioSelection(state.selectedScenarioId || SCENARIO_NONE);
      } catch(e) { state.serverStatus = "offline"; }
      render();
    }
    render(); init();
  </script>
</body>
</html>
