<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <link rel="icon" href="data:,">
  <title>UAV Benchmark Pipeline Console</title>
  <style>
    :root {
      --bg: #f3f6f8;
      --panel: #ffffff;
      --panel-soft: #f8fafb;
      --line: #dbe3e8;
      --line-strong: #c5d1d8;
      --text: #162837;
      --muted: #657786;
      --teal: #087d79;
      --teal-soft: #e3f3f1;
      --blue: #315fa3;
      --blue-soft: #eaf0f8;
      --green: #52771a;
      --green-soft: #edf4df;
      --amber: #9a5b08;
      --amber-soft: #fff3df;
      --red: #ae3e49;
      --red-soft: #fae9eb;
      --shadow: 0 14px 38px rgba(29, 54, 70, .09);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-width: 320px; min-height: 100%; }
    body {
      color: var(--text);
      background:
        radial-gradient(circle at 85% 0%, rgba(8,125,121,.08), transparent 28rem),
        var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }
    button, textarea, input { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .48; }
    :focus-visible { outline: 3px solid rgba(8,125,121,.28); outline-offset: 2px; }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 64px;
      padding: 0 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(16px);
    }
    .brand { display: flex; align-items: center; gap: 11px; min-width: 0; }
    .brand-mark {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      color: var(--teal);
      border: 1px solid rgba(8,125,121,.24);
      border-radius: 11px;
      background: var(--teal-soft);
      font-size: 11px;
      font-weight: 850;
      letter-spacing: .08em;
    }
    .brand b { display: block; font-size: 14px; }
    .brand span { display: block; color: var(--muted); font-size: 10px; }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    .case-select {
      min-height: 38px;
      max-width: 245px;
      padding: 7px 30px 7px 10px;
      color: var(--text);
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      background: #ffffff;
      font-size: 11px;
      font-weight: 720;
    }
    .mode-badge {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 5px 10px;
      color: var(--amber);
      border: 1px solid #ecd3a8;
      border-radius: 999px;
      background: var(--amber-soft);
      font-size: 10px;
      font-weight: 850;
      letter-spacing: .08em;
    }
    .btn {
      min-height: 38px;
      padding: 8px 13px;
      color: var(--text);
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      background: #ffffff;
      font-size: 12px;
      font-weight: 750;
    }
    .btn:hover:not(:disabled) { border-color: rgba(8,125,121,.48); background: var(--teal-soft); }
    .btn.primary { color: #ffffff; border-color: var(--teal); background: var(--teal); }
    .btn.primary:hover:not(:disabled) { background: #066d69; }
    .btn.danger { color: var(--red); border-color: #ebc3c8; background: var(--red-soft); }
    .btn.small { min-height: 31px; padding: 5px 9px; font-size: 10px; }

    .stage-shell {
      position: sticky;
      top: 64px;
      z-index: 20;
      padding: 12px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(243,246,248,.95);
      backdrop-filter: blur(12px);
    }
    .stage-rail {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 7px;
      max-width: 1500px;
      margin: 0 auto;
      overflow-x: auto;
    }
    .stage-node {
      position: relative;
      min-width: 92px;
      min-height: 58px;
      padding: 8px 9px;
      text-align: left;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 11px;
      background: rgba(255,255,255,.78);
    }
    .stage-node span { display: block; font-size: 9px; font-weight: 850; letter-spacing: .08em; }
    .stage-node b { display: block; margin-top: 3px; color: inherit; font-size: 10px; }
    .stage-node.current { color: var(--teal); border-color: rgba(8,125,121,.42); background: var(--teal-soft); }
    .stage-node.done { color: var(--green); border-color: #d4e3b6; background: var(--green-soft); }
    .stage-node.locked { color: #9aa7af; background: #f1f4f5; }
    .stage-node::after {
      content: "";
      position: absolute;
      right: -8px;
      top: 50%;
      z-index: 2;
      width: 8px;
      height: 1px;
      background: var(--line-strong);
    }
    .stage-node:last-child::after { display: none; }

    .console {
      display: grid;
      grid-template-columns: 250px minmax(520px, 1fr) 290px;
      gap: 16px;
      width: min(calc(100% - 32px), 1500px);
      margin: 18px auto 30px;
      align-items: start;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .side-panel { position: sticky; top: 150px; overflow: hidden; }
    .side-head { padding: 17px 18px 12px; border-bottom: 1px solid var(--line); }
    .side-head .eyebrow, .workspace-head .eyebrow {
      color: var(--teal);
      font-size: 9px;
      font-weight: 850;
      letter-spacing: .13em;
      text-transform: uppercase;
    }
    .side-head h2 { margin: 5px 0 0; font-size: 16px; }
    .side-body { padding: 15px 18px 18px; }
    .context-block + .context-block { margin-top: 17px; padding-top: 15px; border-top: 1px solid var(--line); }
    .context-label { color: var(--muted); font-size: 9px; font-weight: 800; letter-spacing: .09em; text-transform: uppercase; }
    .context-value { margin-top: 5px; font-size: 12px; font-weight: 720; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .mini-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
    .mini-tag {
      padding: 3px 6px;
      color: #425b6c;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-soft);
      font-size: 9px;
    }
    .mini-tag.scored { color: var(--teal); border-color: #b9dcd9; background: var(--teal-soft); }
    .mini-tag.dep { color: var(--blue); border-color: #c8d5e7; background: var(--blue-soft); }
    .pending-count { color: var(--amber); font-size: 23px; font-weight: 850; }
    .progress-track { height: 7px; overflow: hidden; margin-top: 8px; border-radius: 999px; background: #edf1f3; }
    .progress-fill { height: 100%; border-radius: inherit; background: var(--teal); transition: width .25s ease; }

    .workspace { min-height: 650px; overflow: hidden; }
    .workspace-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      padding: 22px 24px 18px;
      border-bottom: 1px solid var(--line);
    }
    .workspace-head h1 { margin: 5px 0 0; font-size: clamp(22px, 3vw, 32px); line-height: 1.18; letter-spacing: -.035em; }
    .stage-state { color: var(--muted); font-size: 10px; font-weight: 800; }
    .workspace-body { padding: 22px 24px 25px; }
    .intro { margin: 0 0 18px; color: var(--muted); font-size: 12px; }
    .field-label { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 7px; color: #42596a; font-size: 11px; font-weight: 750; }
    .field-label span { color: var(--muted); font-size: 9px; font-weight: 600; }
    .task-input {
      width: 100%;
      min-height: 330px;
      resize: vertical;
      padding: 15px;
      color: var(--text);
      border: 1px solid var(--line-strong);
      border-radius: 13px;
      background: var(--panel-soft);
      font-size: 12px;
      line-height: 1.75;
    }
    .action-row { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 10px; margin-top: 16px; }
    .action-note { color: var(--muted); font-size: 10px; }

    .choice-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .choice-card {
      position: relative;
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: var(--panel-soft);
    }
    .choice-card.selected { border-color: rgba(8,125,121,.42); background: var(--teal-soft); }
    .choice-card.dependency.selected { border-color: #b8cbe2; background: var(--blue-soft); }
    .choice-card input { position: absolute; top: 14px; right: 14px; accent-color: var(--teal); }
    .choice-code { color: var(--teal); font-size: 18px; font-weight: 850; letter-spacing: -.025em; }
    .choice-card.dependency .choice-code { color: var(--blue); }
    .choice-card b { display: block; margin-top: 4px; font-size: 12px; }
    .choice-card p { margin: 7px 0 0; color: var(--muted); font-size: 10px; }
    .group-label { margin: 18px 0 9px; color: var(--muted); font-size: 9px; font-weight: 850; letter-spacing: .1em; text-transform: uppercase; }

    .data-table { width: 100%; border-collapse: collapse; font-size: 10px; }
    .data-table th, .data-table td { padding: 10px 8px; text-align: left; vertical-align: top; border-bottom: 1px solid var(--line); }
    .data-table th { color: var(--muted); font-size: 9px; letter-spacing: .07em; text-transform: uppercase; }
    .status-pill {
      display: inline-flex;
      padding: 3px 7px;
      border-radius: 999px;
      font-size: 8px;
      font-weight: 850;
      letter-spacing: .05em;
      white-space: nowrap;
    }
    .status-pill.given, .status-pill.valid, .status-pill.observed { color: var(--green); background: var(--green-soft); }
    .status-pill.proposed, .status-pill.current { color: var(--teal); background: var(--teal-soft); }
    .status-pill.tbd, .status-pill.indeterminate { color: var(--amber); background: var(--amber-soft); }
    .status-pill.risk, .status-pill.failed { color: var(--red); background: var(--red-soft); }
    .status-pill.dep { color: var(--blue); background: var(--blue-soft); }

    .validation-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 14px 0; }
    .validation-card { padding: 11px; border: 1px solid #d7e4c0; border-radius: 10px; background: var(--green-soft); }
    .validation-card b { display: block; color: var(--green); font-size: 9px; }
    .validation-card span { display: block; margin-top: 3px; color: #4c625a; font-size: 8px; }
    .code-preview {
      max-height: 340px;
      overflow: auto;
      margin: 0;
      padding: 15px;
      color: #304b5d;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f1f5f7;
      font: 10px/1.65 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      white-space: pre-wrap;
    }
    .template-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 0 10px; }
    .template-tab { padding: 7px 10px; color: var(--muted); border: 1px solid var(--line); border-radius: 8px; background: #ffffff; font-size: 9px; font-weight: 760; }
    .template-tab.active { color: var(--teal); border-color: #b7d9d6; background: var(--teal-soft); }
    .natural-template {
      max-height: 430px;
      overflow: auto;
      padding: 18px;
      color: #294354;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfcfd;
      font-size: 11px;
      line-height: 1.85;
      white-space: pre-wrap;
    }
    .natural-template mark { color: #075d5a; background: var(--teal-soft); border-radius: 4px; }
    .scenario-summary { padding: 16px; border: 1px solid #b7d9d6; border-radius: 12px; background: var(--teal-soft); color: #294354; line-height: 1.75; }
    .boundary-list { display: grid; gap: 7px; margin: 12px 0 18px; padding: 0; list-style: none; }
    .boundary-list li { padding: 9px 11px; border: 1px solid var(--line); border-radius: 9px; background: #fff; color: #40596a; font-size: 10px; }
    .level-review { display: flex; gap: 8px; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line); }
    .level-review label { color: var(--muted); font-size: 9px; font-weight: 800; }
    .level-review select { min-width: 86px; height: 34px; padding: 0 9px; color: var(--teal); border: 1px solid #9bc9c5; border-radius: 8px; background: #fff; font-weight: 850; }
    .agent-proposal { margin-left: auto; color: var(--muted); font-size: 9px; }

    .instance-tools { display: grid; grid-template-columns: 130px 140px 1fr; gap: 9px; align-items: end; margin-bottom: 14px; }
    .control label { display: block; margin-bottom: 5px; color: var(--muted); font-size: 9px; font-weight: 750; }
    .control input, .control select {
      width: 100%;
      height: 38px;
      padding: 0 10px;
      color: var(--text);
      border: 1px solid var(--line-strong);
      border-radius: 9px;
      background: #ffffff;
    }
    .instance-list { display: grid; gap: 8px; }
    .instance-card {
      display: grid;
      grid-template-columns: 135px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 13px;
      text-align: left;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #ffffff;
    }
    .instance-card.selected { border-color: rgba(8,125,121,.46); background: var(--teal-soft); }
    .instance-id { color: var(--teal); font-size: 10px; font-weight: 800; }
    .binding-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .binding-tags span { padding: 3px 6px; border: 1px solid var(--line); border-radius: 6px; background: rgba(255,255,255,.66); font-size: 8px; }

    .sut-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .sut-card {
      min-height: 180px;
      padding: 15px;
      text-align: left;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 13px;
      background: var(--panel-soft);
    }
    .sut-card.selected { border-color: rgba(8,125,121,.45); background: var(--teal-soft); }
    .sut-card .sut-type { color: var(--teal); font-size: 8px; font-weight: 850; letter-spacing: .08em; }
    .sut-card b { display: block; margin: 10px 0 7px; font-size: 12px; }
    .sut-card p { margin: 0; color: var(--muted); font-size: 10px; }
    .sut-card .expected { margin-top: 13px; padding-top: 10px; border-top: 1px solid var(--line); color: #40596a; font-size: 9px; }

    .run-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
    .summary-card { padding: 11px; border: 1px solid var(--line); border-radius: 10px; background: var(--panel-soft); }
    .summary-card span { display: block; color: var(--muted); font-size: 8px; text-transform: uppercase; }
    .summary-card b { display: block; margin-top: 4px; font-size: 10px; }
    .run-progress { height: 8px; overflow: hidden; margin: 12px 0 17px; border-radius: 999px; background: #e8edef; }
    .run-progress div { height: 100%; width: 0; border-radius: inherit; background: var(--teal); transition: width .35s ease; }
    .phase-list { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; }
    .phase {
      min-height: 126px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: #ffffff;
    }
    .phase.active { border-color: #e7c890; background: var(--amber-soft); }
    .phase.done { border-color: #d5e3bb; background: var(--green-soft); }
    .phase-index { color: var(--muted); font-size: 8px; font-weight: 850; }
    .phase b { display: block; margin: 7px 0 5px; font-size: 10px; }
    .phase p { margin: 0; color: var(--muted); font-size: 8px; }
    .actor { display: inline-flex; margin-top: 8px; padding: 2px 5px; border-radius: 5px; color: var(--blue); background: var(--blue-soft); font-size: 7px; font-weight: 800; }
    .run-log { max-height: 155px; overflow: auto; margin-top: 13px; padding: 11px; border: 1px solid var(--line); border-radius: 10px; background: #172733; color: #d7e6ed; font: 9px/1.7 ui-monospace, monospace; }

    .filter-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 13px; }
    .filter-button { padding: 6px 9px; color: var(--muted); border: 1px solid var(--line); border-radius: 8px; background: #ffffff; font-size: 9px; font-weight: 750; }
    .filter-button.active { color: var(--teal); border-color: #b7d9d6; background: var(--teal-soft); }
    .evidence-list { display: grid; gap: 7px; }
    .evidence-event {
      display: grid;
      grid-template-columns: 64px 82px 1fr;
      gap: 10px;
      align-items: start;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #ffffff;
    }
    .evidence-event.gt { border-left: 3px solid var(--amber); background: #fffbf4; }
    .evidence-event.trace { border-left: 3px solid var(--teal); }
    .event-time { color: var(--muted); font: 9px ui-monospace, monospace; }
    .event-lane { font-size: 8px; font-weight: 850; letter-spacing: .06em; }
    .evidence-event.gt .event-lane { color: var(--amber); }
    .evidence-event.trace .event-lane { color: var(--teal); }
    .event-body b { display: block; font-size: 10px; }
    .event-body span { display: block; margin-top: 3px; color: var(--muted); font-size: 8px; }

    .grader-banner { display: grid; grid-template-columns: 1fr auto; gap: 15px; align-items: center; padding: 15px; border: 1px solid var(--line); border-radius: 12px; background: var(--panel-soft); }
    .grader-banner h3 { margin: 0; font-size: 15px; }
    .grader-banner p { margin: 5px 0 0; color: var(--muted); font-size: 9px; }
    .grader-table { width: 100%; margin-top: 14px; border-collapse: collapse; font-size: 10px; }
    .grader-table th, .grader-table td { padding: 11px 8px; text-align: left; border-bottom: 1px solid var(--line); }
    .grader-table th { color: var(--muted); font-size: 8px; text-transform: uppercase; }
    .gate-card { margin-top: 15px; padding: 14px; border: 1px solid #d7e4c0; border-radius: 12px; background: var(--green-soft); }
    .gate-card.failed { border-color: #ecc5ca; background: var(--red-soft); }
    .gate-card .gate-label { color: var(--green); font-size: 8px; font-weight: 850; letter-spacing: .08em; }
    .gate-card.failed .gate-label { color: var(--red); }
    .gate-card b { display: block; margin-top: 6px; font-size: 12px; }
    .gate-card p { margin: 5px 0 0; color: #4c625a; font-size: 9px; }

    .review-list { display: grid; gap: 8px; }
    .review-item { padding: 10px; border: 1px solid var(--line); border-radius: 10px; background: var(--panel-soft); }
    .review-item .review-type { font-size: 8px; font-weight: 850; letter-spacing: .07em; }
    .review-item.valid .review-type { color: var(--green); }
    .review-item.pending .review-type { color: var(--amber); }
    .review-item.info .review-type { color: var(--blue); }
    .review-item b { display: block; margin-top: 4px; font-size: 10px; }
    .review-item p { margin: 4px 0 0; color: var(--muted); font-size: 8px; }
    .review-item-foot { display: flex; justify-content: space-between; gap: 10px; align-items: end; margin-top: 7px; }
    .review-item-foot .artifact-link { margin-top: 0; }
    .artifact-link { display: block; margin-top: 5px; color: var(--teal); font: 8px ui-monospace, monospace; overflow-wrap: anywhere; }
    .disclaimer {
      margin-top: 14px;
      padding: 10px;
      color: #6e4c1f;
      border: 1px solid #ecd3a8;
      border-radius: 9px;
      background: var(--amber-soft);
      font-size: 8px;
    }

    .review-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(18, 35, 46, .48);
      backdrop-filter: blur(4px);
    }
    .review-workspace {
      width: min(980px, 100%);
      max-height: min(88vh, 860px);
      overflow: hidden;
      border: 1px solid var(--line-strong);
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 24px 70px rgba(18, 35, 46, .24);
    }
    .review-workspace-head {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: start;
      padding: 20px 22px 16px;
      border-bottom: 1px solid var(--line);
    }
    .review-workspace-head h2 { margin: 3px 0 0; font-size: 20px; }
    .review-workspace-head p { margin: 6px 0 0; color: var(--muted); font-size: 10px; }
    .review-tabs { display: flex; gap: 6px; padding: 12px 22px 0; }
    .review-tab { padding: 8px 11px; color: var(--muted); border: 1px solid var(--line); border-radius: 9px; background: #fff; font-size: 9px; font-weight: 800; }
    .review-tab.active { color: var(--teal); border-color: #add5d1; background: var(--teal-soft); }
    .review-workspace-body { max-height: calc(88vh - 205px); overflow: auto; padding: 16px 22px 22px; }
    .review-workspace-foot { display: flex; justify-content: space-between; gap: 12px; align-items: center; padding: 14px 22px; border-top: 1px solid var(--line); background: var(--panel-soft); }
    .review-workspace-foot .action-note { max-width: 58%; }
    .review-section-title { margin: 0 0 10px; font-size: 12px; }
    .review-help { margin: -4px 0 14px; color: var(--muted); font-size: 9px; }
    .review-form-list { display: grid; gap: 10px; }
    .review-form-card { padding: 13px; border: 1px solid var(--line); border-radius: 12px; background: var(--panel-soft); }
    .review-form-card.pending { border-color: #ebcea1; background: var(--amber-soft); }
    .review-form-card-head { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 9px; }
    .review-form-card-head b { font-size: 11px; }
    .review-form-card-head span { color: var(--muted); font: 8px ui-monospace, monospace; }
    .review-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .review-field label { display: block; margin-bottom: 5px; color: var(--muted); font-size: 8px; font-weight: 800; }
    .review-field input, .review-field select, .review-field textarea {
      width: 100%;
      padding: 9px 10px;
      color: var(--text);
      border: 1px solid var(--line-strong);
      border-radius: 9px;
      background: #fff;
      font: inherit;
    }
    .review-field textarea { min-height: 76px; resize: vertical; }
    .review-template-editor { min-height: 430px !important; line-height: 1.75; }
    .review-empty { padding: 24px; text-align: center; color: var(--muted); border: 1px dashed var(--line-strong); border-radius: 12px; }
    .review-dependency-list { display: grid; gap: 7px; margin-bottom: 14px; }
    .review-dependency { display: flex; justify-content: space-between; gap: 12px; padding: 10px; border: 1px solid var(--line); border-radius: 10px; }
    .review-dependency b { display: block; font-size: 10px; }
    .review-dependency span { color: var(--muted); font-size: 8px; }
    .revision-badge { display: inline-flex; padding: 4px 7px; color: var(--blue); background: var(--blue-soft); border-radius: 6px; font-size: 8px; font-weight: 800; }

    @media (max-width: 1120px) {
      .console { grid-template-columns: 220px minmax(480px, 1fr); }
      .review-panel { position: static; grid-column: 1 / -1; }
      .review-panel .side-body { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    }
    @media (max-width: 820px) {
      .app-header { padding: 0 12px; }
      .header-actions .print-label, .brand span { display: none; }
      .stage-shell { padding: 10px 12px; }
      .stage-rail { display: flex; }
      .stage-node { flex: 0 0 102px; }
      .console { grid-template-columns: 1fr; width: min(calc(100% - 20px), 720px); }
      .side-panel { position: static; }
      .context-panel .side-body { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .context-block + .context-block { margin: 0; padding: 0; border: 0; }
      .choice-grid, .sut-grid { grid-template-columns: 1fr; }
      .phase-list { grid-template-columns: 1fr; }
      .review-panel .side-body { grid-template-columns: 1fr; }
      .review-overlay { padding: 8px; }
      .review-fields { grid-template-columns: 1fr; }
      .review-workspace-foot { align-items: stretch; flex-direction: column; }
      .review-workspace-foot .action-note { max-width: none; }
    }
    @media (max-width: 540px) {
      .mode-badge { display: none; }
      .case-select { max-width: 150px; }
      .workspace-head { align-items: start; flex-direction: column; }
      .workspace-body { padding: 18px 16px; }
      .context-panel .side-body, .validation-grid, .run-summary { grid-template-columns: 1fr; }
      .instance-tools { grid-template-columns: 1fr 1fr; }
      .instance-tools .btn { grid-column: 1 / -1; }
      .instance-card { grid-template-columns: 1fr; }
      .evidence-event { grid-template-columns: 54px 1fr; }
      .event-body { grid-column: 1 / -1; }
    }
    @media print {
      .app-header, .stage-shell, .context-panel, .workspace .action-row, .filter-row { display: none !important; }
      body { background: #ffffff; }
      .console { display: block; width: 100%; margin: 0; }
      .workspace, .review-panel { box-shadow: none; border: 0; }
      .review-panel { margin-top: 20px; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <div class="brand-mark">UAV</div>
      <div><b>Benchmark Pipeline Console</b><span id="headerCaseTitle">固定业务场景加载中</span></div>
    </div>
    <div class="header-actions">
      <span class="mode-badge">固定场景 → 人工任务 → AGENT → 人工复核</span>
      <button class="btn" id="resetButton" type="button">重新开始</button>
      <button class="btn" type="button" onclick="window.print()"><span class="print-label">打印摘要</span></button>
    </div>
  </header>

  <div class="stage-shell">
    <nav class="stage-rail" id="stageRail" aria-label="Pipeline 阶段"></nav>
  </div>

  <main class="console">
    <aside class="panel side-panel context-panel">
      <div class="side-head"><div class="eyebrow">Run Context</div><h2>本次运行</h2></div>
      <div class="side-body" id="contextPanel"></div>
    </aside>

    <section class="panel workspace">
      <div class="workspace-head">
        <div><div class="eyebrow" id="workspaceEyebrow"></div><h1 id="workspaceTitle"></h1></div>
        <div class="stage-state" id="workspaceState"></div>
      </div>
      <div class="workspace-body" id="workspaceBody"></div>
    </section>

    <aside class="panel side-panel review-panel">
      <div class="side-head"><div class="eyebrow">Evidence & Review</div><h2>证据与审核</h2></div>
      <div class="side-body" id="reviewPanel"></div>
    </aside>
  </main>

  <div id="reviewWorkspaceHost"></div>

  <script>
    "use strict";

    const STAGES = [
      ["STEP 1", "任务域选择",     "场景 + 简短描述"],
      ["STEP 2", "扩充与提取",     "Agent 文案 + A×L + JD"],
      ["STEP 3", "Domain Template", "JD 取值域 + 确认 A×L"],
      ["STEP 4", "Task Template",  "Seed → 具体值"],
    ];

    const SCENARIO_TASK_EXAMPLES = {
      highway_inspection: "例如：让无人机巡查指定高速路段，持续识别和记录违法停车车辆。同一辆车短时遮挡后再次出现时不要重复上报；遇到定位异常先安全保持并通知调度人员。",
      oil_gas_inspection: "例如：让无人机沿油气管道巡检并持续记录发现的异常。电量不足以安全完成任务时，由它自己决定缩短巡检、返航还是去安全点。",
      bridge_inspection: "例如：让无人机检查桥底和指定结构件，把发现的病害标在桥梁三维模型上并持续更新。",
      campus_inspection: "例如：让无人机巡查园区道路和设施，发现异常后持续更新告警。需要近距离查看时通知机器狗去复核。",
      other_inspection: "例如：让无人机沿指定河段持续查找异常漂浮物，发现后记录位置和图片并发出告警。",
    };

    const STORAGE_KEY = "uav_pipeline_v5";

    function initialState() {
      return {
        currentStage: 0, maxUnlocked: 0, completed: new Set(),
        serverStatus: "checking", catalogSummary: null,
        scenarioRegistry: null, selectedScenarioId: "highway_inspection", fixedScenario: null,
        taskPrompt: "", modelTier: "flash",
        narrativeStatus: "idle", narrativeRunId: null, narrativeDraft: "", narrativeOriginal: "", narrativeError: null,
        agentStatus: "idle", agentRunId: null, agentResult: null, agentError: null,
        domainEdits: {},
        instanceMode: "single", instanceSeed: 0, instanceBatchSeeds: "0-4",
        instanceResult: null, instanceResults: null, instanceError: null, instanceLoading: false,
        saveNotice: null,
      };
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved) return initialState();
        const s = Object.assign(initialState(), saved);
        s.completed = new Set(saved.completed || []);
        return s;
      } catch { return initialState(); }
    }

    function persistState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(Object.assign({}, state, {completed: Array.from(state.completed)})));
    }

    let state = initialState();
    let pollTimer = null;

    function escapeHtml(v) { return String(v).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c])); }
    function pill(text, cls) { return '<span class="status-pill ' + (cls || "proposed") + '">' + escapeHtml(text) + "</span>"; }
    function uid(p) { return p + Math.random().toString(36).substring(2, 10); }

    function completeStage(i) { state.completed.add(i); state.maxUnlocked = Math.max(state.maxUnlocked, Math.min(i + 1, STAGES.length - 1)); state.currentStage = Math.min(i + 1, STAGES.length - 1); render(); }
    function goToStage(i) { if (i <= state.maxUnlocked) { state.currentStage = i; render(); } }

    function renderStageRail() {
      document.getElementById("stageRail").innerHTML = STAGES.map((s, i) => {
        const cls = i === state.currentStage ? "current" : state.completed.has(i) ? "done" : i <= state.maxUnlocked ? "" : "locked";
        return '<button class="stage-node ' + cls + '" type="button" onclick="goToStage(' + i + ')"' + (i > state.maxUnlocked ? " disabled" : "") + "><span>" + s[0] + "</span><b>" + s[1] + "</b></button>";
      }).join("");
    }

    function setHeader(i, st) {
      document.getElementById("workspaceEyebrow").textContent = STAGES[i][0] + " · " + STAGES[i][2];
      document.getElementById("workspaceTitle").textContent = STAGES[i][1];
      document.getElementById("workspaceState").textContent = st || "";
    }

    async function savePipeline() {
      try {
        const r = await fetch("/api/pipeline/save", {method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify({selectedScenarioId: state.selectedScenarioId, taskPrompt: state.taskPrompt,
            narrativeDraft: state.narrativeDraft, agentResult: state.agentResult, domainEdits: state.domainEdits,
            completedSteps: Array.from(state.completed), savedAt: new Date().toISOString()})});
        state.saveNotice = r.ok ? "已保存 ✓" : "保存失败";
      } catch(e) { state.saveNotice = "保存失败: " + e; }
      render();
    }

    async function loadPipeline() {
      try {
        const r = await fetch("/api/pipeline/load", {cache: "no-store"});
        if (!r.ok) { state.saveNotice = "没有已保存的进度"; render(); return; }
        const d = await r.json();
        if (d.selectedScenarioId) state.selectedScenarioId = d.selectedScenarioId;
        if (d.taskPrompt !== undefined) state.taskPrompt = d.taskPrompt;
        if (d.narrativeDraft) { state.narrativeDraft = d.narrativeDraft; state.narrativeStatus = "done"; }
        if (d.agentResult) { state.agentResult = d.agentResult; state.agentStatus = "done"; }
        if (d.domainEdits) state.domainEdits = d.domainEdits;
        if (d.completedSteps) { state.completed = new Set(d.completedSteps); state.maxUnlocked = Math.max(...d.completedSteps, 0); }
        state.saveNotice = "已加载 ✓";
      } catch(e) { state.saveNotice = "加载失败: " + e; }
      render();
    }

    function saveBar() {
      return '<div class="action-row" style="margin-bottom:16px"><span class="action-note">' + escapeHtml(state.saveNotice || "随时保存，重启后加载继续") + '</span>'
        + '<div><button class="btn" type="button" onclick="loadPipeline()">加载</button> '
        + '<button class="btn primary" type="button" onclick="savePipeline()">保存</button></div></div>';
    }

    // ── STEP 1 ────────────────────────────────────────────────────────── //

    function renderStep1() {
      const locked = state.completed.has(0);
      const sc = state.fixedScenario;
      setHeader(0, locked ? "已确认" : "等待确认");
      if (!sc) { document.getElementById("workspaceBody").innerHTML = '<div class="choice-card">读取场景中...</div>'; return; }
      const opts = ((state.scenarioRegistry && state.scenarioRegistry.scenarios) || [])
        .map(s => '<option value="' + s.scenario_id + '"' + (s.scenario_id === state.selectedScenarioId ? " selected" : "") + ">" + escapeHtml(s.title) + "</option>").join("");
      const rows = (sc.variable_bindings || []).map(b => "<tr><td class='mono'>" + escapeHtml(b.slot_id) + "</td><td>" + escapeHtml(b.name) + "</td><td>" + escapeHtml(b.value_or_domain) + "</td><td>" + pill(b.binding_mode, b.binding_mode === "fixed_value" ? "given" : "proposed") + "</td></tr>").join("");
      document.getElementById("workspaceBody").innerHTML = saveBar()
        + '<p class="intro">选择业务场景并输入简短任务描述。这一步不调用模型。</p>'
        + '<div class="field-label"><label>业务场景</label></div><div class="control" style="margin-bottom:14px"><select id="scenarioSelect"' + (locked ? " disabled" : "") + ">" + opts + "</select></div>"
        + '<table class="data-table"><thead><tr><th>Slot</th><th>Name</th><th>Domain</th><th>Mode</th></tr></thead><tbody>' + rows + '</tbody></table>'
        + '<div class="field-label" style="margin-top:18px"><label>简短任务描述（1–3句）</label></div>'
        + '<textarea class="task-input" id="taskPrompt" placeholder="' + escapeHtml(SCENARIO_TASK_EXAMPLES[state.selectedScenarioId] || "") + '"' + (locked ? " disabled" : "") + ">" + escapeHtml(state.taskPrompt) + '</textarea>'
        + '<div class="action-row"><span class="action-note">确认后进入 Step 2</span><button class="btn primary" type="button" onclick="confirmStep1()"' + (locked || state.taskPrompt.trim().length < 5 ? " disabled" : "") + ">确认 →</button></div>";
      const sel = document.getElementById("scenarioSelect");
      if (sel) sel.addEventListener("change", () => { state.selectedScenarioId = sel.value; const f = state.scenarioRegistry.scenarios.find(s => s.scenario_id === sel.value); if (f) state.fixedScenario = f; render(); });
      const ta = document.getElementById("taskPrompt");
      if (ta) ta.addEventListener("input", () => { state.taskPrompt = ta.value; });
    }
    function confirmStep1() { if (state.taskPrompt.trim().length >= 5) completeStage(0); }

    // ── STEP 2 ────────────────────────────────────────────────────────── //

    async function runNarrative() {
      state.narrativeStatus = "running"; state.narrativeError = null; state.narrativeRunId = uid("agent-"); render();
      try {
        const r = await fetch("/api/config-agent/expand", {method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify({task_description: state.taskPrompt, scenario_id: state.selectedScenarioId, model_tier: state.modelTier, run_id: state.narrativeRunId})});
        const d = await r.json();
        if (!r.ok) throw new Error(d.message || d.error);
        state.narrativeStatus = "done"; state.narrativeDraft = d.result.draft.expanded_narrative; state.narrativeOriginal = state.narrativeDraft;
      } catch(e) { state.narrativeStatus = "idle"; state.narrativeError = String(e.message || e); }
      render();
    }

    async function runClassification() {
      state.agentStatus = "running"; state.agentError = null; state.agentRunId = uid("agent-"); render();
      try {
        const r = await fetch("/api/config-agent/analyze", {method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify({task_description: state.narrativeDraft, scenario_id: state.selectedScenarioId, model_tier: state.modelTier, run_id: state.agentRunId, source_task_description: state.taskPrompt, narrative_parent_run_id: state.narrativeRunId})});
        const d = await r.json();
        if (!r.ok) throw new Error(d.message || d.error);
        state.agentStatus = "done"; state.agentResult = d.result;
      } catch(e) { state.agentStatus = "idle"; state.agentError = String(e.message || e); }
      render();
    }

    function renderStep2() {
      setHeader(1, state.completed.has(1) ? "已完成" : state.agentStatus === "done" ? "待确认" : state.narrativeStatus === "done" ? "文案待确认" : "等待运行");
      const hasN = state.narrativeStatus === "done", hasA = state.agentStatus === "done";
      let h = saveBar() + '<p class="intro">两次模型调用：① 扩充文案（可编辑）→ ② 分类 A×L + 提取 JD 变量域。</p>';
      h += '<div class="field-label" style="margin-top:10px"><label>① 文案扩充</label></div>';
      if (state.narrativeStatus === "running") h += '<div class="choice-card selected"><b>调用中...</b></div>';
      else if (hasN) {
        h += '<textarea class="task-input" id="narEdit" style="min-height:180px">' + escapeHtml(state.narrativeDraft) + '</textarea>';
        h += '<div class="action-row"><span class="action-note">可直接修改</span><button class="btn primary" onclick="confirmNar()">确认文案 →</button></div>';
      } else {
        h += '<button class="btn primary" onclick="runNarrative()"' + (state.serverStatus !== "ready" ? " disabled" : "") + ">运行文案扩充</button>";
        if (state.narrativeError) h += '<div class="choice-card dependency selected" style="margin-top:8px"><b>错误</b><p>' + escapeHtml(state.narrativeError) + "</p></div>";
      }
      if (state.agentStatus === "running") { h += '<div class="field-label" style="margin-top:16px"><label>② 分类与提取</label></div><div class="choice-card selected"><b>调用中...</b></div>'; }
      if (hasA) {
        const c = state.agentResult.candidate;
        h += '<div class="field-label" style="margin-top:16px"><label>② A×L 覆盖</label></div>';
        h += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">' + (c.coverage_candidates || []).map(x => '<span class="status-pill proposed" style="padding:5px 10px;font-size:10px">' + escapeHtml(x.cell) + "</span>").join("") + '</div>';
        h += '<div class="field-label"><label>③ JD 变量域（' + (c.jd_candidates || []).length + ' 个）</label></div>';
        h += '<table class="data-table"><thead><tr><th>Slot</th><th>Name</th><th>Domain</th><th>Mode</th></tr></thead><tbody>'
          + (c.jd_candidates || []).map(j => {
              const bm = j.binding_mode || "fixed"; let v = j.value ? escapeHtml(String(j.value)) : "—";
              if (bm === "enum") v = (j.allowed_values || []).map(escapeHtml).join(", ");
              else if (bm === "range") v = "[" + j.minimum + "~" + j.maximum + "]";
              return "<tr><td class='mono'>" + escapeHtml(j.slot_id) + "</td><td>" + escapeHtml(j.name) + "</td><td>" + v + "</td><td>" + pill(bm) + "</td></tr>";
            }).join("") + '</tbody></table>';
        h += '<div class="action-row" style="margin-top:14px"><span class="action-note">确认后进入 Step 3 编辑域</span><button class="btn primary" onclick="completeStage(1)">确认 →</button></div>';
      }
      if (state.agentError) h += '<div class="choice-card dependency selected" style="margin-top:8px"><b>分类错误</b><p>' + escapeHtml(state.agentError) + "</p></div>";
      document.getElementById("workspaceBody").innerHTML = h;
      const ne = document.getElementById("narEdit");
      if (ne) ne.addEventListener("input", () => { state.narrativeDraft = ne.value; });
    }
    function confirmNar() { state.narrativeStatus = "done"; runClassification(); }

    // ── STEP 3 ────────────────────────────────────────────────────────── //

    function getEdits() {
      const c = state.agentResult ? state.agentResult.candidate : null;
      if (!c) return [];
      return (c.jd_candidates || []).map(j => {
        const e = state.domainEdits[j.slot_id] || {};
        return {slot_id: j.slot_id, name: j.name, binding_mode: e.binding_mode || j.binding_mode || "fixed",
          value: e.value !== undefined ? e.value : j.value, allowed_values: e.allowed_values || j.allowed_values || [],
          minimum: e.minimum !== undefined ? e.minimum : j.minimum, maximum: e.maximum !== undefined ? e.maximum : j.maximum};
      });
    }
    function setEdit(id, f, v) { if (!state.domainEdits[id]) state.domainEdits[id] = {}; state.domainEdits[id][f] = f === "allowed_values" ? v.split(/[,，]/).map(s => s.trim()).filter(Boolean) : v; }

    function renderStep3() {
      setHeader(2, state.completed.has(2) ? "已确认" : "编辑取值域");
      const edits = getEdits();
      let h = saveBar() + '<p class="intro">为每个 JD 变量定义取值域。fixed=固定；enum=离散选项；range=数值区间；TBD=未知。域越丰富，Step 4 生成的实例越多样。</p>';
      const c = state.agentResult ? state.agentResult.candidate : null;
      if (c && c.coverage_candidates) {
        h += '<div class="field-label" style="margin-top:8px"><label>A×L（' + c.coverage_candidates.length + ' 个）</label></div>';
        h += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">' + c.coverage_candidates.map(x => '<span class="status-pill proposed" style="padding:5px 10px">' + escapeHtml(x.cell) + '</span>').join("") + '</div>';
      }
      h += '<table class="data-table"><thead><tr><th>Slot</th><th>Name</th><th>Mode</th><th>Domain</th></tr></thead><tbody>';
      for (const e of edits) {
        const bm = e.binding_mode;
        h += "<tr><td class='mono'>" + escapeHtml(e.slot_id) + "</td><td>" + escapeHtml(e.name) + "</td>"
          + '<td><select onchange="setEdit(\'' + e.slot_id + "','binding_mode',this.value)\" style=\"padding:4px 8px;border:1px solid var(--line-strong);border-radius:6px;font-size:10px\">"
          + ["fixed","enum","range","TBD"].map(m => "<option value='" + m + "'" + (m === bm ? " selected" : "") + ">" + m + "</option>").join("") + "</select></td>";
        if (bm === "fixed") h += '<td><input type="text" value="' + escapeHtml(e.value || "") + '" onchange="setEdit(\'' + e.slot_id + "','value',this.value)\" style=\"width:100%;padding:4px 8px;border:1px solid var(--line-strong);border-radius:6px;font-size:10px\"></td>";
        else if (bm === "enum") h += '<td><input type="text" value="' + escapeHtml((e.allowed_values || []).join(", ")) + '" placeholder="A, B, C" onchange="setEdit(\'' + e.slot_id + "','allowed_values',this.value)\" style=\"width:100%;padding:4px 8px;border:1px solid var(--line-strong);border-radius:6px;font-size:10px\"></td>';
        else if (bm === "range") h += '<td><input type="number" value="' + (e.minimum || "") + '" onchange="setEdit(\'' + e.slot_id + "','minimum',parseFloat(this.value))\" style=\"width:55px;padding:4px;border:1px solid var(--line-strong);border-radius:6px;font-size:10px\"> ~ <input type="number" value="' + (e.maximum || "") + '" onchange="setEdit(\'' + e.slot_id + "','maximum',parseFloat(this.value))\" style=\"width:55px;padding:4px;border:1px solid var(--line-strong);border-radius:6px;font-size:10px\"></td>';
        else h += "<td>—</td>";
        h += "</tr>";
      }
      h += '</tbody></table>';
      const variable = edits.filter(e => e.binding_mode === "enum" || e.binding_mode === "range").length;
      h += '<div class="action-row" style="margin-top:14px"><span class="action-note">' + variable + ' 个可变域</span><button class="btn primary" onclick="completeStage(2)">确认 Domain Template →</button></div>';
      document.getElementById("workspaceBody").innerHTML = h;
    }

    // ── STEP 4 ────────────────────────────────────────────────────────── //

    function buildTemplate() {
      const c = state.agentResult ? state.agentResult.candidate : null;
      if (!c) return null;
      return {template_id: (c.task_title || "tpl").replace(/\s+/g, "_").substring(0, 30), template_version: "0.1.0",
        jd_slots: getEdits().map(e => {
          const b = {mode: e.binding_mode, status: "verified"};
          if (e.binding_mode === "fixed") b.value = e.value;
          else if (e.binding_mode === "enum") { b.allowed_values = e.allowed_values; b.value = e.value; }
          else if (e.binding_mode === "range") { b.minimum = e.minimum; b.maximum = e.maximum; }
          return {slot_id: e.slot_id, description: e.name, visibility: "sut_visible", binding: b, provenance: []};
        }), phases: [], disturbances: [], interfaces: {}, coverage: []};
    }

    async function genInstance() {
      const tpl = buildTemplate(); if (!tpl) { state.instanceError = "无模板"; render(); return; }
      state.instanceLoading = true; state.instanceError = null; state.instanceResult = null; state.instanceResults = null; render();
      try {
        const ep = state.instanceMode === "traverse" ? "/api/instance/traverse" : state.instanceMode === "batch" ? "/api/instance/batch" : "/api/instance/generate";
        const body = state.instanceMode === "single" ? {template: tpl, seed: parseInt(state.instanceSeed) || 0}
          : state.instanceMode === "batch" ? {template: tpl, seeds: state.instanceBatchSeeds} : {template: tpl, steps_per_range: 3};
        const r = await fetch(ep, {method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(body)});
        const d = await r.json(); if (!r.ok) throw new Error(d.message || d.error);
        if (state.instanceMode === "single") state.instanceResult = d.instance; else state.instanceResults = d.instances || [];
      } catch(e) { state.instanceError = String(e.message || e); }
      state.instanceLoading = false; render();
    }

    function renderStep4() {
      setHeader(3, state.instanceResult ? "已生成" : "等待 Seed");
      const tpl = buildTemplate();
      let h = saveBar() + '<p class="intro">Domain Template + Seed → Task Template（每个域取一个具体值）。同一 Seed 始终产生相同结果。</p>';
      if (tpl) {
        h += '<table class="data-table"><thead><tr><th>Slot</th><th>Mode</th><th>Domain</th></tr></thead><tbody>'
          + tpl.jd_slots.map(s => { let v = "—"; if (s.binding.mode === "fixed") v = escapeHtml(String(s.binding.value)); else if (s.binding.mode === "enum") v = escapeHtml((s.binding.allowed_values || []).join(" | ")); else if (s.binding.mode === "range") v = "[" + s.binding.minimum + "~" + s.binding.maximum + "]"; return "<tr><td class='mono'>" + escapeHtml(s.slot_id) + "</td><td>" + pill(s.binding.mode) + "</td><td>" + v + "</td></tr>"; }).join("")
          + '</tbody></table>';
      }
      h += '<div class="field-label" style="margin-top:16px"><label>模式</label></div><div class="control" style="margin-bottom:8px"><select id="im">'
        + [["single","单个 Seed"],["batch","批量范围"],["traverse","全遍历"]].map(m => "<option value='" + m[0] + "'" + (m[0] === state.instanceMode ? " selected" : "") + ">" + m[1] + "</option>").join("") + "</select></div>";
      if (state.instanceMode === "single") h += '<input type="number" min="0" value="' + state.instanceSeed + '" id="is" style="padding:4px 8px;width:100px;border:1px solid var(--line-strong);border-radius:6px">';
      else if (state.instanceMode === "batch") h += '<input type="text" value="' + escapeHtml(state.instanceBatchSeeds) + '" id="ib" style="padding:4px 8px;width:200px;border:1px solid var(--line-strong);border-radius:6px">';
      h += '<div class="action-row" style="margin-top:10px"><button class="btn primary" onclick="genInstance()"' + (state.instanceLoading ? " disabled" : "") + ">" + (state.instanceLoading ? "生成中..." : "生成") + "</button></div>";
      if (state.instanceError) h += '<div class="choice-card dependency selected" style="margin-top:10px"><b>错误</b><p>' + escapeHtml(state.instanceError) + "</p></div>";
      else if (state.instanceResult) h += '<div class="choice-card selected" style="margin-top:10px"><b>SEED ' + state.instanceResult.seed + '</b><p class="mono" style="font-size:11px">' + escapeHtml(state.instanceResult.instance_id) + '</p><table class="data-table"><thead><tr><th>Slot</th><th>Value</th><th>Status</th></tr></thead><tbody>' + (state.instanceResult.slot_bindings || []).map(s => "<tr><td class='mono'>" + escapeHtml(s.slot_id) + "</td><td>" + escapeHtml(JSON.stringify(s.value)) + "</td><td>" + pill(s.status) + "</td></tr>").join("") + '</tbody></table></div>';
      else if (state.instanceResults) h += '<div class="choice-card selected" style="margin-top:10px"><b>' + state.instanceResults.length + ' 个实例</b><table class="data-table"><thead><tr><th>Instance</th><th>Seed</th><th>Resolved</th></tr></thead><tbody>' + state.instanceResults.map(i => "<tr><td class='mono'>" + escapeHtml(i.instance_id) + "</td><td>" + i.seed + "</td><td>" + (i.slot_bindings || []).filter(s => s.status !== "TBD").length + "/" + (i.slot_bindings || []).length + "</td></tr>").join("") + '</tbody></table></div>';
      document.getElementById("workspaceBody").innerHTML = h;
      const im = document.getElementById("im"); if (im) im.addEventListener("change", () => { state.instanceMode = im.value; render(); });
      const is = document.getElementById("is"); if (is) is.addEventListener("change", () => { state.instanceSeed = parseInt(is.value) || 0; });
      const ib = document.getElementById("ib"); if (ib) ib.addEventListener("change", () => { state.instanceBatchSeeds = ib.value; });
    }

    // ── Sidebars ──────────────────────────────────────────────────────── //

    function renderContext() {
      let h = '<div class="context-block"><div class="context-label">Status</div><div class="context-value">' + pill(state.serverStatus, state.serverStatus === "ready" ? "given" : "tbd") + '</div></div>';
      if (state.catalogSummary) h += '<div class="context-block"><div class="context-label">Catalog</div><div class="context-value">' + state.catalogSummary.counts.abilities + "A · " + state.catalogSummary.counts.gal_cells + " A×L · " + state.catalogSummary.counts.jd_fields + " JD</div></div>";
      if (state.fixedScenario) h += '<div class="context-block"><div class="context-label">Scenario</div><div class="context-value">' + escapeHtml(state.fixedScenario.title) + '</div></div>';
      if (state.agentResult && state.agentResult.candidate) h += '<div class="context-block"><div class="context-label">Coverage</div><div class="mini-tags">' + (state.agentResult.candidate.coverage_candidates || []).map(c => '<span class="mini-tag scored">' + escapeHtml(c.cell) + '</span>').join("") + '</div></div>';
      h += '<div class="context-block"><div class="context-label">Progress</div><div class="progress-track"><div class="progress-fill" style="width:' + (state.completed.size / STAGES.length * 100) + '%"></div></div><div class="action-note">' + state.completed.size + '/' + STAGES.length + '</div></div>';
      document.getElementById("contextPanel").innerHTML = h;
    }

    function renderReview() {
      const items = [];
      if (state.narrativeError) items.push({t:"pending",l:"文案错误",d:state.narrativeError});
      if (state.agentError) items.push({t:"pending",l:"分类错误",d:state.agentError});
      if (state.agentResult && state.agentResult.validation_issues) state.agentResult.validation_issues.forEach(v => items.push({t:"pending",l:v.code,d:v.message}));
      document.getElementById("reviewPanel").innerHTML = items.length ? '<div class="review-list">' + items.slice(0,10).map(i => '<div class="review-item ' + i.t + '"><div class="review-type ' + i.t + '">' + escapeHtml(i.l) + '</div><b>' + escapeHtml(i.l) + '</b><p>' + escapeHtml(i.d) + '</p></div>').join("") + '</div>' : '<div class="review-item info"><div class="review-type info">INFO</div><b>无待处理项</b></div>';
    }

    function render() { renderStageRail(); renderContext(); renderReview(); [renderStep1, renderStep2, renderStep3, renderStep4][state.currentStage](); persistState(); }

    document.getElementById("resetButton").addEventListener("click", () => { if (pollTimer) clearTimeout(pollTimer); state = initialState(); render(); init(); });

    async function init() {
      try {
        const h = await (await fetch("/api/health", {cache:"no-store"})).json(); state.serverStatus = h.agent_ready ? "ready" : "missing_api_key";
        state.catalogSummary = await (await fetch("/api/catalog", {cache:"no-store"})).json();
        const reg = await (await fetch("/api/scenarios", {cache:"no-store"})).json(); state.scenarioRegistry = reg;
        state.fixedScenario = reg.scenarios.find(s => s.scenario_id === state.selectedScenarioId) || reg.scenarios[0]; state.selectedScenarioId = state.fixedScenario.scenario_id;
        const sv = await fetch("/api/pipeline/load", {cache:"no-store"});
        if (sv.ok) { const d = await sv.json(); if (d.agentResult && !state.agentResult) { if (d.taskPrompt) state.taskPrompt = d.taskPrompt; if (d.narrativeDraft) { state.narrativeDraft = d.narrativeDraft; state.narrativeStatus = "done"; } state.agentResult = d.agentResult; state.agentStatus = "done"; if (d.domainEdits) state.domainEdits = d.domainEdits; state.completed = new Set(d.completedSteps || [0,1]); state.maxUnlocked = Math.max(...(d.completedSteps||[0,1])); state.saveNotice = "已自动加载"; } }
      } catch(e) { state.serverStatus = "offline"; }
      render();
    }
    render(); init();
  </script>
</body>
</html>
