<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <link rel="icon" href="data:,">
  <title>UAV Benchmark Factory</title>
  <style>
    :root {
      --bg: #f3f6f8;
      --panel: #ffffff;
      --panel-soft: #f8fafb;
      --line: #dbe3e8;
      --line-strong: #c5d1d8;
      --text: #162837;
      --muted: #657786;
      --teal: #087d79;
      --teal-soft: #e3f3f1;
      --blue: #315fa3;
      --blue-soft: #eaf0f8;
      --green: #52771a;
      --green-soft: #edf4df;
      --amber: #9a5b08;
      --amber-soft: #fff3df;
      --red: #ae3e49;
      --red-soft: #fae9eb;
      --shadow: 0 14px 38px rgba(29, 54, 70, .09);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-width: 320px; min-height: 100%; }
    body {
      color: var(--text);
      background:
        radial-gradient(circle at 85% 0%, rgba(8,125,121,.08), transparent 28rem),
        var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }
    button, textarea, input { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .48; }
    :focus-visible { outline: 3px solid rgba(8,125,121,.28); outline-offset: 2px; }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 64px;
      padding: 0 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(16px);
    }
    .brand { display: flex; align-items: center; gap: 11px; min-width: 0; }
    .brand-mark {
      width: 38px;
      height: 38px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      color: #065f5c;
      border: 1px solid rgba(8,125,121,.28);
      border-radius: 12px;
      background:
        linear-gradient(155deg, #f3fbfa 0%, var(--teal-soft) 55%, #d7ecea 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.7);
    }
    .brand-mark svg { width: 24px; height: 24px; display: block; }
    .brand b { display: block; font-size: 14px; letter-spacing: -.01em; }
    .brand span { display: block; color: var(--muted); font-size: 10px; }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    .case-select {
      min-height: 38px;
      max-width: 245px;
      padding: 7px 30px 7px 10px;
      color: var(--text);
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      background: #ffffff;
      font-size: 11px;
      font-weight: 720;
    }
    .mode-badge {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 5px 10px;
      color: var(--amber);
      border: 1px solid #ecd3a8;
      border-radius: 999px;
      background: var(--amber-soft);
      font-size: 10px;
      font-weight: 850;
      letter-spacing: .08em;
    }
    .btn {
      min-height: 38px;
      padding: 8px 13px;
      color: var(--text);
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      background: #ffffff;
      font-size: 12px;
      font-weight: 750;
    }
    .btn:hover:not(:disabled) { border-color: rgba(8,125,121,.48); background: var(--teal-soft); }
    .btn.primary { color: #ffffff; border-color: var(--teal); background: var(--teal); }
    .btn.primary:hover:not(:disabled) { background: #066d69; }
    .btn.danger { color: var(--red); border-color: #ebc3c8; background: var(--red-soft); }
    .btn.small { min-height: 31px; padding: 5px 9px; font-size: 10px; }

    .stage-shell {
      position: sticky;
      top: 64px;
      z-index: 20;
      padding: 12px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(243,246,248,.95);
      backdrop-filter: blur(12px);
    }
    .stage-rail {
      display: grid;
      grid-template-columns: repeat(5, minmax(96px, 1fr));
      gap: 7px;
      max-width: 1500px;
      margin: 0 auto;
      overflow-x: auto;
    }
    .stage-node {
      position: relative;
      min-width: 92px;
      min-height: 58px;
      padding: 8px 9px;
      text-align: left;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 11px;
      background: rgba(255,255,255,.78);
    }
    .stage-node span { display: block; font-size: 9px; font-weight: 850; letter-spacing: .08em; }
    .stage-node b { display: block; margin-top: 3px; color: inherit; font-size: 10px; }
    .stage-node.current { color: var(--teal); border-color: rgba(8,125,121,.42); background: var(--teal-soft); }
    .stage-node.done { color: var(--green); border-color: #d4e3b6; background: var(--green-soft); }
    .stage-node.locked { color: #9aa7af; background: #f1f4f5; }
    .stage-node::after {
      content: "";
      position: absolute;
      right: -8px;
      top: 50%;
      z-index: 2;
      width: 8px;
      height: 1px;
      background: var(--line-strong);
    }
    .stage-node:last-child::after { display: none; }

    .console {
      display: grid;
      grid-template-columns: 250px minmax(520px, 1fr);
      gap: 16px;
      width: min(calc(100% - 32px), 1500px);
      margin: 18px auto 30px;
      align-items: start;
      transition: grid-template-columns .2s ease;
    }
    .console.context-collapsed {
      grid-template-columns: 52px minmax(520px, 1fr);
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .side-panel { position: sticky; top: 150px; overflow: hidden; }
    .side-head { padding: 17px 18px 12px; border-bottom: 1px solid var(--line); }
    .side-head .eyebrow, .workspace-head .eyebrow {
      color: var(--teal);
      font-size: 9px;
      font-weight: 850;
      letter-spacing: .13em;
      text-transform: uppercase;
    }
    .side-head h2 { margin: 5px 0 0; font-size: 16px; }
    .context-toggle {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 14px 13px;
      border: 0;
      border-bottom: 1px solid rgba(8,125,121,.12);
      background:
        linear-gradient(180deg, #f4fbfa 0%, #eef7f6 100%);
      text-align: left;
      color: inherit;
    }
    .context-toggle:hover {
      background: linear-gradient(180deg, #eef8f7 0%, #e5f3f1 100%);
    }
    .context-toggle:focus-visible {
      outline: 3px solid rgba(8,125,121,.28);
      outline-offset: -3px;
    }
    .context-toggle-main {
      display: flex;
      align-items: center;
      gap: 11px;
      min-width: 0;
    }
    .context-toggle-icon {
      width: 34px;
      height: 34px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      color: var(--teal);
      border: 1px solid rgba(8,125,121,.22);
      border-radius: 10px;
      background: #ffffff;
      box-shadow: 0 1px 2px rgba(18, 35, 46, .04);
    }
    .context-toggle-icon svg { width: 18px; height: 18px; display: block; }
    .context-toggle-copy { min-width: 0; }
    .context-toggle .eyebrow {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--teal);
      font-size: 9px;
      font-weight: 850;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .context-toggle .eyebrow::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--teal);
      box-shadow: 0 0 0 3px rgba(8,125,121,.14);
    }
    .context-toggle h2 {
      margin: 4px 0 0;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -.01em;
      color: var(--text);
    }
    .context-chevron {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      padding: 0 10px;
      color: var(--teal);
      border: 1px solid rgba(8,125,121,.22);
      border-radius: 999px;
      background: rgba(255,255,255,.88);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .04em;
      white-space: nowrap;
    }
    .context-chevron svg {
      width: 12px;
      height: 12px;
      display: block;
      transition: transform .18s ease;
    }
    .console.context-collapsed .context-panel { min-height: 132px; }
    .console.context-collapsed .context-toggle {
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      min-height: 132px;
      padding: 14px 8px;
      border-bottom: 0;
      background: linear-gradient(180deg, #f4fbfa 0%, #e7f3f1 100%);
    }
    .console.context-collapsed .context-toggle-main {
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .console.context-collapsed .context-toggle .eyebrow,
    .console.context-collapsed .context-toggle h2 {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      margin: 0;
      letter-spacing: .12em;
    }
    .console.context-collapsed .context-toggle .eyebrow::before { display: none; }
    .console.context-collapsed .context-toggle h2 { font-size: 13px; }
    .console.context-collapsed .context-chevron {
      padding: 8px;
      writing-mode: horizontal-tb;
    }
    .console.context-collapsed .context-chevron .context-chevron-label { display: none; }
    .console.context-collapsed .context-chevron svg { transform: rotate(-90deg); }
    .console.context-collapsed #contextPanel { display: none; }
    .side-body { padding: 15px 18px 18px; }
    .context-block + .context-block { margin-top: 17px; padding-top: 15px; border-top: 1px solid var(--line); }
    .context-label { color: var(--muted); font-size: 9px; font-weight: 800; letter-spacing: .09em; text-transform: uppercase; }
    .context-value { margin-top: 5px; font-size: 12px; font-weight: 720; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .mini-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
    .mini-tag {
      padding: 3px 6px;
      color: #425b6c;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-soft);
      font-size: 9px;
    }
    .mini-tag.scored { color: var(--teal); border-color: #b9dcd9; background: var(--teal-soft); }
    .mini-tag.dep { color: var(--blue); border-color: #c8d5e7; background: var(--blue-soft); }
    .pending-count { color: var(--amber); font-size: 23px; font-weight: 850; }
    .progress-track { height: 7px; overflow: hidden; margin-top: 8px; border-radius: 999px; background: #edf1f3; }
    .progress-fill { height: 100%; border-radius: inherit; background: var(--teal); transition: width .25s ease; }

    .workspace { min-height: 650px; overflow: hidden; }
    .workspace-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      padding: 22px 24px 18px;
      border-bottom: 1px solid var(--line);
    }
    .workspace-head h1 { margin: 5px 0 0; font-size: clamp(22px, 3vw, 32px); line-height: 1.18; letter-spacing: -.035em; }
    .stage-state { color: var(--muted); font-size: 10px; font-weight: 800; }
    .workspace-body { padding: 22px 24px 25px; }
    .intro { margin: 0 0 18px; color: var(--muted); font-size: 12px; }
    .field-label { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 7px; color: #42596a; font-size: 11px; font-weight: 750; }
    .field-label span { color: var(--muted); font-size: 9px; font-weight: 600; }
    .task-input {
      width: 100%;
      min-height: 330px;
      resize: vertical;
      padding: 15px;
      color: var(--text);
      border: 1px solid var(--line-strong);
      border-radius: 13px;
      background: var(--panel-soft);
      font-size: 12px;
      line-height: 1.75;
    }
    .action-row { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 10px; margin-top: 16px; }
    .action-note { color: var(--muted); font-size: 10px; }

    .choice-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .choice-card {
      position: relative;
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: var(--panel-soft);
    }
    .choice-card.selected { border-color: rgba(8,125,121,.42); background: var(--teal-soft); }
    .choice-card.dependency.selected { border-color: #b8cbe2; background: var(--blue-soft); }
    .choice-card input { position: absolute; top: 14px; right: 14px; accent-color: var(--teal); }
    .choice-code { color: var(--teal); font-size: 18px; font-weight: 850; letter-spacing: -.025em; }
    .choice-card.dependency .choice-code { color: var(--blue); }
    .choice-card b { display: block; margin-top: 4px; font-size: 12px; }
    .choice-card p { margin: 7px 0 0; color: var(--muted); font-size: 10px; }
    .group-label { margin: 18px 0 9px; color: var(--muted); font-size: 9px; font-weight: 850; letter-spacing: .1em; text-transform: uppercase; }

    .level-legend { display: grid; gap: 8px; margin: 8px 0 14px; }
    .level-legend-item {
      display: grid;
      grid-template-columns: 54px 1fr;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel-soft);
    }
    .level-legend-item b { font-size: 11px; font-weight: 850; }
    .level-legend-item span { display: block; color: var(--muted); font-size: 9px; line-height: 1.45; }
    .level-legend-item em { display: block; margin-top: 3px; color: var(--text); font-style: normal; font-size: 10px; }
    .level-legend-item.lv-L0 { border-color: #d5dbe1; background: #f4f6f8; }
    .level-legend-item.lv-L0 b { color: #6b7a88; }
    .level-legend-item.lv-L1 { border-color: #c8d5e7; background: var(--blue-soft); }
    .level-legend-item.lv-L1 b { color: var(--blue); }
    .level-legend-item.lv-L2 { border-color: #b9dcd9; background: var(--teal-soft); }
    .level-legend-item.lv-L2 b { color: var(--teal); }
    .level-legend-item.lv-L3 { border-color: #ebcea1; background: var(--amber-soft); }
    .level-legend-item.lv-L3 b { color: var(--amber); }
    .level-legend-item.lv-L4 { border-color: #d4e3b6; background: var(--green-soft); }
    .level-legend-item.lv-L4 b { color: var(--green); }
    .coverage-picker { width: 100%; border-collapse: collapse; font-size: 10px; margin-bottom: 10px; }
    .coverage-picker th, .coverage-picker td { padding: 8px 6px; text-align: left; border-bottom: 1px solid var(--line); vertical-align: middle; }
    .coverage-picker th { color: var(--muted); font-size: 9px; letter-spacing: .07em; text-transform: uppercase; }
    .coverage-picker select {
      min-width: 118px; height: 32px; padding: 0 8px;
      border: 1px solid var(--line-strong); border-radius: 8px; background: #fff; font: inherit; font-weight: 750;
    }
    .coverage-picker tr.lv-L0 { background: #f4f6f8; }
    .coverage-picker tr.lv-L1 { background: var(--blue-soft); }
    .coverage-picker tr.lv-L2 { background: var(--teal-soft); }
    .coverage-picker tr.lv-L3 { background: var(--amber-soft); }
    .coverage-picker tr.lv-L4 { background: var(--green-soft); }
    .coverage-picker select.lv-L0 { color: #6b7a88; border-color: #c5ced6; background: #eef1f4; }
    .coverage-picker select.lv-L1 { color: var(--blue); border-color: #9eb6d6; background: #e3ebf6; }
    .coverage-picker select.lv-L2 { color: var(--teal); border-color: #8ec4c0; background: #d9efec; }
    .coverage-picker select.lv-L3 { color: var(--amber); border-color: #e0b56a; background: #ffe8c4; }
    .coverage-picker select.lv-L4 { color: var(--green); border-color: #a8c46a; background: #e4f0c8; }
    .coverage-chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0 10px; }
    .lvl-pill {
      display: inline-flex; padding: 5px 10px; border-radius: 999px;
      font-size: 10px; font-weight: 800; letter-spacing: .02em; white-space: nowrap;
    }
    .lvl-pill.lv-L0 { color: #6b7a88; background: #e8edf1; }
    .lvl-pill.lv-L1 { color: var(--blue); background: var(--blue-soft); }
    .lvl-pill.lv-L2 { color: var(--teal); background: var(--teal-soft); }
    .lvl-pill.lv-L3 { color: var(--amber); background: var(--amber-soft); }
    .lvl-pill.lv-L4 { color: var(--green); background: var(--green-soft); }
    .lvl-text.lv-L0 { color: #6b7a88; font-weight: 750; }
    .lvl-text.lv-L1 { color: var(--blue); font-weight: 800; }
    .lvl-text.lv-L2 { color: var(--teal); font-weight: 800; }
    .lvl-text.lv-L3 { color: var(--amber); font-weight: 800; }
    .lvl-text.lv-L4 { color: var(--green); font-weight: 800; }

    .data-table { width: 100%; border-collapse: collapse; font-size: 10px; }
    .data-table th, .data-table td { padding: 10px 8px; text-align: left; vertical-align: top; border-bottom: 1px solid var(--line); }
    .data-table th { color: var(--muted); font-size: 9px; letter-spacing: .07em; text-transform: uppercase; }
    .data-table tr.row-tbd { background: var(--amber-soft); }
    .data-table tr.row-issue { background: #fff7eb; }
    .inline-hint {
      margin-top: 5px; padding: 6px 8px; border-radius: 8px;
      border: 1px solid #ebcea1; background: #fffbf4;
      color: var(--amber); font-size: 9px; line-height: 1.4;
    }
    .inline-hint b { display: block; margin-bottom: 2px; font-size: 8px; letter-spacing: .06em; }
    .hint-fold {
      margin-top: 8px; border: 1px solid #ebcea1; border-radius: 10px;
      background: #fffbf4; overflow: hidden;
    }
    .hint-fold > summary {
      list-style: none; cursor: pointer; user-select: none;
      display: flex; justify-content: space-between; gap: 10px; align-items: center;
      padding: 9px 12px; color: var(--amber); font-size: 10px; font-weight: 800;
    }
    .hint-fold > summary::-webkit-details-marker { display: none; }
    .hint-fold > summary::after {
      content: "展开"; color: var(--muted); font-size: 9px; font-weight: 700;
    }
    .hint-fold[open] > summary::after { content: "收起"; }
    .hint-fold-body { padding: 0 10px 10px; display: grid; gap: 6px; }
    .hint-fold.compact { margin-top: 5px; }
    .hint-fold.compact > summary { padding: 6px 8px; font-size: 9px; }
    .spec-tpl-card {
      margin-top: 12px; border: 1px solid #b9dcd9; border-radius: 13px;
      background: var(--teal-soft); overflow: hidden;
    }
    .spec-tpl-card > summary {
      list-style: none; cursor: pointer; user-select: none;
      display: flex; justify-content: space-between; gap: 12px; align-items: center;
      padding: 13px 14px; background: linear-gradient(180deg, #eef8f7, #e3f3f1);
    }
    .spec-tpl-card > summary::-webkit-details-marker { display: none; }
    .spec-tpl-card > summary .spec-tpl-title { font-size: 13px; font-weight: 850; color: var(--text); }
    .spec-tpl-card > summary .spec-tpl-meta { color: var(--muted); font-size: 10px; margin-top: 3px; }
    .spec-tpl-card > summary .spec-tpl-toggle {
      flex: 0 0 auto; color: var(--teal); border: 1px solid rgba(8,125,121,.22);
      border-radius: 999px; background: #fff; padding: 5px 10px; font-size: 10px; font-weight: 800;
    }
    .spec-tpl-card > summary .spec-tpl-toggle::after { content: "展开"; }
    .spec-tpl-card[open] > summary .spec-tpl-toggle::after { content: "收起"; }
    .spec-tpl-body { padding: 0 14px 14px; }
    .spec-desc {
      margin-top: 10px; padding: 12px 13px; border: 1px solid #c9e0dd; border-radius: 11px;
      background: #fff; color: #294354; font-size: 11px; line-height: 1.7; white-space: pre-wrap;
    }
    .spec-desc b { display: block; margin-bottom: 6px; color: var(--teal); font-size: 10px; letter-spacing: .06em; }
    .spec-desc .coverage-chips { margin: 8px 0 0; }
    .rel-note {
      margin-top: 10px; padding: 9px 12px; border: 1px dashed #b9d3cf; border-radius: 10px;
      background: #f2fbf9; color: #35586a; font-size: 10px; line-height: 1.7;
    }
    .rel-note b { color: var(--teal); }
    .dom-cell { color: var(--muted); font-size: 9px; }
    .narrative-ref > summary { color: var(--teal); font-weight: 600; }
    .narrative-body {
      white-space: pre-wrap; font-size: 11px; line-height: 1.75; color: #294354;
      padding: 10px 12px; border: 1px solid #c9e0dd; border-radius: 10px; background: #fbfffe;
    }
    .side-block {
      border: 1px solid var(--line); border-radius: 11px; padding: 10px 12px 12px; background: #fbfdff;
    }
    .side-block.side-world { background: #fbfcf8; border-color: #e3e7d6; }
    .side-block-head {
      display: flex; justify-content: space-between; align-items: baseline; gap: 8px;
      font-size: 11px; font-weight: 600; color: var(--blue);
    }
    .side-block.side-world .side-block-head { color: #7a7f47; }
    .side-block-head span { font-weight: 400; font-size: 9px; color: var(--muted); }
    .tbd-banner {
      margin: 10px 0 14px; padding: 12px 14px; border: 1px solid #ebcea1;
      border-radius: 12px; background: var(--amber-soft);
    }
    .tbd-banner b { display: block; color: var(--amber); font-size: 11px; }
    .tbd-banner p { margin: 5px 0 0; color: var(--muted); font-size: 9px; }
    .tbd-banner .coverage-chips { margin-top: 8px; margin-bottom: 0; }
    .status-pill {
      display: inline-flex;
      padding: 3px 7px;
      border-radius: 999px;
      font-size: 8px;
      font-weight: 850;
      letter-spacing: .05em;
      white-space: nowrap;
    }
    .status-pill.given, .status-pill.valid, .status-pill.observed { color: var(--green); background: var(--green-soft); }
    .status-pill.proposed, .status-pill.current { color: var(--teal); background: var(--teal-soft); }
    .status-pill.tbd, .status-pill.indeterminate { color: var(--amber); background: var(--amber-soft); }
    .status-pill.risk, .status-pill.failed { color: var(--red); background: var(--red-soft); }
    .status-pill.dep { color: var(--blue); background: var(--blue-soft); }

    .validation-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 14px 0; }
    .validation-card { padding: 11px; border: 1px solid #d7e4c0; border-radius: 10px; background: var(--green-soft); }
    .validation-card b { display: block; color: var(--green); font-size: 9px; }
    .validation-card span { display: block; margin-top: 3px; color: #4c625a; font-size: 8px; }
    .code-preview {
      max-height: 340px;
      overflow: auto;
      margin: 0;
      padding: 15px;
      color: #304b5d;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f1f5f7;
      font: 10px/1.65 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      white-space: pre-wrap;
    }
    .template-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 0 10px; }
    .template-tab { padding: 7px 10px; color: var(--muted); border: 1px solid var(--line); border-radius: 8px; background: #ffffff; font-size: 9px; font-weight: 760; }
    .template-tab.active { color: var(--teal); border-color: #b7d9d6; background: var(--teal-soft); }
    .natural-template {
      max-height: 430px;
      overflow: auto;
      padding: 18px;
      color: #294354;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfcfd;
      font-size: 11px;
      line-height: 1.85;
      white-space: pre-wrap;
    }
    .natural-template mark { color: #075d5a; background: var(--teal-soft); border-radius: 4px; }
    .scenario-summary { padding: 16px; border: 1px solid #b7d9d6; border-radius: 12px; background: var(--teal-soft); color: #294354; line-height: 1.75; }
    .boundary-list { display: grid; gap: 7px; margin: 12px 0 18px; padding: 0; list-style: none; }
    .boundary-list li { padding: 9px 11px; border: 1px solid var(--line); border-radius: 9px; background: #fff; color: #40596a; font-size: 10px; }
    .level-review { display: flex; gap: 8px; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line); }
    .level-review label { color: var(--muted); font-size: 9px; font-weight: 800; }
    .level-review select { min-width: 86px; height: 34px; padding: 0 9px; color: var(--teal); border: 1px solid #9bc9c5; border-radius: 8px; background: #fff; font-weight: 850; }
    .agent-proposal { margin-left: auto; color: var(--muted); font-size: 9px; }

    .instance-tools { display: grid; grid-template-columns: 130px 140px 1fr; gap: 9px; align-items: end; margin-bottom: 14px; }
    .control label { display: block; margin-bottom: 5px; color: var(--muted); font-size: 9px; font-weight: 750; }
    .control input, .control select {
      width: 100%;
      height: 38px;
      padding: 0 10px;
      color: var(--text);
      border: 1px solid var(--line-strong);
      border-radius: 9px;
      background: #ffffff;
    }
    .instance-list { display: grid; gap: 8px; }
    .instance-card {
      display: grid;
      grid-template-columns: 135px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 13px;
      text-align: left;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #ffffff;
    }
    .instance-card.selected { border-color: rgba(8,125,121,.46); background: var(--teal-soft); }
    .instance-id { color: var(--teal); font-size: 10px; font-weight: 800; }
    .binding-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .binding-tags span { padding: 3px 6px; border: 1px solid var(--line); border-radius: 6px; background: rgba(255,255,255,.66); font-size: 8px; }

    .sut-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .sut-card {
      min-height: 180px;
      padding: 15px;
      text-align: left;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 13px;
      background: var(--panel-soft);
    }
    .sut-card.selected { border-color: rgba(8,125,121,.45); background: var(--teal-soft); }
    .sut-card .sut-type { color: var(--teal); font-size: 8px; font-weight: 850; letter-spacing: .08em; }
    .sut-card b { display: block; margin: 10px 0 7px; font-size: 12px; }
    .sut-card p { margin: 0; color: var(--muted); font-size: 10px; }
    .sut-card .expected { margin-top: 13px; padding-top: 10px; border-top: 1px solid var(--line); color: #40596a; font-size: 9px; }

    .run-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
    .summary-card { padding: 11px; border: 1px solid var(--line); border-radius: 10px; background: var(--panel-soft); }
    .summary-card span { display: block; color: var(--muted); font-size: 8px; text-transform: uppercase; }
    .summary-card b { display: block; margin-top: 4px; font-size: 10px; }
    .run-progress { height: 8px; overflow: hidden; margin: 12px 0 17px; border-radius: 999px; background: #e8edef; }
    .run-progress div { height: 100%; width: 0; border-radius: inherit; background: var(--teal); transition: width .35s ease; }
    .phase-list { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; }
    .phase {
      min-height: 126px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: #ffffff;
    }
    .phase.active { border-color: #e7c890; background: var(--amber-soft); }
    .phase.done { border-color: #d5e3bb; background: var(--green-soft); }
    .phase-index { color: var(--muted); font-size: 8px; font-weight: 850; }
    .phase b { display: block; margin: 7px 0 5px; font-size: 10px; }
    .phase p { margin: 0; color: var(--muted); font-size: 8px; }
    .actor { display: inline-flex; margin-top: 8px; padding: 2px 5px; border-radius: 5px; color: var(--blue); background: var(--blue-soft); font-size: 7px; font-weight: 800; }
    .run-log { max-height: 155px; overflow: auto; margin-top: 13px; padding: 11px; border: 1px solid var(--line); border-radius: 10px; background: #172733; color: #d7e6ed; font: 9px/1.7 ui-monospace, monospace; }

    .filter-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 13px; }
    .filter-button { padding: 6px 9px; color: var(--muted); border: 1px solid var(--line); border-radius: 8px; background: #ffffff; font-size: 9px; font-weight: 750; }
    .filter-button.active { color: var(--teal); border-color: #b7d9d6; background: var(--teal-soft); }
    .evidence-list { display: grid; gap: 7px; }
    .evidence-event {
      display: grid;
      grid-template-columns: 64px 82px 1fr;
      gap: 10px;
      align-items: start;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #ffffff;
    }
    .evidence-event.gt { border-left: 3px solid var(--amber); background: #fffbf4; }
    .evidence-event.trace { border-left: 3px solid var(--teal); }
    .event-time { color: var(--muted); font: 9px ui-monospace, monospace; }
    .event-lane { font-size: 8px; font-weight: 850; letter-spacing: .06em; }
    .evidence-event.gt .event-lane { color: var(--amber); }
    .evidence-event.trace .event-lane { color: var(--teal); }
    .event-body b { display: block; font-size: 10px; }
    .event-body span { display: block; margin-top: 3px; color: var(--muted); font-size: 8px; }

    .grader-banner { display: grid; grid-template-columns: 1fr auto; gap: 15px; align-items: center; padding: 15px; border: 1px solid var(--line); border-radius: 12px; background: var(--panel-soft); }
    .grader-banner h3 { margin: 0; font-size: 15px; }
    .grader-banner p { margin: 5px 0 0; color: var(--muted); font-size: 9px; }
    .grader-table { width: 100%; margin-top: 14px; border-collapse: collapse; font-size: 10px; }
    .grader-table th, .grader-table td { padding: 11px 8px; text-align: left; border-bottom: 1px solid var(--line); }
    .grader-table th { color: var(--muted); font-size: 8px; text-transform: uppercase; }
    .gate-card { margin-top: 15px; padding: 14px; border: 1px solid #d7e4c0; border-radius: 12px; background: var(--green-soft); }
    .gate-card.failed { border-color: #ecc5ca; background: var(--red-soft); }
    .gate-card .gate-label { color: var(--green); font-size: 8px; font-weight: 850; letter-spacing: .08em; }
    .gate-card.failed .gate-label { color: var(--red); }
    .gate-card b { display: block; margin-top: 6px; font-size: 12px; }
    .gate-card p { margin: 5px 0 0; color: #4c625a; font-size: 9px; }

    .review-list { display: grid; gap: 8px; }
    .review-item { padding: 10px; border: 1px solid var(--line); border-radius: 10px; background: var(--panel-soft); }
    .review-item .review-type { font-size: 8px; font-weight: 850; letter-spacing: .07em; }
    .review-item.valid .review-type { color: var(--green); }
    .review-item.pending .review-type { color: var(--amber); }
    .review-item.info .review-type { color: var(--blue); }
    .review-item b { display: block; margin-top: 4px; font-size: 10px; }
    .review-item p { margin: 4px 0 0; color: var(--muted); font-size: 8px; }
    .review-item-foot { display: flex; justify-content: space-between; gap: 10px; align-items: end; margin-top: 7px; }
    .review-item-foot .artifact-link { margin-top: 0; }
    .artifact-link { display: block; margin-top: 5px; color: var(--teal); font: 8px ui-monospace, monospace; overflow-wrap: anywhere; }
    .disclaimer {
      margin-top: 14px;
      padding: 10px;
      color: #6e4c1f;
      border: 1px solid #ecd3a8;
      border-radius: 9px;
      background: var(--amber-soft);
      font-size: 8px;
    }

    .review-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(18, 35, 46, .48);
      backdrop-filter: blur(4px);
    }
    .review-workspace {
      width: min(980px, 100%);
      max-height: min(88vh, 860px);
      overflow: hidden;
      border: 1px solid var(--line-strong);
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 24px 70px rgba(18, 35, 46, .24);
    }
    .review-workspace-head {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: start;
      padding: 20px 22px 16px;
      border-bottom: 1px solid var(--line);
    }
    .review-workspace-head h2 { margin: 3px 0 0; font-size: 20px; }
    .review-workspace-head p { margin: 6px 0 0; color: var(--muted); font-size: 10px; }
    .review-tabs { display: flex; gap: 6px; padding: 12px 22px 0; }
    .review-tab { padding: 8px 11px; color: var(--muted); border: 1px solid var(--line); border-radius: 9px; background: #fff; font-size: 9px; font-weight: 800; }
    .review-tab.active { color: var(--teal); border-color: #add5d1; background: var(--teal-soft); }
    .review-workspace-body { max-height: calc(88vh - 205px); overflow: auto; padding: 16px 22px 22px; }
    .review-workspace-foot { display: flex; justify-content: space-between; gap: 12px; align-items: center; padding: 14px 22px; border-top: 1px solid var(--line); background: var(--panel-soft); }
    .review-workspace-foot .action-note { max-width: 58%; }
    .review-section-title { margin: 0 0 10px; font-size: 12px; }
    .review-help { margin: -4px 0 14px; color: var(--muted); font-size: 9px; }
    .review-form-list { display: grid; gap: 10px; }
    .review-form-card { padding: 13px; border: 1px solid var(--line); border-radius: 12px; background: var(--panel-soft); }
    .review-form-card.pending { border-color: #ebcea1; background: var(--amber-soft); }
    .review-form-card-head { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 9px; }
    .review-form-card-head b { font-size: 11px; }
    .review-form-card-head span { color: var(--muted); font: 8px ui-monospace, monospace; }
    .review-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .review-field label { display: block; margin-bottom: 5px; color: var(--muted); font-size: 8px; font-weight: 800; }
    .review-field input, .review-field select, .review-field textarea {
      width: 100%;
      padding: 9px 10px;
      color: var(--text);
      border: 1px solid var(--line-strong);
      border-radius: 9px;
      background: #fff;
      font: inherit;
    }
    .review-field textarea { min-height: 76px; resize: vertical; }
    .review-template-editor { min-height: 430px !important; line-height: 1.75; }
    .review-empty { padding: 24px; text-align: center; color: var(--muted); border: 1px dashed var(--line-strong); border-radius: 12px; }
    .review-dependency-list { display: grid; gap: 7px; margin-bottom: 14px; }
    .review-dependency { display: flex; justify-content: space-between; gap: 12px; padding: 10px; border: 1px solid var(--line); border-radius: 10px; }
    .review-dependency b { display: block; font-size: 10px; }
    .review-dependency span { color: var(--muted); font-size: 8px; }
    .revision-badge { display: inline-flex; padding: 4px 7px; color: var(--blue); background: var(--blue-soft); border-radius: 6px; font-size: 8px; font-weight: 800; }

    @media (max-width: 1120px) {
      .console { grid-template-columns: 220px minmax(480px, 1fr); }
      .console.context-collapsed { grid-template-columns: 52px minmax(480px, 1fr); }
    }
    @media (max-width: 820px) {
      .app-header { padding: 0 12px; }
      .header-actions .print-label, .brand span { display: none; }
      .stage-shell { padding: 10px 12px; }
      .stage-rail { display: flex; }
      .stage-node { flex: 0 0 88px; }
      .console, .console.context-collapsed { grid-template-columns: 1fr; width: min(calc(100% - 20px), 720px); }
      .side-panel { position: static; }
      .console.context-collapsed .context-toggle {
        flex-direction: row;
        align-items: center;
        min-height: 0;
        padding: 12px 14px;
      }
      .console.context-collapsed .context-toggle-main {
        flex-direction: row;
        align-items: center;
      }
      .console.context-collapsed .context-toggle .eyebrow,
      .console.context-collapsed .context-toggle h2 {
        writing-mode: horizontal-tb;
        letter-spacing: .08em;
      }
      .console.context-collapsed .context-toggle h2 { font-size: 14px; }
      .console.context-collapsed .context-chevron .context-chevron-label { display: inline; }
      .console.context-collapsed .context-chevron svg { transform: rotate(180deg); }
      .context-panel .side-body { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .context-block + .context-block { margin: 0; padding: 0; border: 0; }
      .choice-grid, .sut-grid { grid-template-columns: 1fr; }
      .phase-list { grid-template-columns: 1fr; }
      .review-overlay { padding: 8px; }
      .review-fields { grid-template-columns: 1fr; }
      .review-workspace-foot { align-items: stretch; flex-direction: column; }
      .review-workspace-foot .action-note { max-width: none; }
    }
    @media (max-width: 540px) {
      .mode-badge { display: none; }
      .case-select { max-width: 150px; }
      .workspace-head { align-items: start; flex-direction: column; }
      .workspace-body { padding: 18px 16px; }
      .context-panel .side-body, .validation-grid, .run-summary { grid-template-columns: 1fr; }
      .instance-tools { grid-template-columns: 1fr 1fr; }
      .instance-tools .btn { grid-column: 1 / -1; }
      .instance-card { grid-template-columns: 1fr; }
      .evidence-event { grid-template-columns: 54px 1fr; }
      .event-body { grid-column: 1 / -1; }
    }
    @media print {
      .app-header, .stage-shell, .context-panel, .workspace .action-row, .filter-row { display: none !important; }
      body { background: #ffffff; }
      .console { display: block; width: 100%; margin: 0; }
      .workspace { box-shadow: none; border: 0; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true" title="UAV Benchmark Factory">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 14.5h5.2l2.3-3.2h5l2.3 3.2H26" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M11.2 14.5 8.4 19.2M20.8 14.5l2.8 4.7" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          <circle cx="16" cy="15.2" r="2.1" fill="currentColor"/>
          <path d="M7 22.5h4.2V26H7v-3.5Zm6.9 0H18V26h-4.1v-3.5Zm6.9 0H25V26h-4.2v-3.5Z" fill="currentColor" opacity=".88"/>
          <path d="M5.5 26.5h21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".45"/>
        </svg>
      </div>
      <div>
        <b>UAV Benchmark Factory</b>
        <span id="headerCaseTitle">固定业务场景加载中</span>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn" id="resetButton" type="button">重新开始</button>
    </div>
  </header>

  <div class="stage-shell">
    <nav class="stage-rail" id="stageRail" aria-label="Pipeline 阶段"></nav>
  </div>

  <main class="console">
    <aside class="panel side-panel context-panel">
      <button class="context-toggle" id="contextToggle" type="button" aria-expanded="true" aria-controls="contextPanel">
        <div class="context-toggle-main">
          <span class="context-toggle-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M4 7.5h16" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
              <path d="M4 12h10.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
              <path d="M4 16.5h7" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
              <circle cx="18.2" cy="12" r="2.2" fill="currentColor"/>
            </svg>
          </span>
          <span class="context-toggle-copy">
            <span class="eyebrow">Run Context</span>
            <h2>本次运行</h2>
          </span>
        </div>
        <span class="context-chevron">
          <span class="context-chevron-label">收起</span>
          <svg viewBox="0 0 12 12" fill="none" aria-hidden="true">
            <path d="M3 7.5 6 4.5 9 7.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </button>
      <div class="side-body" id="contextPanel"></div>
    </aside>

    <section class="panel workspace">
      <div class="workspace-head">
        <div><div class="eyebrow" id="workspaceEyebrow"></div><h1 id="workspaceTitle"></h1></div>
        <div class="stage-state" id="workspaceState"></div>
      </div>
      <div class="workspace-body" id="workspaceBody"></div>
    </section>

  </main>

  <script>
    "use strict";

    const STAGES = [
      ["STEP 1", "任务域选择",   "场景 + 简短描述"],
      ["STEP 2", "文案与 A×L",  "Coverage · 文案 · 分类"],
      ["STEP 3", "JD 域提取",   "变量域按 A 分组"],
      ["STEP 4", "任务域模版",   "域编辑器(每行选模式)"],
      ["STEP 5", "特定任务模版", "Seed→具体 JD 值"],
    ];

    const SCENARIO_TASK_EXAMPLES = {
      highway_inspection: "例如：让无人机巡查指定高速路段，持续识别和记录违法停车车辆。同一辆车短时遮挡后再次出现时不要重复上报；遇到定位异常先安全保持并通知调度人员。",
      oil_gas_inspection: "例如：让无人机沿油气管道巡检并持续记录发现的异常。电量不足以安全完成任务时，由它自己决定缩短巡检、返航还是去安全点。",
      bridge_inspection: "例如：让无人机检查桥底和指定结构件，把发现的病害标在桥梁三维模型上并持续更新。",
      campus_inspection: "例如：让无人机巡查园区道路和设施，发现异常后持续更新告警。需要近距离查看时通知机器狗去复核。",
      other_inspection: "例如：让无人机沿指定河段持续查找异常漂浮物，发现后记录位置和图片并发出告警。",
    };

    const STORAGE_KEY = "uav_pipeline_v7";
    const SCENARIO_NONE = "";
    const SCENARIO_FALLBACK_ID = "other_inspection";
    // 巡检常用默认：L2 受令自主；进入 Step 2 后可改等级或改成「不覆盖」
    const DEFAULT_TARGET_LEVELS = {
      A1: "L2", A2: "L2", A3: "L2", A4: "L2", A5: "L2",
      A6a: "L2", A7: "L2", A9a: "L2", A9b: "L2", A12: "L2", A14: "L2", A15: "L2",
    };

    function defaultTargetLevels() { return Object.assign({}, DEFAULT_TARGET_LEVELS); }

    function initialState() {
      return {
        currentStage: 0, maxUnlocked: 0, completed: new Set(),
        serverStatus: "checking", healthInfo: null, catalogSummary: null,
        scenarioRegistry: null, selectedScenarioId: SCENARIO_NONE, fixedScenario: null,
        taskPrompt: "", modelTier: "flash",
        targetLevels: defaultTargetLevels(),
        narrativeStatus: "idle", narrativeRunId: null, narrativeDraft: "", narrativeOriginal: "", narrativeError: null,
        agentStatus: "idle", agentPhase: "idle", agentRunId: null, agentResult: null, agentError: null,
        domainEdits: {},
        fillTbdLoading: false, fillTbdError: null, fillTbdNotice: null,
        instanceMode: "single", instanceSeed: 0, instanceBatchSeeds: "0-4",
        instanceRandomCount: 5, instanceRandomSeeds: [],
        instanceResult: null, instanceResults: null, instanceError: null, instanceLoading: false,
        saveNotice: null,
        contextCollapsed: false,
      };
    }

    function effectiveScenarioId() {
      return state.selectedScenarioId || SCENARIO_FALLBACK_ID;
    }

    function scenarioExampleText(scenarioId) {
      return SCENARIO_TASK_EXAMPLES[scenarioId || ""] || "例如：用几句话说明让无人机做什么、关注什么异常、希望得到什么结果。";
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved) return initialState();
        const s = Object.assign(initialState(), saved);
        s.completed = new Set(saved.completed || []);
        if (!s.targetLevels || !Object.keys(s.targetLevels).length) s.targetLevels = defaultTargetLevels();
        // 恢复后清掉「进行中」的瞬时标记，避免刷新后卡在 loading/disabled
        s.fillTbdLoading = false;
        s.instanceLoading = false;
        if (s.narrativeStatus === "running") s.narrativeStatus = s.narrativeDraft ? "done" : "idle";
        if (s.agentStatus === "running") s.agentStatus = s.agentResult ? "done" : "idle";
        if (s.agentPhase === "running") s.agentPhase = s.agentResult ? "done" : "idle";
        // 已解锁的步数至少覆盖所有已完成的步骤，保证已保存的步骤都能跳转
        const comp = Array.from(s.completed);
        s.maxUnlocked = Math.max(s.maxUnlocked || 0, comp.length ? Math.max.apply(null, comp) : 0);
        return s;
      } catch { return initialState(); }
    }

    function persistState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(Object.assign({}, state, {completed: Array.from(state.completed)})));
    }

    let state = loadState();
    let pollTimer = null;

    function escapeHtml(v) { return String(v).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c])); }
    function pill(text, cls) { return '<span class="status-pill ' + (cls || "proposed") + '">' + escapeHtml(text) + "</span>"; }
    function uid(p) { return p + Math.random().toString(36).substring(2, 10); }

    function migrateCompletedSteps(steps, stageSchema, hasAgent) {
      const arr = Array.from(steps || []);
      if (!arr.length) return new Set();
      // 旧 4 段：0选域 / 1扩充提取 / 2域模版 / 3特定模版 → 新 5 段插入 2b
      if ((stageSchema == null || stageSchema < 5) && Math.max(...arr) <= 3) {
        const migrated = arr.map(s => (s >= 1 ? s + 1 : s));
        if (hasAgent) {
          if (!migrated.includes(1)) migrated.push(1);
          if (!migrated.includes(2)) migrated.push(2);
        }
        return new Set(migrated);
      }
      return new Set(arr);
    }

    function furthestUnlocked() {
      const comp = Array.from(state.completed);
      return Math.max(state.maxUnlocked || 0, comp.length ? Math.max.apply(null, comp) : 0);
    }
    function stageReachable(i) { return i <= furthestUnlocked() || state.completed.has(i); }

    function completeStage(i) { state.completed.add(i); state.maxUnlocked = Math.max(state.maxUnlocked, Math.min(i + 1, STAGES.length - 1)); state.currentStage = Math.min(i + 1, STAGES.length - 1); render(); }
    function goToStage(i) { if (stageReachable(i)) { state.currentStage = i; render(); } }

    function renderStageRail() {
      document.getElementById("stageRail").innerHTML = STAGES.map((s, i) => {
        const locked = !stageReachable(i);
        const cls = i === state.currentStage ? "current" : state.completed.has(i) ? "done" : locked ? "locked" : "";
        const tip = locked
          ? ("需先完成「" + STAGES[Math.max(0, i - 1)][1] + "」后解锁（进度会自动保存）")
          : ("进入 " + s[0] + " · " + s[1] + "（进度已自动保存，可随时跳转）");
        return '<button class="stage-node ' + cls + '" type="button" title="' + escapeHtml(tip) + '" onclick="goToStage(' + i + ')"'
          + (locked ? " disabled" : "") + "><span>" + s[0] + "</span><b>" + s[1] + "</b></button>";
      }).join("");
    }

    function setHeader(i, st) {
      document.getElementById("workspaceEyebrow").textContent = STAGES[i][0] + " · " + STAGES[i][2];
      document.getElementById("workspaceTitle").textContent = STAGES[i][1];
      document.getElementById("workspaceState").textContent = st || "";
    }

    async function savePipeline() {
      try {
        const r = await fetch("/api/pipeline/save", {method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            selectedScenarioId: state.selectedScenarioId, taskPrompt: state.taskPrompt, modelTier: state.modelTier,
            targetLevels: state.targetLevels,
            narrativeDraft: state.narrativeDraft, agentResult: state.agentResult, domainEdits: state.domainEdits,
            instanceMode: state.instanceMode, instanceSeed: state.instanceSeed, instanceBatchSeeds: state.instanceBatchSeeds,
            instanceRandomCount: state.instanceRandomCount, instanceRandomSeeds: state.instanceRandomSeeds,
            instanceResult: state.instanceResult, instanceResults: state.instanceResults,
            completedSteps: Array.from(state.completed), stageSchema: 5, savedAt: new Date().toISOString(),
          })});
        state.saveNotice = r.ok ? "已保存 ✓" : "保存失败";
      } catch(e) { state.saveNotice = "保存失败: " + e; }
      render();
    }

    async function loadPipeline() {
      try {
        const r = await fetch("/api/pipeline/load", {cache: "no-store"});
        if (!r.ok) { state.saveNotice = "没有已保存的进度"; render(); return; }
        const d = await r.json();
        if (d.selectedScenarioId !== undefined) applyScenarioSelection(d.selectedScenarioId || SCENARIO_NONE);
        if (d.taskPrompt !== undefined) state.taskPrompt = d.taskPrompt;
        if (d.modelTier) state.modelTier = d.modelTier;
        if (d.targetLevels && typeof d.targetLevels === "object" && Object.keys(d.targetLevels).length) {
          state.targetLevels = d.targetLevels;
        } else if (!Object.keys(state.targetLevels || {}).length) {
          state.targetLevels = defaultTargetLevels();
        }
        if (d.narrativeDraft) { state.narrativeDraft = d.narrativeDraft; state.narrativeStatus = "done"; }
        if (d.agentResult) { state.agentResult = d.agentResult; state.agentStatus = "done"; state.agentPhase = "done"; }
        if (d.domainEdits) state.domainEdits = d.domainEdits;
        if (d.instanceMode) state.instanceMode = d.instanceMode;
        if (d.instanceSeed !== undefined) state.instanceSeed = d.instanceSeed;
        if (d.instanceBatchSeeds) state.instanceBatchSeeds = d.instanceBatchSeeds;
        if (d.instanceRandomCount) state.instanceRandomCount = d.instanceRandomCount;
        if (Array.isArray(d.instanceRandomSeeds)) state.instanceRandomSeeds = d.instanceRandomSeeds;
        if (d.instanceResult) state.instanceResult = d.instanceResult;
        if (d.instanceResults) state.instanceResults = d.instanceResults;
        if (d.completedSteps) {
          state.completed = migrateCompletedSteps(d.completedSteps, d.stageSchema, !!d.agentResult);
          state.maxUnlocked = Math.max(state.maxUnlocked, ...Array.from(state.completed), 0);
          if (state.agentStatus === "done") state.maxUnlocked = Math.max(state.maxUnlocked, 2);
        }
        state.saveNotice = "已加载 ✓";
      } catch(e) { state.saveNotice = "加载失败: " + e; }
      render();
    }

    function saveBar() {
      return '<div class="action-row" style="margin-bottom:16px"><span class="action-note">' + escapeHtml(state.saveNotice || "随时保存，重启后加载继续") + '</span>'
        + '<div><button class="btn" type="button" onclick="loadPipeline()">加载</button> '
        + '<button class="btn primary" type="button" onclick="savePipeline()">保存</button></div></div>';
    }

    // ── STEP 1 ────────────────────────────────────────────────────────── //

    function scenarioPromptText(scenarioId) {
      if (!scenarioId) return "";
      const found = ((state.scenarioRegistry && state.scenarioRegistry.scenarios) || [])
        .find(s => s.scenario_id === scenarioId);
      const task = scenarioExampleText(scenarioId).replace(/^例如：/, "").trim();
      if (!found) return task;
      const parts = [];
      if (found.title) parts.push("场景：" + String(found.title).trim());
      if (found.summary) parts.push(String(found.summary).trim());
      const boundaries = found.fixed_boundary || [];
      if (boundaries.length) {
        parts.push("业务边界：\n" + boundaries.map(item => "- " + String(item).trim()).join("\n"));
      }
      const modules = found.available_task_modules || [];
      if (modules.length) {
        parts.push("可选任务模块：\n" + modules.map(m => {
          const name = String((m && m.name) || "").trim();
          const req = String((m && m.requirement) || "").trim();
          return "- " + name + (req ? ("：" + req) : "");
        }).join("\n"));
      }
      if (task) parts.push("任务：" + task);
      return parts.join("\n\n");
    }

    function applyScenarioSelection(scenarioId, { fillExample } = {}) {
      state.selectedScenarioId = scenarioId || SCENARIO_NONE;
      if (!scenarioId) {
        state.fixedScenario = null;
      } else {
        const found = ((state.scenarioRegistry && state.scenarioRegistry.scenarios) || [])
          .find(s => s.scenario_id === scenarioId);
        state.fixedScenario = found || null;
      }
      if (fillExample && scenarioId) {
        state.taskPrompt = scenarioPromptText(scenarioId);
      }
    }

    function renderStep1() {
      const alreadyDone = state.completed.has(0);
      const ready = !!(state.scenarioRegistry && state.scenarioRegistry.scenarios);
      const promptOk = state.taskPrompt.trim().length >= 5;
      setHeader(0, alreadyDone ? "可继续修改" : "等待确认");
      if (!ready) {
        document.getElementById("workspaceBody").innerHTML = '<div class="choice-card">读取场景示例中...</div>';
        return;
      }
      const opts = ['<option value="' + SCENARIO_NONE + '"' + (!state.selectedScenarioId ? " selected" : "") + ">自己写（不加载示例）</option>"]
        .concat(((state.scenarioRegistry && state.scenarioRegistry.scenarios) || []).map(s =>
          '<option value="' + s.scenario_id + '"' + (s.scenario_id === state.selectedScenarioId ? " selected" : "") + ">" +
          escapeHtml(s.title) + "</option>"
        )).join("");
      let h = saveBar()
        + '<p class="intro">写清任务即可。需要示例时，从下拉选一个场景，内容会直接填进文本框，可再改。</p>'
        + '<div class="field-label"><label>加载示例（可选）</label><span>选中即写入文本框</span></div>'
        + '<div class="control" style="margin-bottom:14px"><select id="scenarioSelect">' + opts + "</select></div>"
        + '<div class="field-label"><label>任务描述</label><span>必填 · 至少 5 个字</span></div>'
        + '<textarea class="task-input" id="taskPrompt" style="min-height:220px" placeholder="用几句话说明让无人机做什么、关注什么异常、希望得到什么结果。">' +
          escapeHtml(state.taskPrompt) + "</textarea>";
      const note = promptOk
        ? (alreadyDone ? "可修改后再次确认，或直接进入下一步" : "确认后进入下一步")
        : "请先输入至少 5 个字的任务描述";
      h += '<div class="action-row"><span class="action-note" id="step1Note">' + note + '</span>'
        + '<button class="btn primary" type="button" id="confirmStep1Btn" onclick="confirmStep1()"' +
        (promptOk ? "" : " disabled") + ">" + (alreadyDone ? "进入下一步 →" : "确认 →") + "</button></div>";
      document.getElementById("workspaceBody").innerHTML = h;
      const sel = document.getElementById("scenarioSelect");
      if (sel) sel.addEventListener("change", () => {
        applyScenarioSelection(sel.value, { fillExample: !!sel.value });
        render();
      });
      const ta = document.getElementById("taskPrompt");
      if (ta) ta.addEventListener("input", () => {
        state.taskPrompt = ta.value;
        const ok = state.taskPrompt.trim().length >= 5;
        const btn = document.getElementById("confirmStep1Btn");
        const tip = document.getElementById("step1Note");
        if (btn) btn.disabled = !ok;
        if (tip) tip.textContent = ok
          ? (state.completed.has(0) ? "可修改后再次确认，或直接进入下一步" : "确认后进入下一步")
          : "请先输入至少 5 个字的任务描述";
      });
    }
    function confirmStep1() {
      if (state.taskPrompt.trim().length < 5) return;
      completeStage(0);
    }

    // ── STEP 2 ────────────────────────────────────────────────────────── //

    function selectedCoverageCells() {
      return Object.entries(state.targetLevels || {})
        .filter(([, level]) => level)
        .map(([aId, level]) => aId + "×" + level);
    }

    function levelClass(level) {
      const lv = String(level || "L0").toUpperCase();
      return "lv-" + (["L0", "L1", "L2", "L3", "L4"].includes(lv) ? lv : "L0");
    }

    function cellLevelClass(cell) {
      const m = String(cell || "").match(/×(L[0-4])$/i);
      return levelClass(m ? m[1] : "L0");
    }

    function indexValidationIssues() {
      const issues = (state.agentResult && state.agentResult.validation_issues) || [];
      const jds = (state.agentResult && state.agentResult.candidate && state.agentResult.candidate.jd_candidates) || [];
      const cov = (state.agentResult && state.agentResult.candidate && state.agentResult.candidate.coverage_candidates) || [];
      const byJd = {};
      const byCell = {};
      const other = [];
      issues.forEach(v => {
        const path = String(v.path || "");
        const jdIdx = path.match(/^jd_candidates\[(\d+)\]/);
        if (jdIdx) {
          const slot = jds[parseInt(jdIdx[1], 10)] && jds[parseInt(jdIdx[1], 10)].slot_id;
          if (slot) {
            if (!byJd[slot]) byJd[slot] = [];
            byJd[slot].push(v);
            return;
          }
        }
        const miss = String(v.message || "").match(/\b(jd-[0-9a-z.]+)\b/i);
        if (v.code === "MISSING_REQUIRED_JD_SLOT" && miss) {
          const slot = miss[1];
          if (!byJd[slot]) byJd[slot] = [];
          byJd[slot].push(v);
          return;
        }
        const covIdx = path.match(/^coverage_candidates\[(\d+)\]/);
        if (covIdx) {
          const cell = cov[parseInt(covIdx[1], 10)] && cov[parseInt(covIdx[1], 10)].cell;
          if (cell) {
            if (!byCell[cell]) byCell[cell] = [];
            byCell[cell].push(v);
            return;
          }
        }
        other.push(v);
      });
      return { byJd, byCell, other, all: issues };
    }

    const ISSUE_ZH = {
      CATALOG_VERSION_MISMATCH: { title: "目录版本不一致", msg: "候选结果使用的目录版本与当前审定字典不一致。" },
      DUPLICATE_GAL_CELL: { title: "重复 A×L", msg: "Coverage 中出现了重复的 A×L 单元。" },
      UNKNOWN_GAL_CELL: { title: "未知 A×L", msg: "该 A×L 不在当前审定目录中。" },
      INCOMPLETE_CUMULATIVE_RESPONSIBILITY: { title: "累计责任不完整", msg: "需为每个继承等级各写一条责任（如 L3 含 L1–L3）。" },
      EVIDENCE_NOT_VERBATIM: { title: "证据非原文", msg: "证据摘录需是任务/场景文案中的原文；若为推断请改用 proposed。" },
      HUMAN_VALUE_MISSING_SOURCE: { title: "缺少来源说明", msg: "人工新增或修改的值需要填写来源说明。" },
      UNKNOWN_JD_SLOT: { title: "未知 JD", msg: "该 JD 槽位不在当前审定目录中。" },
      JD_NAME_MISMATCH: { title: "JD 名称不符", msg: "JD 名称与规范名称不一致。" },
      DUPLICATE_JD_SLOT: { title: "重复 JD", msg: "JD 候选中出现了重复的 slot ID。" },
      RUNTIME_DEPENDENCY_MARKED_SCORED: { title: "依赖被计分", msg: "运行时依赖必须保持不计分。" },
      MISSING_REQUIRED_JD_SLOT: { title: "缺少必填 JD", msg: "缺少必填 JD 槽位；未知时应以 TBD 输出。" },
      INTERNAL_LABEL_IN_NARRATIVE: { title: "文案含内部标识", msg: "文案/模版不得出现 A×L、GAL、JD 标识。" },
      INCOMPLETE_TEMPLATE_STRUCTURE: { title: "结构不完整", msg: "文案/模版段落结构不完整。" },
    };

    function issueTitle(v) {
      const hit = ISSUE_ZH[v && v.code];
      return (hit && hit.title) || (v && v.code) || "提示";
    }

    function issueMessage(v) {
      const raw = String((v && v.message) || "");
      // 已是中文（后端新消息或旧中文）直接用；英文则回退到词典
      if (/[\u4e00-\u9fff]/.test(raw)) return raw;
      const hit = ISSUE_ZH[v && v.code];
      return (hit && hit.msg) || raw || "需要人工检查该项。";
    }

    function renderInlineHints(list, opts) {
      if (!list || !list.length) return "";
      const items = list.map(v =>
        '<div class="inline-hint"><b>' + escapeHtml(issueTitle(v)) + '</b>'
        + escapeHtml(issueMessage(v)) + '</div>'
      ).join("");
      if (opts && opts.plain) return items;
      const title = (opts && opts.title) || ("校验提示 · " + list.length + " 条");
      const openAttr = (opts && opts.open) ? " open" : "";
      const compact = (opts && opts.compact) ? " compact" : "";
      return '<details class="hint-fold' + compact + '"' + openAttr + '>'
        + '<summary>' + escapeHtml(title) + '</summary>'
        + '<div class="hint-fold-body">' + items + '</div></details>';
    }

    function renderCoverageHints(byCell) {
      const cells = Object.keys(byCell || {});
      if (!cells.length) return "";
      const total = cells.reduce((n, c) => n + byCell[c].length, 0);
      const body = cells.map(cell =>
        '<div class="inline-hint"><b>' + escapeHtml(cell) + ' · ' + byCell[cell].length + ' 条</b>'
        + byCell[cell].map(v => escapeHtml(issueTitle(v)) + " · " + escapeHtml(issueMessage(v))).join("<br>")
        + '</div>'
      ).join("");
      return '<details class="hint-fold">'
        + '<summary>A×L 校验提示 · ' + total + ' 条 / ' + cells.length + ' 个单元</summary>'
        + '<div class="hint-fold-body">' + body + '</div></details>';
    }

    function levelPolicyEntries() {
      const levels = (state.catalogSummary && state.catalogSummary.level_policy && state.catalogSummary.level_policy.levels) || {};
      const scored = ["L1", "L2", "L3", "L4"].map(id => {
        const meta = levels[id] || {};
        const inherits = (meta.inherits || []).join(" + ");
        return {
          id,
          label: meta.label || id,
          boundary: meta.general_boundary || "",
          inheritsNote: inherits ? ("累计含 " + inherits + " + " + id) : ("仅 " + id),
        };
      });
      return [{
        id: "L0",
        label: "不覆盖",
        boundary: "该能力本次不计分、不进入正式 A×L coverage；外部/执行器条件若需要，放在 runtime dependency。",
        inheritsNote: "下拉选「不覆盖」= L0",
      }].concat(scored);
    }

    function renderCoveragePickerHtml(opts) {
      const editable = !!(opts && opts.editable);
      const cells = selectedCoverageCells();
      let h = '<div class="field-label" style="margin-top:10px"><label>目标 Coverage（先选再扩充）</label></div>';
      h += '<p class="intro" style="margin-top:4px">默认已预填巡检常用 <b>L2</b>，可逐项改等级。选 L3 = 累计 L1–L3；选「不覆盖」= <b>L0</b>（本次不考该能力）。</p>';
      h += '<div class="group-label">L 等级含义</div><div class="level-legend">';
      levelPolicyEntries().forEach(lv => {
        h += '<div class="level-legend-item ' + levelClass(lv.id) + '"><b>' + escapeHtml(lv.id) + '</b><span><em>'
          + escapeHtml(lv.label) + '</em>' + escapeHtml(lv.boundary)
          + '<br>' + escapeHtml(lv.inheritsNote) + '</span></div>';
      });
      h += '</div>';
      const abs = (state.catalogSummary && state.catalogSummary.abilities) || [];
      h += '<div class="group-label">能力列表 · 已选 ' + cells.length + '</div>';
      if (editable) {
        h += '<div class="action-row" style="margin:0 0 10px">'
          + '<span class="action-note">灰=L0 · 蓝=L1 · 青=L2 · 琥珀=L3 · 绿=L4</span><div>'
          + '<button class="btn" type="button" onclick="resetCoverageDefaults()">恢复默认</button> '
          + '<button class="btn" type="button" onclick="clearCoverageSelection()">全部清空</button>'
          + '</div></div>';
      }
      if (cells.length) {
        h += '<div class="coverage-chips">' + cells.map(c => '<span class="lvl-pill ' + cellLevelClass(c) + '">'
          + escapeHtml(c) + '</span>').join("") + '</div>';
      }
      h += '<table class="coverage-picker"><thead><tr><th>A</th><th>能力</th><th>目标等级</th></tr></thead><tbody>';
      abs.forEach(a => {
        const cur = state.targetLevels[a.a_id] || "";
        const tone = levelClass(cur || "L0");
        h += '<tr class="' + tone + '"><td class="mono">' + escapeHtml(a.a_id)
          + '</td><td>' + escapeHtml(a.ability || "") + '</td><td>';
        if (editable) {
          h += '<select class="' + tone + '" data-cov-a="' + escapeHtml(a.a_id) + '">'
            + '<option value="">L0 · 不覆盖</option>'
            + ["L1", "L2", "L3", "L4"].map(lv => '<option value="' + lv + '"' + (cur === lv ? " selected" : "") + ">"
              + lv + " · " + escapeHtml((levelPolicyEntries().find(x => x.id === lv) || {}).label || lv)
              + "</option>").join("")
            + "</select>";
        } else {
          h += cur
            ? '<span class="lvl-text ' + tone + '">' + escapeHtml(cur) + '</span>'
            : '<span class="lvl-text lv-L0">L0 · 不覆盖</span>';
        }
        h += "</td></tr>";
      });
      h += "</tbody></table>";
      return h;
    }

    function bindCoveragePicker() {
      document.querySelectorAll("select[data-cov-a]").forEach(sel => {
        sel.addEventListener("change", () => {
          const aId = sel.getAttribute("data-cov-a");
          if (!aId) return;
          if (sel.value) state.targetLevels[aId] = sel.value;
          else delete state.targetLevels[aId];
          render();
        });
      });
    }

    function resetCoverageDefaults() {
      state.targetLevels = defaultTargetLevels();
      render();
    }

    function clearCoverageSelection() {
      state.targetLevels = {};
      render();
    }

    async function runNarrative() {
      const cells = selectedCoverageCells();
      if (!cells.length) {
        state.narrativeError = "请先至少选择 1 个目标 A×L coverage，再运行文案扩充。";
        render();
        return;
      }
      state.narrativeStatus = "running"; state.narrativeError = null; state.narrativeRunId = uid("agent-"); render();
      try {
        const r = await fetch("/api/config-agent/expand", {method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            task_description: state.taskPrompt,
            scenario_id: effectiveScenarioId(),
            model_tier: state.modelTier,
            run_id: state.narrativeRunId,
            target_coverage: cells,
          })});
        const d = await r.json();
        if (!r.ok) throw new Error(d.message || d.error);
        state.narrativeStatus = "done"; state.narrativeDraft = d.result.draft.expanded_narrative; state.narrativeOriginal = state.narrativeDraft;
      } catch(e) { state.narrativeStatus = "idle"; state.narrativeError = String(e.message || e); }
      render();
    }

    function stopAgentPoll() {
      if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; }
    }

    function startAgentPoll(runId) {
      stopAgentPoll();
      const tick = async () => {
        if (state.agentStatus !== "running" || state.agentRunId !== runId) return;
        try {
          const s = await (await fetch("/api/config-agent/status?run_id=" + encodeURIComponent(runId), {cache: "no-store"})).json();
          const op = (s.details && s.details.operation) || "";
          const event = s.event || "";
          if (op === "coverage") {
            state.agentPhase = event === "model_response_received" ? "coverage_done" : "coverage";
          } else if (op === "extraction") {
            state.agentPhase = event === "model_response_received" ? "extraction_done" : "extraction";
          } else if (s.status === "completed") {
            state.agentPhase = "done";
          }
          if (state.currentStage === 1 || state.currentStage === 2) render();
        } catch (_) { /* ignore transient poll errors */ }
        if (state.agentStatus === "running" && state.agentRunId === runId) {
          pollTimer = setTimeout(tick, 700);
        }
      };
      pollTimer = setTimeout(tick, 350);
    }

    function phaseStatus(phaseKey) {
      const p = state.agentPhase || "idle";
      if (state.agentStatus === "done" || p === "done") return "done";
      if (state.agentStatus !== "running") return "idle";
      if (phaseKey === "coverage") {
        if (p === "coverage") return "running";
        if (p === "coverage_done" || p === "extraction" || p === "extraction_done") return "done";
        return "pending";
      }
      if (phaseKey === "extraction") {
        if (p === "extraction") return "running";
        if (p === "extraction_done") return "done";
        if (p === "coverage" || p === "coverage_done") return "pending";
        return "pending";
      }
      return "idle";
    }

    function renderSubstepCard(code, title, note, status) {
      const label = status === "running" ? "调用中..." : status === "done" ? "完成" : status === "pending" ? "等待中" : "待运行";
      const pillCls = status === "running" ? "proposed" : status === "done" ? "given" : "tbd";
      return '<div class="choice-card' + (status === "running" ? " selected" : "") + '" style="margin-top:8px">'
        + '<div style="display:flex;justify-content:space-between;gap:10px;align-items:center">'
        + '<b>' + escapeHtml(code + " · " + title) + '</b>' + pill(label, pillCls) + '</div>'
        + '<p>' + escapeHtml(note) + '</p></div>';
    }

    async function runClassification() {
      state.agentStatus = "running";
      state.agentPhase = "coverage";
      state.agentError = null;
      state.agentRunId = uid("agent-");
      render();
      startAgentPoll(state.agentRunId);
      try {
        const r = await fetch("/api/config-agent/analyze", {method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            task_description: state.narrativeDraft,
            scenario_id: effectiveScenarioId(),
            model_tier: state.modelTier,
            run_id: state.agentRunId,
            source_task_description: state.taskPrompt,
            narrative_parent_run_id: state.narrativeRunId,
            preferred_coverage: selectedCoverageCells(),
          })});
        const d = await r.json();
        if (!r.ok) throw new Error(d.message || d.error);
        state.agentStatus = "done";
        state.agentPhase = "done";
        state.agentResult = d.result;
        state.maxUnlocked = Math.max(state.maxUnlocked, 2);
      } catch(e) {
        state.agentStatus = "idle";
        state.agentPhase = "idle";
        state.agentError = String(e.message || e);
      }
      stopAgentPoll();
      render();
    }

    function renderStep2a() {
      setHeader(1, state.completed.has(1) ? "已完成" : state.agentStatus === "done" ? "A×L 待确认" : state.narrativeStatus === "done" ? "文案待确认" : "等待运行");

      const canEditCov = !hasN && state.narrativeStatus !== "running";
      let h = saveBar() + '<p class="intro">STEP 2：选目标 Coverage → 扩充文案 → 跑 A×L 分类。完成后进入 STEP 3 看 JD。</p>';
      h += renderCoveragePickerHtml({ editable: canEditCov });
      h += '<div class="field-label" style="margin-top:10px"><label>① 文案扩充</label></div>';
      if (state.narrativeStatus === "running") h += '<div class="choice-card selected"><b>调用中...</b></div>';
      else if (hasN) {
        h += '<textarea class="task-input" id="narEdit" style="min-height:180px">' + escapeHtml(state.narrativeDraft) + '</textarea>';
        h += '<div class="action-row"><span class="action-note">可直接修改文案；若要改 coverage，请点「重选 coverage 再扩充」</span>'
          + '<button class="btn" type="button" onclick="resetNarrativeForCoverage()">重选 coverage 再扩充</button>'
