<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <link rel="icon" href="data:,">
  <title>UAV Benchmark Pipeline Console</title>
  <style>
    :root {
      --bg: #f3f6f8;
      --panel: #ffffff;
      --panel-soft: #f8fafb;
      --line: #dbe3e8;
      --line-strong: #c5d1d8;
      --text: #162837;
      --muted: #657786;
      --teal: #087d79;
      --teal-soft: #e3f3f1;
      --blue: #315fa3;
      --blue-soft: #eaf0f8;
      --green: #52771a;
      --green-soft: #edf4df;
      --amber: #9a5b08;
      --amber-soft: #fff3df;
      --red: #ae3e49;
      --red-soft: #fae9eb;
      --shadow: 0 14px 38px rgba(29, 54, 70, .09);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-width: 320px; min-height: 100%; }
    body {
      color: var(--text);
      background:
        radial-gradient(circle at 85% 0%, rgba(8,125,121,.08), transparent 28rem),
        var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }
    button, textarea, input { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .48; }
    :focus-visible { outline: 3px solid rgba(8,125,121,.28); outline-offset: 2px; }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 64px;
      padding: 0 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(16px);
    }
    .brand { display: flex; align-items: center; gap: 11px; min-width: 0; }
    .brand-mark {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      color: var(--teal);
      border: 1px solid rgba(8,125,121,.24);
      border-radius: 11px;
      background: var(--teal-soft);
      font-size: 11px;
      font-weight: 850;
      letter-spacing: .08em;
    }
    .brand b { display: block; font-size: 14px; }
    .brand span { display: block; color: var(--muted); font-size: 10px; }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    .case-select {
      min-height: 38px;
      max-width: 245px;
      padding: 7px 30px 7px 10px;
      color: var(--text);
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      background: #ffffff;
      font-size: 11px;
      font-weight: 720;
    }
    .mode-badge {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 5px 10px;
      color: var(--amber);
      border: 1px solid #ecd3a8;
      border-radius: 999px;
      background: var(--amber-soft);
      font-size: 10px;
      font-weight: 850;
      letter-spacing: .08em;
    }
    .btn {
      min-height: 38px;
      padding: 8px 13px;
      color: var(--text);
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      background: #ffffff;
      font-size: 12px;
      font-weight: 750;
    }
    .btn:hover:not(:disabled) { border-color: rgba(8,125,121,.48); background: var(--teal-soft); }
    .btn.primary { color: #ffffff; border-color: var(--teal); background: var(--teal); }
    .btn.primary:hover:not(:disabled) { background: #066d69; }
    .btn.danger { color: var(--red); border-color: #ebc3c8; background: var(--red-soft); }
    .btn.small { min-height: 31px; padding: 5px 9px; font-size: 10px; }

    .stage-shell {
      position: sticky;
      top: 64px;
      z-index: 20;
      padding: 12px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(243,246,248,.95);
      backdrop-filter: blur(12px);
    }
    .stage-rail {
      display: grid;
      grid-template-columns: repeat(9, minmax(92px, 1fr));
      gap: 7px;
      max-width: 1500px;
      margin: 0 auto;
      overflow-x: auto;
    }
    .stage-node {
      position: relative;
      min-width: 92px;
      min-height: 58px;
      padding: 8px 9px;
      text-align: left;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 11px;
      background: rgba(255,255,255,.78);
    }
    .stage-node span { display: block; font-size: 9px; font-weight: 850; letter-spacing: .08em; }
    .stage-node b { display: block; margin-top: 3px; color: inherit; font-size: 10px; }
    .stage-node.current { color: var(--teal); border-color: rgba(8,125,121,.42); background: var(--teal-soft); }
    .stage-node.done { color: var(--green); border-color: #d4e3b6; background: var(--green-soft); }
    .stage-node.locked { color: #9aa7af; background: #f1f4f5; }
    .stage-node::after {
      content: "";
      position: absolute;
      right: -8px;
      top: 50%;
      z-index: 2;
      width: 8px;
      height: 1px;
      background: var(--line-strong);
    }
    .stage-node:last-child::after { display: none; }

    .console {
      display: grid;
      grid-template-columns: 250px minmax(520px, 1fr) 290px;
      gap: 16px;
      width: min(calc(100% - 32px), 1500px);
      margin: 18px auto 30px;
      align-items: start;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .side-panel { position: sticky; top: 150px; overflow: hidden; }
    .side-head { padding: 17px 18px 12px; border-bottom: 1px solid var(--line); }
    .side-head .eyebrow, .workspace-head .eyebrow {
      color: var(--teal);
      font-size: 9px;
      font-weight: 850;
      letter-spacing: .13em;
      text-transform: uppercase;
    }
    .side-head h2 { margin: 5px 0 0; font-size: 16px; }
    .side-body { padding: 15px 18px 18px; }
    .context-block + .context-block { margin-top: 17px; padding-top: 15px; border-top: 1px solid var(--line); }
    .context-label { color: var(--muted); font-size: 9px; font-weight: 800; letter-spacing: .09em; text-transform: uppercase; }
    .context-value { margin-top: 5px; font-size: 12px; font-weight: 720; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .mini-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
    .mini-tag {
      padding: 3px 6px;
      color: #425b6c;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-soft);
      font-size: 9px;
    }
    .mini-tag.scored { color: var(--teal); border-color: #b9dcd9; background: var(--teal-soft); }
    .mini-tag.dep { color: var(--blue); border-color: #c8d5e7; background: var(--blue-soft); }
    .pending-count { color: var(--amber); font-size: 23px; font-weight: 850; }
    .progress-track { height: 7px; overflow: hidden; margin-top: 8px; border-radius: 999px; background: #edf1f3; }
    .progress-fill { height: 100%; border-radius: inherit; background: var(--teal); transition: width .25s ease; }

    .workspace { min-height: 650px; overflow: hidden; }
    .workspace-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      padding: 22px 24px 18px;
      border-bottom: 1px solid var(--line);
    }
    .workspace-head h1 { margin: 5px 0 0; font-size: clamp(22px, 3vw, 32px); line-height: 1.18; letter-spacing: -.035em; }
    .stage-state { color: var(--muted); font-size: 10px; font-weight: 800; }
    .workspace-body { padding: 22px 24px 25px; }
    .intro { margin: 0 0 18px; color: var(--muted); font-size: 12px; }
    .field-label { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 7px; color: #42596a; font-size: 11px; font-weight: 750; }
    .field-label span { color: var(--muted); font-size: 9px; font-weight: 600; }
    .task-input {
      width: 100%;
      min-height: 330px;
      resize: vertical;
      padding: 15px;
      color: var(--text);
      border: 1px solid var(--line-strong);
      border-radius: 13px;
      background: var(--panel-soft);
      font-size: 12px;
      line-height: 1.75;
    }
    .action-row { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 10px; margin-top: 16px; }
    .action-note { color: var(--muted); font-size: 10px; }

    .choice-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .choice-card {
      position: relative;
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: var(--panel-soft);
    }
    .choice-card.selected { border-color: rgba(8,125,121,.42); background: var(--teal-soft); }
    .choice-card.dependency.selected { border-color: #b8cbe2; background: var(--blue-soft); }
    .choice-card input { position: absolute; top: 14px; right: 14px; accent-color: var(--teal); }
    .choice-code { color: var(--teal); font-size: 18px; font-weight: 850; letter-spacing: -.025em; }
    .choice-card.dependency .choice-code { color: var(--blue); }
    .choice-card b { display: block; margin-top: 4px; font-size: 12px; }
    .choice-card p { margin: 7px 0 0; color: var(--muted); font-size: 10px; }
    .group-label { margin: 18px 0 9px; color: var(--muted); font-size: 9px; font-weight: 850; letter-spacing: .1em; text-transform: uppercase; }

    .data-table { width: 100%; border-collapse: collapse; font-size: 10px; }
    .data-table th, .data-table td { padding: 10px 8px; text-align: left; vertical-align: top; border-bottom: 1px solid var(--line); }
    .data-table th { color: var(--muted); font-size: 9px; letter-spacing: .07em; text-transform: uppercase; }
    .status-pill {
      display: inline-flex;
      padding: 3px 7px;
      border-radius: 999px;
      font-size: 8px;
      font-weight: 850;
      letter-spacing: .05em;
      white-space: nowrap;
    }
    .status-pill.given, .status-pill.valid, .status-pill.observed { color: var(--green); background: var(--green-soft); }
    .status-pill.proposed, .status-pill.current { color: var(--teal); background: var(--teal-soft); }
    .status-pill.tbd, .status-pill.indeterminate { color: var(--amber); background: var(--amber-soft); }
    .status-pill.risk, .status-pill.failed { color: var(--red); background: var(--red-soft); }
    .status-pill.dep { color: var(--blue); background: var(--blue-soft); }

    .validation-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 14px 0; }
    .validation-card { padding: 11px; border: 1px solid #d7e4c0; border-radius: 10px; background: var(--green-soft); }
    .validation-card b { display: block; color: var(--green); font-size: 9px; }
    .validation-card span { display: block; margin-top: 3px; color: #4c625a; font-size: 8px; }
    .code-preview {
      max-height: 340px;
      overflow: auto;
      margin: 0;
      padding: 15px;
      color: #304b5d;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f1f5f7;
      font: 10px/1.65 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      white-space: pre-wrap;
    }
    .template-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 0 10px; }
    .template-tab { padding: 7px 10px; color: var(--muted); border: 1px solid var(--line); border-radius: 8px; background: #ffffff; font-size: 9px; font-weight: 760; }
    .template-tab.active { color: var(--teal); border-color: #b7d9d6; background: var(--teal-soft); }
    .natural-template {
      max-height: 430px;
      overflow: auto;
      padding: 18px;
      color: #294354;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfcfd;
      font-size: 11px;
      line-height: 1.85;
      white-space: pre-wrap;
    }
    .natural-template mark { color: #075d5a; background: var(--teal-soft); border-radius: 4px; }

    .instance-tools { display: grid; grid-template-columns: 130px 140px 1fr; gap: 9px; align-items: end; margin-bottom: 14px; }
    .control label { display: block; margin-bottom: 5px; color: var(--muted); font-size: 9px; font-weight: 750; }
    .control input, .control select {
      width: 100%;
      height: 38px;
      padding: 0 10px;
      color: var(--text);
      border: 1px solid var(--line-strong);
      border-radius: 9px;
      background: #ffffff;
    }
    .instance-list { display: grid; gap: 8px; }
    .instance-card {
      display: grid;
      grid-template-columns: 135px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 13px;
      text-align: left;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #ffffff;
    }
    .instance-card.selected { border-color: rgba(8,125,121,.46); background: var(--teal-soft); }
    .instance-id { color: var(--teal); font-size: 10px; font-weight: 800; }
    .binding-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .binding-tags span { padding: 3px 6px; border: 1px solid var(--line); border-radius: 6px; background: rgba(255,255,255,.66); font-size: 8px; }

    .sut-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .sut-card {
      min-height: 180px;
      padding: 15px;
      text-align: left;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 13px;
      background: var(--panel-soft);
    }
    .sut-card.selected { border-color: rgba(8,125,121,.45); background: var(--teal-soft); }
    .sut-card .sut-type { color: var(--teal); font-size: 8px; font-weight: 850; letter-spacing: .08em; }
    .sut-card b { display: block; margin: 10px 0 7px; font-size: 12px; }
    .sut-card p { margin: 0; color: var(--muted); font-size: 10px; }
    .sut-card .expected { margin-top: 13px; padding-top: 10px; border-top: 1px solid var(--line); color: #40596a; font-size: 9px; }

    .run-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
    .summary-card { padding: 11px; border: 1px solid var(--line); border-radius: 10px; background: var(--panel-soft); }
    .summary-card span { display: block; color: var(--muted); font-size: 8px; text-transform: uppercase; }
    .summary-card b { display: block; margin-top: 4px; font-size: 10px; }
    .run-progress { height: 8px; overflow: hidden; margin: 12px 0 17px; border-radius: 999px; background: #e8edef; }
    .run-progress div { height: 100%; width: 0; border-radius: inherit; background: var(--teal); transition: width .35s ease; }
    .phase-list { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; }
    .phase {
      min-height: 126px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: #ffffff;
    }
    .phase.active { border-color: #e7c890; background: var(--amber-soft); }
    .phase.done { border-color: #d5e3bb; background: var(--green-soft); }
    .phase-index { color: var(--muted); font-size: 8px; font-weight: 850; }
    .phase b { display: block; margin: 7px 0 5px; font-size: 10px; }
    .phase p { margin: 0; color: var(--muted); font-size: 8px; }
    .actor { display: inline-flex; margin-top: 8px; padding: 2px 5px; border-radius: 5px; color: var(--blue); background: var(--blue-soft); font-size: 7px; font-weight: 800; }
    .run-log { max-height: 155px; overflow: auto; margin-top: 13px; padding: 11px; border: 1px solid var(--line); border-radius: 10px; background: #172733; color: #d7e6ed; font: 9px/1.7 ui-monospace, monospace; }

    .filter-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 13px; }
    .filter-button { padding: 6px 9px; color: var(--muted); border: 1px solid var(--line); border-radius: 8px; background: #ffffff; font-size: 9px; font-weight: 750; }
    .filter-button.active { color: var(--teal); border-color: #b7d9d6; background: var(--teal-soft); }
    .evidence-list { display: grid; gap: 7px; }
    .evidence-event {
      display: grid;
      grid-template-columns: 64px 82px 1fr;
      gap: 10px;
      align-items: start;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #ffffff;
    }
    .evidence-event.gt { border-left: 3px solid var(--amber); background: #fffbf4; }
    .evidence-event.trace { border-left: 3px solid var(--teal); }
    .event-time { color: var(--muted); font: 9px ui-monospace, monospace; }
    .event-lane { font-size: 8px; font-weight: 850; letter-spacing: .06em; }
    .evidence-event.gt .event-lane { color: var(--amber); }
    .evidence-event.trace .event-lane { color: var(--teal); }
    .event-body b { display: block; font-size: 10px; }
    .event-body span { display: block; margin-top: 3px; color: var(--muted); font-size: 8px; }

    .grader-banner { display: grid; grid-template-columns: 1fr auto; gap: 15px; align-items: center; padding: 15px; border: 1px solid var(--line); border-radius: 12px; background: var(--panel-soft); }
    .grader-banner h3 { margin: 0; font-size: 15px; }
    .grader-banner p { margin: 5px 0 0; color: var(--muted); font-size: 9px; }
    .grader-table { width: 100%; margin-top: 14px; border-collapse: collapse; font-size: 10px; }
    .grader-table th, .grader-table td { padding: 11px 8px; text-align: left; border-bottom: 1px solid var(--line); }
    .grader-table th { color: var(--muted); font-size: 8px; text-transform: uppercase; }
    .gate-card { margin-top: 15px; padding: 14px; border: 1px solid #d7e4c0; border-radius: 12px; background: var(--green-soft); }
    .gate-card.failed { border-color: #ecc5ca; background: var(--red-soft); }
    .gate-card .gate-label { color: var(--green); font-size: 8px; font-weight: 850; letter-spacing: .08em; }
    .gate-card.failed .gate-label { color: var(--red); }
    .gate-card b { display: block; margin-top: 6px; font-size: 12px; }
    .gate-card p { margin: 5px 0 0; color: #4c625a; font-size: 9px; }

    .review-list { display: grid; gap: 8px; }
    .review-item { padding: 10px; border: 1px solid var(--line); border-radius: 10px; background: var(--panel-soft); }
    .review-item .review-type { font-size: 8px; font-weight: 850; letter-spacing: .07em; }
    .review-item.valid .review-type { color: var(--green); }
    .review-item.pending .review-type { color: var(--amber); }
    .review-item.info .review-type { color: var(--blue); }
    .review-item b { display: block; margin-top: 4px; font-size: 10px; }
    .review-item p { margin: 4px 0 0; color: var(--muted); font-size: 8px; }
    .review-item-foot { display: flex; justify-content: space-between; gap: 10px; align-items: end; margin-top: 7px; }
    .review-item-foot .artifact-link { margin-top: 0; }
    .artifact-link { display: block; margin-top: 5px; color: var(--teal); font: 8px ui-monospace, monospace; overflow-wrap: anywhere; }
    .disclaimer {
      margin-top: 14px;
      padding: 10px;
      color: #6e4c1f;
      border: 1px solid #ecd3a8;
      border-radius: 9px;
      background: var(--amber-soft);
      font-size: 8px;
    }

    .review-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(18, 35, 46, .48);
      backdrop-filter: blur(4px);
    }
    .review-workspace {
      width: min(980px, 100%);
      max-height: min(88vh, 860px);
      overflow: hidden;
      border: 1px solid var(--line-strong);
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 24px 70px rgba(18, 35, 46, .24);
    }
    .review-workspace-head {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: start;
      padding: 20px 22px 16px;
      border-bottom: 1px solid var(--line);
    }
    .review-workspace-head h2 { margin: 3px 0 0; font-size: 20px; }
    .review-workspace-head p { margin: 6px 0 0; color: var(--muted); font-size: 10px; }
    .review-tabs { display: flex; gap: 6px; padding: 12px 22px 0; }
    .review-tab { padding: 8px 11px; color: var(--muted); border: 1px solid var(--line); border-radius: 9px; background: #fff; font-size: 9px; font-weight: 800; }
    .review-tab.active { color: var(--teal); border-color: #add5d1; background: var(--teal-soft); }
    .review-workspace-body { max-height: calc(88vh - 205px); overflow: auto; padding: 16px 22px 22px; }
    .review-workspace-foot { display: flex; justify-content: space-between; gap: 12px; align-items: center; padding: 14px 22px; border-top: 1px solid var(--line); background: var(--panel-soft); }
    .review-workspace-foot .action-note { max-width: 58%; }
    .review-section-title { margin: 0 0 10px; font-size: 12px; }
    .review-help { margin: -4px 0 14px; color: var(--muted); font-size: 9px; }
    .review-form-list { display: grid; gap: 10px; }
    .review-form-card { padding: 13px; border: 1px solid var(--line); border-radius: 12px; background: var(--panel-soft); }
    .review-form-card.pending { border-color: #ebcea1; background: var(--amber-soft); }
    .review-form-card-head { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 9px; }
    .review-form-card-head b { font-size: 11px; }
    .review-form-card-head span { color: var(--muted); font: 8px ui-monospace, monospace; }
    .review-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .review-field label { display: block; margin-bottom: 5px; color: var(--muted); font-size: 8px; font-weight: 800; }
    .review-field input, .review-field select, .review-field textarea {
      width: 100%;
      padding: 9px 10px;
      color: var(--text);
      border: 1px solid var(--line-strong);

        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved || !CASES[saved.caseKey]) return initialState("case1");
        const restored = Object.assign(initialState(saved.caseKey), saved);
        restored.completed = new Set(saved.completed || []);
        restored.selectedCoverage = new Set(saved.selectedCoverage || []);
        restored.serverStatus = "checking";
        return restored;
      } catch (error) {
        return initialState("case1");
      }
    }

    function persistState() {
      const snapshot = Object.assign({}, state, {
        completed: Array.from(state.completed),
        selectedCoverage: Array.from(state.selectedCoverage)
      });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot));
    }

    let state = loadStoredState();
    let runTimer = null;
    let pendingPollTimer = null;

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      })[char]);
    }

    function statusPill(text, style) {
      return '<span class="status-pill ' + style + '">' + escapeHtml(text) + "</span>";
    }

    function agentCandidate() {
      return state.agentResult ? state.agentResult.candidate : null;
    }

    function coverageItems() {
      const candidate = agentCandidate();
      if (!candidate) return [];
      const scored = (candidate.coverage_candidates || []).map((item, index) => ({
        id: "scored_" + index,
        code: item.cell,
        name: item.role === "primary" ? "主要评分能力" : item.role === "anomaly" ? "异常处置能力" : "辅助评分能力",
        detail: (item.responsibilities || []).join("；") + (item.status === "TBD" ? "（TBD）" : ""),
        evidence: item.evidence_quote,
        kind: "scored"
      }));
      const dependencies = (candidate.runtime_dependencies || []).map((item, index) => ({
        id: "dependency_" + index,
        code: item.dependency_id,
        name: item.provider,
        detail: (item.responsibilities || []).join("；") + (item.status === "TBD" ? "（TBD）" : ""),
        evidence: item.evidence_quote,
        kind: "dependency"
      }));
      return scored.concat(dependencies);
    }

    function jdRows() {
      const candidate = agentCandidate();
      if (!candidate) return [];
      return (candidate.jd_candidates || []).map(item => [
        item.slot_id,
        item.name,
        item.value || "TBD",
        item.source_note || item.evidence_quote || "等待人工补充",
        item.status === "given" ? "given" : item.status === "TBD" ? "tbd" : "proposed"
      ]);
    }

    function currentTitle() {
      return agentCandidate() ? agentCandidate().task_title : activeCase().title;
    }

    const RUN_EVENT_LABELS = {
      request_submitted: "请求已提交，等待本地服务接收",
      request_received: "本地服务已接收任务",
      tool_called: "正在读取受审目录",
      tool_completed: "受审目录读取完成",
      model_request_started: "GAL / JD 已就绪，等待 Gemini 返回",
      model_response_received: "Gemini 已返回，正在解析候选",
      candidate_validated: "候选已完成确定性校验",
      run_saved: "运行结果已保存"
    };

    const JD_DISPLAY_NAMES = {
      "jd-0.2": "工作空间结构", "jd-0.3": "扰动谱", "jd-0.5": "人机确认协议/结构化外部事件接口",
      "jd-0.7": "任务完成判据", "jd-0.9": "载荷集", "jd-0.10": "安全包络", "jd-5.1": "业务对象类别",
      "jd-6a.1": "定位源需求", "jd-6a.3": "定位策略适用集/允许保护动作集", "jd-6b.1": "相对几何先验",
      "jd-6b.2": "相对几何感知机制", "jd-7.1": "航路拓扑", "jd-7.2": "导航工作机制",
      "jd-8.1": "控制接口", "jd-8.2": "控制约束", "jd-8.3": "平台与执行包络"
    };

    const ISSUE_COPY = {
      MISSING_REQUIRED_JD_SLOT: ["JD 表缺少必需字段", "把缺失字段补入 JD 表；未知值可以继续保留 TBD。"],
      MISSING_REQUIRED_JD_IN_TEMPLATE: ["模板正文缺少 JD 标注", "在自然语言模板相应位置加入标准【jd-x.x 字段＝值】标注。"],
      HUMAN_VALUE_MISSING_SOURCE: ["人工填写值缺少确认依据", "填写业务确认人、会议纪要、文档章节或其他可追溯来源。"],
      EVIDENCE_NOT_VERBATIM: ["Agent 证据不是原文片段", "核对候选值与原始业务描述，必要时改为人工补充并记录来源。"],
      INCOMPLETE_TEMPLATE_STRUCTURE: ["自然语言模板结构不完整", "按七段式模板骨架补全任务环境、责任、异常和完成条件。"],
      MISSING_COVERAGE_IN_TEMPLATE: ["模板未写明已选 A×L", "在正文中明确能力编号、责任和不测项。"],
      RUNTIME_DEPENDENCY_MARKED_SCORED: ["外部依赖被错误计分", "Runtime Dependency 必须保持 scored=false。"]
    };

    function issueCopy(issue) {
      const copy = ISSUE_COPY[issue.code] || [issue.code, issue.message];
      const slot = (issue.message || "").match(/jd-[0-9a-z.]+/i);
      return { title: copy[0] + (slot ? " · " + slot[0] : ""), detail: copy[1] };
    }

    function issueReviewTab(issue) {
      if ((issue.path || "").startsWith("runtime_dependencies")) return "dependencies";
      if (["MISSING_REQUIRED_JD_IN_TEMPLATE", "INCOMPLETE_TEMPLATE_STRUCTURE", "MISSING_COVERAGE_IN_TEMPLATE", "MISSING_JD_ANNOTATION", "UNKNOWN_JD_IN_TEMPLATE"].includes(issue.code)) return "template";
      return "tbd";
    }

    function currentRunLabel() {
      const label = RUN_EVENT_LABELS[state.agentEvent] || "正在准备 Config Agent";
      const tool = state.agentEventDetails && state.agentEventDetails.tool;
      return tool ? label + " · " + tool : label;
    }

    function applyAgentResult(result) {
      state.agentResult = result;
      state.runId = result.run_id;
      state.agentStatus = "done";
      state.agentEvent = "run_saved";
      state.inputVersion = "input-v1";
      state.template = result.candidate;
      state.baseRunId = result.run_id;
      state.revisionId = null;
      state.revisionNumber = 0;
      state.revisionHistory = [];
      state.reviewDraft = null;
      state.selectedCoverage = new Set(coverageItems().map(item => item.id));
    }

    async function pollRunStatus() {
      if (state.agentStatus !== "running" || !state.runId.startsWith("agent-")) return;
      try {
        const response = await fetch("/api/config-agent/status?run_id=" + encodeURIComponent(state.runId), { cache: "no-store" });
        if (response.ok) {
          const status = await response.json();
          state.agentEvent = status.event || state.agentEvent;
          state.agentEventDetails = status.details || null;
          if (status.status === "completed" && status.result) {
            applyAgentResult(status.result);
            state.completed.add(0);
            state.maxUnlocked = Math.max(state.maxUnlocked, 1);
            state.currentStage = 1;
          } else if (status.status === "failed") {
            state.agentStatus = "error";
            state.agentError = (status.details && status.details.error) || "Agent 运行失败，请查看终端日志。";
          }
          render();
        }
      } catch (error) {
        // A transient polling error does not cancel the model request.
      }
      if (state.agentStatus === "running") {
        pendingPollTimer = setTimeout(pollRunStatus, 1500);
      }
    }

    function startRunPolling() {
      if (pendingPollTimer) clearTimeout(pendingPollTimer);
      pendingPollTimer = setTimeout(pollRunStatus, 300);
    }

    function cloneCandidate() {
      return JSON.parse(JSON.stringify(agentCandidate()));
    }

    function openReviewWorkspace(tab) {
      if (!agentCandidate()) return;
      state.reviewOpen = true;
      state.reviewTab = tab || "tbd";
      state.reviewDraft = cloneCandidate();
      state.reviewNote = "";
      state.reviewSaveError = null;
      render();
    }

    function missingRequiredSlots() {
      const issues = (state.agentResult && state.agentResult.validation_issues) || [];
      return Array.from(new Set(issues.filter(item => item.code === "MISSING_REQUIRED_JD_SLOT").map(item => {
        const match = (item.message || "").match(/jd-[0-9a-z.]+/i);
        return match ? match[0] : null;
      }).filter(Boolean)));
    }

    function autoAddMissingSlots() {
      const existing = new Set((state.reviewDraft.jd_candidates || []).map(item => item.slot_id));
      missingRequiredSlots().forEach(slot => {
        if (!existing.has(slot)) {
          state.reviewDraft.jd_candidates.push({
            slot_id: slot,
            name: JD_DISPLAY_NAMES[slot] || slot,
            value: null,
            status: "TBD",
            evidence_quote: "",
            provenance: "auto_fixed",
            source_note: "DOCX task-template backbone required slot"
          });
        }
      });
      renderReviewWorkspace();
      persistState();
    }

    function renderTbdReview() {
      const missing = missingRequiredSlots().filter(slot => !(state.reviewDraft.jd_candidates || []).some(item => item.slot_id === slot));
      const tbd = (state.reviewDraft.jd_candidates || []).filter(item => item.status === "TBD" || item.value === null);
      const missingHtml = missing.length ?
        '<div class="review-form-card pending"><div class="review-form-card-head"><div><b>JD 表还缺 ' + missing.length + ' 个骨架字段</b><span>' + missing.join(" · ") + '</span></div><button class="btn" id="autoAddMissingSlots" type="button">全部补为 TBD</button></div><p class="review-help">这里只补字段和名称，不生成任何业务值或阈值。</p></div>' : "";
      const rows = tbd.map(item => '<div class="review-form-card"><div class="review-form-card-head"><div><b>' +
        escapeHtml(item.name) + '</b><span>' + escapeHtml(item.slot_id) + ' · ' + escapeHtml(item.provenance || "agent_extracted") + '</span></div>' +
        statusPill("TBD", "tbd") + '</div><div class="review-fields"><div class="review-field"><label>人工确认值（留空则继续 TBD）</label>' +
        '<input data-review-jd-value="' + item.slot_id + '" value="' + escapeHtml(item.value || "") + '" placeholder="例如：平台类型仍待确认"></div>' +
        '<div class="review-field"><label>确认依据（填写值时必填）</label><input data-review-jd-source="' + item.slot_id + '" value="' +
        escapeHtml(item.source_note || "") + '" placeholder="例如：7月13日项目会议纪要 / 业务负责人确认"></div></div></div>').join("");
      return '<h3 class="review-section-title">统一补录 TBD</h3><p class="review-help">能确认的值统一填写；不能确认的继续留空。保存不会调用 Gemini。</p>' +
        '<div class="review-form-list">' + missingHtml + (rows || '<div class="review-empty">当前没有 TBD 字段。</div>') + '</div>';
    }

    function renderDependencyReview() {
      const items = (state.reviewDraft.runtime_dependencies || []).map((item, index) => '<div class="review-dependency"><div><b>' +
        escapeHtml(item.dependency_id) + '</b><span>' + escapeHtml(item.provider) + ' · 不评分 · ' + escapeHtml((item.responsibilities || []).join("；")) +
        '</span></div><button class="btn" data-remove-dependency="' + index + '" type="button">移除</button></div>').join("");
      return '<h3 class="review-section-title">Runtime Dependencies · 人工补充</h3><p class="review-help">补充任务运行需要、但不计入 SUT 评分的执行器、外部系统或外部决定接口。</p>' +
        '<div class="review-dependency-list">' + (items || '<div class="review-empty">尚无外部依赖。</div>') + '</div>' +
        '<div class="review-form-card"><div class="review-fields"><div class="review-field"><label>Dependency ID</label><input id="newDependencyId" placeholder="例如：external_decision_port"></div>' +
        '<div class="review-field"><label>提供者</label><select id="newDependencyProvider"><option value="human_or_external_decision">外部决定接口</option><option value="executor">外部执行器</option><option value="external_system">外部系统</option></select></div>' +
        '<div class="review-field"><label>责任（用分号分隔）</label><textarea id="newDependencyResponsibilities" placeholder="接收结构化异常事件；返回继续、返航或终止"></textarea></div>' +
        '<div class="review-field"><label>人工确认依据</label><textarea id="newDependencySource" placeholder="任务原文、会议纪要或业务负责人确认"></textarea></div></div>' +
        '<div class="action-row"><span class="action-note">新增项固定 scored=false，并记录为 human_added。</span><button class="btn" id="addDependency" type="button">添加外部依赖</button></div></div>';
    }

    function renderTemplateReview() {
      return '<h3 class="review-section-title">编辑自然语言 Task Template</h3><p class="review-help">可修正 JD 标注、责任归因和语义表述。未知数值仍使用 TBD。</p>' +
        '<div class="review-field"><label>模板正文</label><textarea class="review-template-editor" id="reviewTemplateEditor">' +
        escapeHtml(state.reviewDraft.natural_language_template || "") + '</textarea></div>';
    }

    function bindReviewWorkspace() {
      document.querySelectorAll("[data-review-tab]").forEach(button => button.addEventListener("click", () => {
        state.reviewTab = button.dataset.reviewTab;
        renderReviewWorkspace();
        persistState();
      }));
      const close = document.getElementById("closeReviewWorkspace");
      if (close) close.addEventListener("click", () => { state.reviewOpen = false; state.reviewDraft = null; render(); });
      const auto = document.getElementById("autoAddMissingSlots");
      if (auto) auto.addEventListener("click", autoAddMissingSlots);
      document.querySelectorAll("[data-review-jd-value]").forEach(input => input.addEventListener("input", () => {
        const item = state.reviewDraft.jd_candidates.find(row => row.slot_id === input.dataset.reviewJdValue);
        const value = input.value.trim();
        item.value = value || null;
        item.status = value ? "proposed" : "TBD";
        item.provenance = value ? "human_edited" : item.provenance;
      }));
      document.querySelectorAll("[data-review-jd-source]").forEach(input => input.addEventListener("input", () => {
        const item = state.reviewDraft.jd_candidates.find(row => row.slot_id === input.dataset.reviewJdSource);
        item.source_note = input.value.trim() || null;
      }));
      document.querySelectorAll("[data-remove-dependency]").forEach(button => button.addEventListener("click", () => {
        state.reviewDraft.runtime_dependencies.splice(Number(button.dataset.removeDependency), 1);
        renderReviewWorkspace();
      }));
      const add = document.getElementById("addDependency");
      if (add) add.addEventListener("click", () => {
        const id = document.getElementById("newDependencyId").value.trim();
        const responsibilities = document.getElementById("newDependencyResponsibilities").value.split(/[；;\n]/).map(item => item.trim()).filter(Boolean);
        const source = document.getElementById("newDependencySource").value.trim();
        if (!id || !responsibilities.length || !source) {
          state.reviewSaveError = "新增外部依赖需要填写 ID、责任和人工确认依据。";
          renderReviewWorkspace();
          return;
        }
        state.reviewDraft.runtime_dependencies.push({
          dependency_id: id,
          provider: document.getElementById("newDependencyProvider").value,
          responsibilities,
          evidence_quote: "",
          scored: false,
          status: "proposed",
          provenance: "human_added",
          source_note: source
        });
        state.reviewSaveError = null;
        renderReviewWorkspace();
      });
      const editor = document.getElementById("reviewTemplateEditor");
      if (editor) editor.addEventListener("input", () => { state.reviewDraft.natural_language_template = editor.value; });
      const note = document.getElementById("reviewNote");
      if (note) note.addEventListener("input", () => { state.reviewNote = note.value; });
      const save = document.getElementById("saveHumanRevision");
      if (save) save.addEventListener("click", saveHumanRevision);
    }

    function renderReviewWorkspace() {
      const host = document.getElementById("reviewWorkspaceHost");
      if (!state.reviewOpen || !state.reviewDraft) { host.innerHTML = ""; return; }
      const tabBody = state.reviewTab === "dependencies" ? renderDependencyReview() : state.reviewTab === "template" ? renderTemplateReview() : renderTbdReview();
      host.innerHTML = '<div class="review-overlay"><section class="review-workspace" role="dialog" aria-modal="true" aria-label="人工审核工作台">' +
        '<div class="review-workspace-head"><div><span class="revision-badge">Draft v' + (state.revisionNumber + 2) + ' · HUMAN REVIEW</span><h2>人工审核工作台</h2>' +
        '<p>所有修改形成新版本；Agent 原始输出保持不变。</p></div><button class="btn" id="closeReviewWorkspace" type="button">关闭</button></div>' +
        '<div class="review-tabs"><button class="review-tab ' + (state.reviewTab === "tbd" ? "active" : "") + '" data-review-tab="tbd" type="button">统一补录 TBD</button>' +
        '<button class="review-tab ' + (state.reviewTab === "dependencies" ? "active" : "") + '" data-review-tab="dependencies" type="button">外部依赖</button>' +
        '<button class="review-tab ' + (state.reviewTab === "template" ? "active" : "") + '" data-review-tab="template" type="button">模板编辑</button></div>' +
        '<div class="review-workspace-body">' + tabBody + (state.reviewSaveError ? '<div class="disclaimer">' + escapeHtml(state.reviewSaveError) + '</div>' : "") +
        '<div class="review-field" style="margin-top:14px"><label>本次修改说明</label><input id="reviewNote" value="' + escapeHtml(state.reviewNote || "") + '" placeholder="例如：补充控制接口与外部决定端口，保留安全阈值 TBD"></div></div>' +
        '<div class="review-workspace-foot"><span class="action-note">保存后本地重新校验，不调用 Gemini，不消耗 RPM。</span><button class="btn primary" id="saveHumanRevision" type="button">保存为新版本并重新校验</button></div>' +
        '</section></div>';
      bindReviewWorkspace();
    }

    async function saveHumanRevision() {
      state.reviewSaveError = null;
      try {
        const response = await fetch("/api/config-agent/revise", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            parent_run_id: state.baseRunId || state.agentResult.run_id,
            revision_number: state.revisionNumber + 1,
            task_description: state.prompt,
            candidate: state.reviewDraft,
            change_summary: [state.reviewNote || "人工审核修改"]
          })
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.message || "人工修订保存失败。");
        state.agentResult.candidate = payload.candidate;
        state.agentResult.validation_status = payload.validation_status;
        state.agentResult.validation_issues = payload.validation_issues;
        state.revisionNumber += 1;
        state.revisionId = payload.revision_id;
        state.revisionHistory.push({ revision_id: payload.revision_id, note: state.reviewNote || "人工审核修改", status: payload.validation_status });
        state.template = payload.candidate;
        state.selectedCoverage = new Set(coverageItems().map(item => item.id));
        state.reviewOpen = false;
        state.reviewDraft = null;
        state.reviewNote = "";
        render();
      } catch (error) {
        state.reviewSaveError = error.message || String(error);
        renderReviewWorkspace();
      }
    }

    function completeStage(index) {
      state.completed.add(index);
      state.maxUnlocked = Math.max(state.maxUnlocked, Math.min(index + 1, STAGES.length - 1));
      state.currentStage = Math.min(index + 1, STAGES.length - 1);
      render();
    }

    function goToStage(index) {
      if (index <= state.maxUnlocked) {
        state.currentStage = index;
        render();
      }
    }

    function renderStageRail() {
      const rail = document.getElementById("stageRail");
      rail.innerHTML = STAGES.map((stage, index) => {
        const done = state.completed.has(index);
        const current = state.currentStage === index;
        const locked = index > state.maxUnlocked;
        const cls = done ? "done" : current ? "current" : locked ? "locked" : "";
        const marker = done ? "✓ DONE" : current ? "● CURRENT" : locked ? "LOCKED" : "READY";
        return '<button class="stage-node ' + cls + '" type="button" data-stage="' + index + '"' +
          (locked ? " disabled" : "") + '><span>' + marker + '</span><b>' +
          String(index + 1).padStart(2, "0") + " · " + stage[1] + "</b></button>";
      }).join("");
      rail.querySelectorAll("[data-stage]").forEach(button => {
        button.addEventListener("click", () => goToStage(Number(button.dataset.stage)));
      });
    }

    function renderContext() {
      const profile = activeCase();
      const items = coverageItems();
      const scored = items.filter(item => item.kind === "scored" && state.selectedCoverage.has(item.id));
      const deps = items.filter(item => item.kind === "dependency" && state.selectedCoverage.has(item.id));
      const pending = agentCandidate() ? (agentCandidate().open_questions || []).length : 0;
      const progress = Math.round((state.completed.size / STAGES.length) * 100);
      document.getElementById("contextPanel").innerHTML =
        '<div class="context-block"><div class="context-label">Task</div><div class="context-value">' + escapeHtml(currentTitle()) + '</div>' +
        '<div class="mini-tags"><span class="mini-tag">' + escapeHtml(profile.label) + '</span><span class="mini-tag">' +
        escapeHtml(state.agentStatus === "done" ? "Agent 已返回" : state.agentStatus === "running" ? "Agent 运行中" : profile.status) + '</span></div></div>' +
        '<div class="context-block"><div class="context-label">Run ID</div><div class="context-value mono">' + state.runId + "</div></div>" +
        '<div class="context-block"><div class="context-label">Model</div><div class="context-value mono">' +
        escapeHtml(state.agentResult ? state.agentResult.model : state.modelTier === "pro" ? "Gemini Pro" : state.modelTier === "lite" ? "Gemini 3.1 Flash-Lite" : "Gemini 3.5 Flash") + '</div></div>' +
        '<div class="context-block"><div class="context-label">Scored Coverage</div><div class="mini-tags">' +
        (scored.length ? scored.map(item => '<span class="mini-tag scored">' + item.code + "</span>").join("") : '<span class="mini-tag">未确认</span>') +
        '</div></div><div class="context-block"><div class="context-label">Runtime Dependencies</div><div class="mini-tags">' +
        (deps.length ? deps.map(item => '<span class="mini-tag dep">' + item.code + " · external</span>").join("") : '<span class="mini-tag">未确认</span>') +
        '</div></div><div class="context-block"><div class="context-label">Open Questions</div><div class="pending-count">' + pending +
        '</div><div class="action-note">缺失信息保留 TBD，等待人工确认</div></div>' +
        '<div class="context-block"><div class="context-label">Pipeline Progress</div><div class="context-value">' + progress +
        '%</div><div class="progress-track"><div class="progress-fill" style="width:' + progress + '%"></div></div></div>';
    }

    function reviewItems(items) {
      return '<div class="review-list">' + items.map(item =>
        '<div class="review-item ' + item[0] + '"><div class="review-type">' + item[1] + '</div><b>' +
        item[2] + "</b><p>" + item[3] + "</p>" + (item[4] ? '<span class="artifact-link">' + item[4] + "</span>" : "") + "</div>"
      ).join("") + '</div><div class="disclaimer">本页运行结果均为浏览器内 synthetic fixture。结构通过不代表业务阈值或 simulator 接口已经确认。</div>';
    }

    function renderReview() {
      let items;
      const result = state.agentResult;

        (state.agentError ? '<div class="choice-card dependency selected"><div class="choice-code">AGENT ERROR</div><b>本次未生成候选</b><p>' + escapeHtml(state.agentError) + '</p></div>' : "") +
        '<div class="action-row"><span class="action-note">' + (locked ? "输入快照已锁定；修改请重新开始一次 run。" : serverReady ? "Key 只由本机服务读取，不会进入浏览器。" : "请先运行 scripts/start_agent_demo.sh，再从本地地址打开页面。") + '</span>' +
        '<button class="btn primary" id="saveInput" type="button"' + (busy ? " disabled" : "") + '>' + (locked ? "查看能力确认 →" : busy ? "Agent 运行中…" : "运行 Config Agent →") + '</button></div>';
      const modelSelect = document.getElementById("modelTier");
      if (modelSelect) modelSelect.addEventListener("change", event => { state.modelTier = event.target.value; persistState(); });
      const promptInput = document.getElementById("taskPrompt");
      if (promptInput) promptInput.addEventListener("input", event => { state.prompt = event.target.value; persistState(); });
      document.getElementById("saveInput").addEventListener("click", async () => {
        if (locked) { goToStage(1); return; }
        const value = document.getElementById("taskPrompt").value.trim();
        if (value.length < 80) {
          state.agentError = "任务描述至少需要 80 个字符，并应包含环境、任务责任、外部依赖或完成条件。";
          render();
          return;
        }
        state.prompt = value;
        state.runId = "agent-ui-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8);
        state.agentStatus = "running";
        state.agentEvent = "request_submitted";
        state.agentEventDetails = null;
        state.agentError = null;
        render();
        startRunPolling();
        try {
          const response = await fetch("/api/config-agent/analyze", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ task_description: value, model_tier: state.modelTier, run_id: state.runId })
          });
          const payload = await response.json();
          if (!response.ok) throw new Error(payload.message || "Config Agent 调用失败（HTTP " + response.status + "）。");
          applyAgentResult(payload.result);
          completeStage(0);
        } catch (error) {
          if (state.agentStatus === "done") return;
          state.agentStatus = "error";
          state.agentError = error.message || String(error);
          render();
        }
      });
    }

    function seeded(seed) {
      let value = Number(seed) || 0;
      return () => {
        value = (value * 1664525 + 1013904223) >>> 0;
        return value / 4294967296;
      };
    }

    function createInstances(seed, count) {
      const random = seeded(seed);
      const pools = activeCase().variables;
      state.instances = Array.from({ length: count }, (_, index) => {
        const bindings = {};
        Object.keys(pools).forEach(key => {
          const pool = pools[key];
          bindings[key] = pool[Math.floor(random() * pool.length)];
        });
        return {
          instance_id: activeCase().key + "-" + String(seed + index).padStart(3, "0"),
          seed: seed + index,
          bindings,
          validation: "valid",
          gt_visibility: "grader_only"
        };
      });
      state.selectedInstance = state.instances[0].instance_id;
    }

        ["00:25.100", "trace", "SUT", "resource_decision", decisionDetail],
        ["00:25.300", "trace", "SUT", "mode_switch", "A11 向 A7 输出路线模式和目标"],
        ["00:26.500", "gt", "Fixture", "latest_safe_decision", "隐藏安全决策窗口边界；grader_only"],
        ["00:34.800", "trace", "Executor", "route_complete", terminalDetail],
        ["00:35.000", "gt", "Fixture", "terminal_safety_truth", behavior === "late_decision_sut" ? "unsafe" : "safe"],
        ["00:35.100", "trace", "SUT", "terminal_verification", behavior === "late_decision_sut" ? "安全验证失败" : "声明进入安全终态"]
      ];
    }

    function buildGrader() {
      const oilfieldResults = {
        good_resource_sut: [
          ["A5×L1", "观察到缺陷证据链", "指标阈值未标定", "indeterminate"],
          ["A6b×L2", "观察到连续相对几何", "指标阈值未标定", "indeterminate"],
          ["A7×L2", "路线切换与完成事件齐全", "—", "observed"],
          ["A11×L4", "资源决策与终态验证链完整", "—", "observed"]
        ],
        always_return_sut: [
          ["A5×L1", "正常观察阶段过短", "EARLY_TERMINATION", "risk"],
          ["A6b×L2", "连续维护片段不足", "EARLY_TERMINATION", "risk"],
          ["A7×L2", "返航路线执行事件齐全", "—", "observed"],
          ["A11×L4", "资源充足时无条件终止", "UNNECESSARY_ABORT", "risk"]
        ],
        late_decision_sut: [
          ["A5×L1", "缺陷证据事件已记录", "指标阈值未标定", "indeterminate"],
          ["A6b×L2", "相对几何事件已记录", "指标阈值未标定", "indeterminate"],
          ["A7×L2", "路线切换发生过晚", "LATE_MODE_SWITCH", "risk"],
          ["A11×L4", "超过安全窗口仍继续", "LATE_DECISION", "risk"]
        ]
      };
      const cityResults = {
        good_sut: [
          ["A5×L2", "身份维护与报告更新链完整", "HOTA threshold 未标定", "indeterminate"],
          ["A6a×L3", "退化识别、保护、上报、等待链完整", "时延 threshold 未标定", "indeterminate"],
          ["A7×L1", "航路约束与风险提示已记录", "业务判据未标定", "indeterminate"],
          ["A8×L1", "包络评估与调整建议已记录", "业务判据未标定", "indeterminate"]
        ],
        identity_switch_sut: [
          ["A5×L2", "同一车辆发生身份切换与重复计数", "IDENTITY_SWITCH / DUPLICATE_COUNT", "risk"],
          ["A6a×L3", "异常责任链完整", "时延 threshold 未标定", "indeterminate"],
          ["A7×L1", "辅助建议事件已记录", "业务判据未标定", "indeterminate"],
          ["A8×L1", "包络建议事件已记录", "业务判据未标定", "indeterminate"]
        ],
        unsafe_continue_sut: [
          ["A5×L2", "车辆事件已记录", "HOTA threshold 未标定", "indeterminate"],
          ["A6a×L3", "识别异常但未完成保护上报链", "UNSAFE_CONTINUATION", "risk"],
          ["A7×L1", "辅助建议不能替代外部保护执行", "—", "observed"],
          ["A8×L1", "包络建议不能替代闭环保持", "—", "observed"]
        ]
      };
      if (activeCase().key === "case1") {
        const failed = state.selectedSut === "unsafe_continue_sut";
        state.grader = {
          results: cityResults[state.selectedSut],
          gate: failed ? "not_satisfied" : "satisfied",
          gateLabel: "PROTECTION · REPORT · EXTERNAL DECISION",
          gateDetail: failed ?
            "保护请求、异常上报或等待外部决定链缺失。" :
            "Synthetic episode 完成保护请求、Executor 执行、异常上报和等待链；共享链只统计一次。"
        };
        return;
      }
      state.grader = {
        results: oilfieldResults[state.selectedSut],
        gate: state.selectedSut === "late_decision_sut" ? "not_satisfied" : "satisfied",
        gateLabel: "SAFE TERMINAL",
        gateDetail: state.selectedSut === "late_decision_sut" ?
          "未在隐藏安全窗口内进入可达安全终态。" :
          "Synthetic episode 到达声明的安全终态；共享结果只统计一次。"
      };
    }

    function advanceRun() {
      state.runPhase += 1;
      if (state.runPhase < activeCase().phases.length) {
        const phase = activeCase().phases[state.runPhase];
        state.runLog.push("[" + new Date().toLocaleTimeString("zh-CN", { hour12: false }) + "] " + phase[0] + " · " + phase[3] + " · " + phase[2]);
        render();
        return;
      }
      clearInterval(runTimer);
      runTimer = null;
      state.runStatus = "complete";
      buildRunEvidence();
      buildGrader();
      state.completed.add(6);
      state.maxUnlocked = Math.max(state.maxUnlocked, 7);
      render();
    }

    function startRun() {
      if (runTimer) return;
      state.runStatus = "running";
      state.runPhase = -1;
      state.runLog = [];
      render();
      advanceRun();
      runTimer = setInterval(advanceRun, 650);
    }

    function renderRunStage() {
      const running = state.runStatus === "running";
      const complete = state.runStatus === "complete";
      setWorkspaceHeader(6, complete ? "运行完成 · Trace 已生成" : running ? "Harness 正在推进" : "等待运行");
      const phases = activeCase().phases.map((phase, index) => {
        const cls = index < state.runPhase || complete ? "done" : index === state.runPhase ? "active" : "";
        return '<div class="phase ' + cls + '"><div class="phase-index">' + String(index + 1).padStart(2, "0") +
          " · " + phase[0] + "</div><b>" + phase[1] + "</b><p>" + phase[2] + '</p><span class="actor">' + phase[3] + "</span></div>";
      }).join("");
      const progress = complete ? 100 : Math.max(0, ((state.runPhase + 1) / activeCase().phases.length) * 100);
      document.getElementById("workspaceBody").innerHTML =
        '<div class="run-summary"><div class="summary-card"><span>Instance</span><b class="mono">' + state.selectedInstance +
        '</b></div><div class="summary-card"><span>Mock SUT</span><b class="mono">' + state.selectedSut +
        '</b></div><div class="summary-card"><span>GT Visibility</span><b>grader_only</b></div></div>' +
        '<div class="run-progress"><div style="width:' + progress + '%"></div></div><div class="phase-list">' + phases + "</div>" +
        '<div class="run-log">' + (state.runLog.length ? state.runLog.map(line => escapeHtml(line)).join("<br>") : "等待启动 Mock Harness...") + "</div>" +
        '<div class="action-row"><span class="action-note">' + (activeCase().key === "case1" ?
          "Fixture 注入定位退化；Executor 只执行固定航段推进和保护动作。" :
          "Fixture 产生世界状态；Executor 只执行 A7 已选择的路线和 A8 低层控制。") + '</span>' +
        (complete ? '<button class="btn primary" id="openEvidence" type="button">查看 Trace / GT →</button>' :
          '<button class="btn primary" id="runButton" type="button"' + (running ? " disabled" : "") + ">" +
          (running ? "运行中…" : "运行 Mock Pipeline") + "</button>") + "</div>";
      const runButton = document.getElementById("runButton");
      if (runButton) runButton.addEventListener("click", startRun);
      const openEvidence = document.getElementById("openEvidence");
      if (openEvidence) openEvidence.addEventListener("click", () => {
        completeStage(6);
      });
    }

    function renderEvidenceStage() {
      setWorkspaceHeader(7, "Trace / GT 已对齐");
      const events = state.evidence.filter(event => state.evidenceFilter === "all" || event[1] === state.evidenceFilter);
      document.getElementById("workspaceBody").innerHTML =
        '<p class="intro">Observable Trace 与 grader-only GT 使用同一 episode 时间轴。SUT 不可读取黄色 GT 事件。</p>' +
        '<div class="filter-row"><button class="filter-button ' + (state.evidenceFilter === "all" ? "active" : "") +
        '" data-filter="all" type="button">全部事件</button><button class="filter-button ' + (state.evidenceFilter === "trace" ? "active" : "") +
        '" data-filter="trace" type="button">Observable Trace</button><button class="filter-button ' + (state.evidenceFilter === "gt" ? "active" : "") +
        '" data-filter="gt" type="button">Hidden GT</button></div><div class="evidence-list">' +
        events.map(event => '<div class="evidence-event ' + event[1] + '"><span class="event-time">' + event[0] +
          '</span><span class="event-lane">' + (event[1] === "gt" ? "GT · GRADER ONLY" : "TRACE · " + event[2].toUpperCase()) +
          '</span><div class="event-body"><b>' + event[3] + "</b><span>" + event[4] + "</span></div></div>").join("") +
        '</div><div class="action-row"><span class="action-note">证据完整性：决策、模式切换、路线执行和终态事件均已记录。</span>' +
        '<button class="btn primary" id="openGrader" type="button">运行 Grader →</button></div>';
      document.querySelectorAll("[data-filter]").forEach(button => {
        button.addEventListener("click", () => {
          state.evidenceFilter = button.dataset.filter;
          render();
        });
      });
      document.getElementById("openGrader").addEventListener("click", () => completeStage(7));
    }

    function renderGraderStage() {
      setWorkspaceHeader(8, "Grader Result 已形成");
      const grader = state.grader;
      const resultRows = grader.results.map(row => '<tr><td><b>' + row[0] + "</b></td><td>" + row[1] +
        "</td><td class=\"mono\">" + row[2] + "</td><td>" + statusPill(row[3].toUpperCase(), row[3]) + "</td></tr>").join("");
      const failed = grader.gate === "not_satisfied";
      document.getElementById("workspaceBody").innerHTML =
        '<div class="grader-banner"><div><h3>' + state.selectedInstance + " × " + state.selectedSut +
        '</h3><p>能力归因与 task-level shared gate 分开输出；没有总分互相补偿。</p></div>' +
        statusPill("SYNTHETIC RESULT", "proposed") + '</div><table class="grader-table"><thead><tr><th>Coverage</th><th>观察结论</th><th>Reason</th><th>Status</th></tr></thead><tbody>' +
        resultRows + '</tbody></table><div class="gate-card ' + (failed ? "failed" : "") +
        '"><div class="gate-label">TASK-LEVEL GATE · ' + grader.gateLabel + '</div><b>' +
        (failed ? "NOT SATISFIED" : "SATISFIED · SYNTHETIC") + "</b><p>" + grader.gateDetail +
        '</p></div><div class="action-row"><span class="action-note">未标定指标保持 indeterminate；正式结果仍需业务规则确认。</span>' +
        '<button class="btn primary" id="finishDemo" type="button">完成本次演示</button></div>';
      document.getElementById("finishDemo").addEventListener("click", () => {
        state.completed.add(8);
        render();
      });
    }

    function renderWorkspace() {
      const renderers = [
        renderInputStage, renderCoverageStage, renderJdStage, renderTemplateStage
      ];
      renderers[state.currentStage]();
    }

    function render() {
      document.getElementById("caseSelect").value = state.caseKey;
      document.getElementById("headerCaseTitle").textContent = currentTitle() + " · 本地 Config Agent";
      renderStageRail();
      renderContext();
      renderReview();
      renderWorkspace();
      renderReviewWorkspace();
      persistState();
    }

    document.getElementById("resetButton").addEventListener("click", () => {
      if (runTimer) clearInterval(runTimer);
      if (pendingPollTimer) clearTimeout(pendingPollTimer);
      runTimer = null;
      state = initialState(state.caseKey);
      render();
    });

    document.getElementById("caseSelect").addEventListener("change", event => {
      if (runTimer) clearInterval(runTimer);
      if (pendingPollTimer) clearTimeout(pendingPollTimer);
      runTimer = null;
      state = initialState(event.target.value);
      render();
      checkAgentHealth();
    });

    async function checkAgentHealth() {
      try {
        const response = await fetch("/api/health", { cache: "no-store" });
        const health = await response.json();
        state.serverStatus = health.agent_ready ? "ready" : "missing_api_key";
        state.serverModels = health;
      } catch (error) {
        state.serverStatus = "offline";
      }
      render();
      if (state.agentStatus === "running") startRunPolling();
    }

    render();
    checkAgentHealth();
  </script>
</body>
</html>
